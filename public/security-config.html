<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>セキュリティ設定 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    main { max-width: 820px; margin: 0 auto; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div id="denied" style="display:none;"><div class="card"><p class="msg error">全体管理者のみ利用できます。</p></div></div>

    <div id="area" style="display:none;">
      <div class="card">
        <h2>ログインセキュリティ（アカウントロック）</h2>
        <p style="font-size:0.88rem; color:#556;">
          同じログインIDで連続してログインに失敗した場合、一定時間そのアカウントをロックします（ブルートフォース対策）。
          設定は<strong>システム全体</strong>に適用されます（全体管理者のみ変更可）。
        </p>
        <div class="row">
          <div style="flex:0 0 auto;"><label>ロックする失敗回数</label><input type="number" id="maxFailed" min="1" max="20" style="width:140px;" /></div>
          <div style="flex:0 0 auto;"><label>ロック時間（分）＝リセット時間</label><input type="number" id="lockMinutes" min="1" max="1440" style="width:180px;" /></div>
        </div>
        <div style="margin-top:12px;">
          <label style="display:inline-flex; align-items:center; gap:8px; margin:0; font-weight:700; color:var(--ink);">
            <input type="checkbox" id="notifyLockout" style="width:auto;" />アカウントロック時に全体管理者へメール通知する（不正アクセスの疑い）
          </label>
        </div>
        <p style="color:#6b7280; font-size:0.83rem; margin-top:10px;">
          ・失敗回数：この回数だけ連続で失敗するとロックします（1〜20）。<br>
          ・ロック時間：ロック後、この分数が経過すると自動的に解除され、失敗回数もリセットされます（1〜1440分）。<br>
          ・メール通知：ロック発生時に、全体管理者（superadmin）のログインID宛に、ログインID・IP・端末・時刻を通知します（メール送信が構成されている場合）。
        </p>
        <div style="margin-top:10px;">
          <button onclick="save()">保存</button>
          <span class="msg" id="msg" style="margin-left:10px;"></span>
        </div>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    async function boot() {
      const user = await initPage('security');
      if (!user) return;
      if (user.userType !== 'superadmin') { document.getElementById('denied').style.display = 'block'; return; }
      document.getElementById('area').style.display = 'block';
      const { ok, data } = await api('/api/security-config');
      if (!ok) { setMsg(document.getElementById('msg'), (data && data.error) || '取得に失敗しました', 'error'); return; }
      document.getElementById('maxFailed').value = data.maxFailed;
      document.getElementById('lockMinutes').value = data.lockMinutes;
      document.getElementById('notifyLockout').checked = !!data.notifyLockout;
    }

    async function save() {
      const body = {
        maxFailed: Number(document.getElementById('maxFailed').value),
        lockMinutes: Number(document.getElementById('lockMinutes').value),
        notifyLockout: document.getElementById('notifyLockout').checked,
      };
      const { ok, data } = await api('/api/security-config', { method: 'PUT', body: JSON.stringify(body) });
      setMsg(document.getElementById('msg'), ok ? '保存しました' : (data.error || '保存に失敗しました'), ok ? 'ok' : 'error');
    }

    boot();
  </script>
</body>
</html>
