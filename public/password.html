<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード変更 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card" style="max-width:520px;">
      <h2>パスワード変更</h2>
      <div id="forceNotice" style="display:none; background:#fff4e0; border:1px solid #f0d9a0; border-radius:8px; padding:10px 12px; margin:8px 0; color:#9a6416; font-size:0.9rem;">
        初回ログイン、または管理者によるパスワード再設定のため、パスワードの変更が必要です。新しいパスワードを設定してください。
      </div>
      <p style="font-size:0.85rem; color:#555;">ログイン中のご自身のパスワードを変更します。</p>
      <p style="font-size:0.85rem; color:#555;">最終パスワード変更日時: <strong id="pwUpdated">—</strong></p>

      <div class="row"><div style="flex:1;">
        <label>現在のパスワード</label>
        <input type="password" id="cur" autocomplete="current-password" />
      </div></div>
      <div class="row"><div style="flex:1;">
        <label>新しいパスワード（8文字以上）</label>
        <input type="password" id="nw1" autocomplete="new-password" />
      </div></div>
      <div class="row"><div style="flex:1;">
        <label>新しいパスワード（確認）</label>
        <input type="password" id="nw2" autocomplete="new-password" />
      </div></div>

      <p class="msg" id="msg"></p>
      <div style="margin-top:10px;">
        <button onclick="change()">変更する</button>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    function fmtTs(s) {
      if (!s) return '—';
      const d = new Date(s);
      if (isNaN(d)) return s;
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    let forced = false;

    async function boot() {
      const user = await initPage('password');
      if (!user) return;
      forced = user.mustChangePassword === true;
      if (forced) document.getElementById('forceNotice').style.display = '';
      loadInfo();
    }

    async function loadInfo() {
      const { ok, data } = await api('/api/me/password-info');
      if (ok) document.getElementById('pwUpdated').textContent = fmtTs(data.passwordUpdatedAt);
    }

    async function change() {
      const msg = document.getElementById('msg');
      const cur = document.getElementById('cur').value;
      const n1 = document.getElementById('nw1').value;
      const n2 = document.getElementById('nw2').value;
      if (!cur || !n1) { setMsg(msg, '現在のパスワードと新しいパスワードを入力してください', 'error'); return; }
      if (n1.length < 8) { setMsg(msg, '新しいパスワードは8文字以上にしてください', 'error'); return; }
      if (n1 !== n2) { setMsg(msg, '新しいパスワード（確認）が一致しません', 'error'); return; }
      if (n1 === cur) { setMsg(msg, '現在のパスワードと異なるパスワードを設定してください', 'error'); return; }
      const { ok, data } = await api('/api/me/password', {
        method: 'POST', body: JSON.stringify({ currentPassword: cur, newPassword: n1 }),
      });
      if (!ok) { setMsg(msg, data.error || '変更に失敗しました', 'error'); return; }
      document.getElementById('cur').value = '';
      document.getElementById('nw1').value = '';
      document.getElementById('nw2').value = '';
      document.getElementById('pwUpdated').textContent = fmtTs(data.passwordUpdatedAt);
      if (forced) {
        setMsg(msg, 'パスワードを変更しました。ホーム画面へ移動します…', 'ok');
        setTimeout(() => { location.href = '/'; }, 1200);
      } else {
        setMsg(msg, 'パスワードを変更しました', 'ok');
      }
    }

    boot();
  </script>
</body>
</html>
