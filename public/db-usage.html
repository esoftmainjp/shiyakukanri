<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB使用量 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .kpi { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; }
    .kpi .big { font-size: 2.2rem; font-weight: 800; line-height: 1.1; }
    .kpi .sub { color: #667; font-size: 0.85rem; }
    .barrow { display: grid; grid-template-columns: 180px 1fr 150px; align-items: center; gap: 10px; padding: 4px 0; }
    .barrow .nm { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bartrack { background: rgba(120,140,170,0.15); border-radius: 6px; height: 20px; overflow: hidden; }
    .barfill { height: 100%; background: linear-gradient(90deg, #4a90d9, #6aa9e6); border-radius: 6px; min-width: 2px; }
    .barval { text-align: right; font-size: 0.85rem; color: #445; white-space: nowrap; }
    table.usage th, table.usage td { text-align: right; }
    table.usage th:first-child, table.usage td:first-child { text-align: left; }
    @media (prefers-color-scheme: dark) {
      .kpi .sub { color: #9aa4b2; }
      .barval { color: #cbd3dd; }
    }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div id="denied" class="card" style="display:none;"><p>この画面は全体管理者のみ利用できます。</p></div>

    <div id="area" style="display:none;">
      <div class="card">
        <h2>データベース使用量 <span style="font-size:0.8rem; font-weight:normal; color:#667;" id="genAt"></span></h2>
        <div class="kpi">
          <div>
            <div class="big" id="dbTotal">—</div>
            <div class="sub">データベース全体の使用量</div>
          </div>
          <div>
            <div class="big" id="tblCount" style="font-size:1.4rem;">—</div>
            <div class="sub">テーブル数</div>
          </div>
          <div class="spacer"></div>
          <div><button class="secondary" onclick="load()">更新</button></div>
        </div>
        <p class="msg" id="msg"></p>
      </div>

      <div class="card">
        <h2>テーブル別サイズ（大きい順）</h2>
        <p style="font-size:0.85rem; color:#667; margin-top:0;">バーは最大テーブルを100%とした相対サイズです。（ ）内はDB全体に占める割合。</p>
        <div id="chart"></div>
      </div>

      <div class="card">
        <h2>明細</h2>
        <table class="usage">
          <thead><tr><th>テーブル</th><th>サイズ</th><th>割合</th><th>行数(概算)</th></tr></thead>
          <tbody id="tbl"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    async function boot() {
      const user = await initPage('dbusage');
      if (!user) return;
      if (user.userType !== 'superadmin') { document.getElementById('denied').style.display = 'block'; return; }
      document.getElementById('area').style.display = 'block';
      load();
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtBytes(b) {
      if (!b || b < 1024) return (b || 0) + ' B';
      const u = ['KB', 'MB', 'GB', 'TB'];
      let n = b / 1024, i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(n >= 10 ? 0 : 1) + ' ' + u[i];
    }
    function pct(part, whole) { return whole > 0 ? (part / whole * 100) : 0; }

    async function load() {
      const { ok, data } = await api('/api/db-usage');
      if (!ok) { setMsg(document.getElementById('msg'), (data && data.error) || '取得に失敗しました', 'error'); return; }
      setMsg(document.getElementById('msg'), '', '');
      const tables = data.tables || [];
      const total = data.dbBytes || 0;
      const max = tables.reduce((m, t) => Math.max(m, t.bytes), 0) || 1;

      document.getElementById('dbTotal').textContent = fmtBytes(total);
      document.getElementById('tblCount').textContent = tables.length + ' 個';
      document.getElementById('genAt').textContent = data.generatedAt
        ? '（' + new Date(data.generatedAt).toLocaleString('ja-JP') + ' 時点）' : '';

      // グラフ(横棒)
      document.getElementById('chart').innerHTML = tables.map((t) => {
        const w = pct(t.bytes, max);
        const share = pct(t.bytes, total).toFixed(1);
        return `<div class="barrow">
          <div class="nm" title="${esc(t.name)}">${esc(t.name)}</div>
          <div class="bartrack"><div class="barfill" style="width:${w.toFixed(1)}%;"></div></div>
          <div class="barval">${fmtBytes(t.bytes)}（${share}%）</div>
        </div>`;
      }).join('') || '<p>テーブルがありません。</p>';

      // 明細テーブル
      document.getElementById('tbl').innerHTML = tables.map((t) =>
        `<tr><td>${esc(t.name)}</td><td>${fmtBytes(t.bytes)}</td>` +
        `<td>${pct(t.bytes, total).toFixed(1)}%</td><td>${Number(t.rows).toLocaleString()}</td></tr>`
      ).join('') || '<tr><td colspan="4">データがありません。</td></tr>';
    }

    boot();
  </script>
</body>
</html>
