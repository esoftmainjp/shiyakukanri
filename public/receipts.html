<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入庫 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>入庫登録</h2>
      <div class="row">
        <div>
          <label>入庫日</label>
          <input type="date" id="receiptDate" />
        </div>
        <div style="flex:2;">
          <label>備考（入庫全体）</label>
          <input id="note" placeholder="任意" />
        </div>
      </div>

      <h3 style="margin-top:20px;">GS1-128 バーコード読取</h3>
      <div class="row">
        <div style="flex:3;">
          <label class="barcode-label">バーコードをスキャン（GS1-128：JAN・ロット・使用期限）</label>
          <input id="scan" class="barcode-input" placeholder="ここにスキャン（Enterで確定）" autofocus />
        </div>
      </div>
      <p class="msg" id="scanMsg"></p>

      <h3 style="margin-top:20px;">明細追加</h3>
      <div class="row">
        <div style="flex:2;">
          <label>商品</label>
          <select id="product"></select>
        </div>
        <div>
          <label>ロット番号</label>
          <input id="lot" placeholder="空欄可" />
        </div>
        <div>
          <label>使用期限</label>
          <input type="date" id="expiry" />
        </div>
        <div style="flex:2;">
          <label>備考（この商品）</label>
          <input id="lineNote" placeholder="任意" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>入庫個数</label>
          <input type="number" id="qty" value="1" min="1" />
        </div>
        <div>
          <label>梱包数</label>
          <input type="number" id="pack" value="1" min="1" />
        </div>
        <div>
          <label>現在庫（バラ）</label>
          <input id="curStock" value="0" readonly style="background:#eef2f5;" />
        </div>
        <div style="flex:0;">
          <label>&nbsp;</label>
          <button onclick="addLine()">明細に追加</button>
        </div>
      </div>
      <p class="msg" id="addMsg"></p>

      <table id="lineTable">
        <thead><tr><th>商品</th><th>ロット</th><th>使用期限</th><th>入庫個数</th><th>梱包数</th><th>加算バラ数</th><th>BC</th><th>備考</th><th></th></tr></thead>
        <tbody></tbody>
      </table>

      <div style="margin-top:16px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
        <button onclick="submitReceipt()">入庫を保存</button>
        <label style="display:flex; align-items:center; gap:6px; margin:0; font-weight:normal;">
          <input type="checkbox" id="bcPrintChk" style="width:auto;" checked />バーコード印刷
        </label>
        <label style="display:flex; align-items:center; gap:6px; margin:0; font-weight:normal;">
          <input type="checkbox" id="printChk" style="width:auto;" />保存後にリストを印刷
        </label>
      </div>
      <p class="msg" id="resultMsg"></p>
    </div>
  </main>

  <script src="/common.js"></script>
  <script src="/gs1.js"></script>
  <script>
    let products = [];
    let lines = [];

    async function boot() {
      const user = await initPage('receipts');
      if (!user) return;
      document.getElementById('receiptDate').value = new Date().toISOString().slice(0, 10);
      products = await getProducts();
      const sel = document.getElementById('product');
      sel.innerHTML = products.map((p) => {
        const d = p.details[0];
        return `<option value="${p.productId}">${p.productName}${d && d.spec ? '（' + d.spec + '）' : ''}</option>`;
      }).join('');
      sel.addEventListener('change', fillDefaults);
      document.getElementById('lot').addEventListener('input', updateCurrentStock);
      document.getElementById('expiry').addEventListener('change', updateCurrentStock);
      fillDefaults();

      // GS1-128スキャン: Enterで確定
      const scan = document.getElementById('scan');
      scan.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleScan(scan.value); } });
    }

    // 選択中の商品＋ロット＋使用期限の現在庫を表示
    async function updateCurrentStock() {
      const pid = document.getElementById('product').value;
      const lot = document.getElementById('lot').value || '';
      const exp = document.getElementById('expiry').value || null;
      const el = document.getElementById('curStock');
      if (!pid) { el.value = 0; return; }
      const { data } = await api('/api/lookup/stocks?productId=' + pid);
      const row = (data.stocks || []).find((s) => (s.lot_number || '') === lot && (s.expiry_date || null) === exp);
      el.value = row ? row.stock_quantity : 0;
    }

    async function handleScan(raw) {
      const msg = document.getElementById('scanMsg');
      const value = (raw || '').trim();
      if (!value) return;
      if (!isGs1(value)) { setMsg(msg, 'GS1-128として認識できません（(01)で始まる必要があります）', 'error'); return; }
      const info = extractGs1(value);
      const { ok, data } = await api('/api/lookup/by-jan/' + encodeURIComponent(info.jan));
      if (!ok) { setMsg(msg, `${data.error || '照合失敗'}（JAN:${info.jan}）`, 'error'); return; }
      const p = data.product;
      // フォームに反映
      document.getElementById('product').value = p.productId;
      document.getElementById('pack').value = p.packSize;
      document.getElementById('lot').value = info.lot || '';
      document.getElementById('expiry').value = info.expiry || '';
      document.getElementById('qty').value = 1;
      await updateCurrentStock();
      setMsg(msg, `読取: ${p.productName} / ロット:${info.lot || '-'} / 期限:${info.expiry || '-'}（数量を確認して「明細に追加」）`, 'ok');
      document.getElementById('scan').value = '';
      document.getElementById('qty').focus();
      document.getElementById('qty').select();
    }

    function currentDetail() {
      const pid = document.getElementById('product').value;
      const p = products.find((x) => String(x.productId) === String(pid));
      return p ? { product: p, detail: p.details[0] } : null;
    }
    function fillDefaults() {
      const cur = currentDetail();
      if (!cur || !cur.detail) return;
      document.getElementById('pack').value = cur.detail.packSize;
      updateCurrentStock();
    }

    function addLine() {
      const cur = currentDetail();
      if (!cur || !cur.detail) return;
      const qty = Number(document.getElementById('qty').value);
      const pack = Number(document.getElementById('pack').value);
      if (qty < 1 || pack < 1) { setMsg(document.getElementById('addMsg'), '個数・梱包数は1以上', 'error'); return; }
      const line = {
        productId: cur.product.productId,
        productName: cur.product.productName,
        productDetailId: cur.detail.productDetailId,
        lotNumber: document.getElementById('lot').value,
        expiryDate: document.getElementById('expiry').value || null,
        receiptQuantity: qty,
        packSize: pack,
        barcode: cur.detail.barcodeIssueFlag,
        note: document.getElementById('lineNote').value || '',
      };
      lines.push(line);
      document.getElementById('lineNote').value = '';
      setMsg(document.getElementById('addMsg'), '', '');
      renderLines();
    }

    function renderLines() {
      const tbody = document.querySelector('#lineTable tbody');
      tbody.innerHTML = '';
      lines.forEach((l, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td>${l.productName}</td><td>${l.lotNumber || '(なし)'}</td><td>${l.expiryDate || '(なし)'}</td>` +
          `<td style="text-align:right;">${l.receiptQuantity}</td><td style="text-align:right;">${l.packSize}</td>` +
          `<td style="text-align:right;">${l.receiptQuantity * l.packSize}</td>` +
          `<td>${l.barcode ? '○' : ''}</td>` +
          `<td><input value="${attr(l.note)}" oninput="lines[${i}].note=this.value" placeholder="任意" style="width:130px;" /></td>` +
          `<td><button class="danger" onclick="removeLine(${i})">削除</button></td>`;
        tbody.appendChild(tr);
      });
    }
    function removeLine(i) { lines.splice(i, 1); renderLines(); }
    // input value属性用のエスケープ
    function attr(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function submitReceipt() {
      const msg = document.getElementById('resultMsg');
      if (lines.length === 0) { setMsg(msg, '明細がありません', 'error'); return; }
      const body = {
        receiptDate: document.getElementById('receiptDate').value,
        note: document.getElementById('note').value,
        details: lines.map((l) => ({
          productId: l.productId, productDetailId: l.productDetailId,
          lotNumber: l.lotNumber, expiryDate: l.expiryDate,
          receiptQuantity: l.receiptQuantity, packSize: l.packSize,
          note: l.note || '',
        })),
      };
      const { ok, data } = await api('/api/receipts', { method: 'POST', body: JSON.stringify(body) });
      if (!ok) { setMsg(msg, data.error || '保存失敗', 'error'); return; }
      const bc = data.details.reduce((a, d) => a + d.barcodesIssued, 0);
      setMsg(msg, `入庫を保存しました（入庫ID:${data.receiptId}／発行バーコード:${bc}本）`, 'ok');
      // バーコード印刷(チェック時＆発行があった場合のみ)。設定はバーコード印刷画面と共有。
      if (document.getElementById('bcPrintChk').checked && bc > 0) {
        window.open('/barcode-print.html?receiptId=' + data.receiptId, '_blank');
      }
      if (document.getElementById('printChk').checked) {
        window.open('/print.html?type=receipts&id=' + data.receiptId, '_blank');
      }
      lines = []; renderLines(); await updateCurrentStock();
    }

    boot();
  </script>
</body>
</html>
