<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入庫 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>入庫登録</h2>
      <div class="row">
        <div>
          <label>入庫日</label>
          <input type="date" id="receiptDate" />
        </div>
        <div style="flex:2;">
          <label>問屋（必須）</label>
          <select id="supplier"><option value="">(選択してください)</option></select>
        </div>
        <div style="flex:2;">
          <label>備考（入庫全体）</label>
          <input id="note" placeholder="任意" />
        </div>
      </div>

      <!-- 問屋選択時に入庫予定(発注済み・未入庫)を表示。選択して明細に追加 -->
      <div id="incomingArea" style="display:none; margin:10px 0; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:#f6fbff;">
        <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
          <strong>入庫予定（この問屋・発注済み未入庫）</strong>
          <label style="display:inline-flex; align-items:center; gap:6px; margin:0; font-weight:normal;"><input type="checkbox" id="incAll" onchange="toggleIncoming(this.checked)" style="width:auto;" />全選択</label>
          <button class="secondary" onclick="addSelectedIncoming()">選択を明細に追加</button>
        </div>
        <table id="incomingTable" style="margin-top:8px;">
          <thead><tr><th style="width:34px;"></th><th>発注日</th><th>商品</th><th>発注数(梱包)</th><th>残(バラ)</th><th>残(梱包)</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <h3 style="margin-top:20px;">GS1-128 バーコード読取</h3>
      <div class="row">
        <div style="flex:3;">
          <label class="barcode-label">バーコードをスキャン（GS1-128：JAN・ロット・使用期限）／読み取ると自動で明細に追加。同じロットは箱数＋1</label>
          <input id="scan" class="barcode-input" placeholder="ここにスキャン（Enterで自動追加）" autofocus />
        </div>
      </div>
      <p class="msg" id="scanMsg"></p>

      <h3 style="margin-top:20px;">明細追加</h3>
      <div class="row">
        <div style="flex:2;">
          <label>商品</label>
          <div style="display:flex; gap:6px;">
            <select id="product" style="flex:1;"></select>
            <button type="button" class="secondary" onclick="openProductSearch()" style="white-space:nowrap;">検索</button>
          </div>
        </div>
        <div>
          <label>ロット番号</label>
          <input id="lot" placeholder="空欄可" />
        </div>
        <div>
          <label>使用期限</label>
          <input type="date" id="expiry" />
        </div>
        <div style="flex:2;">
          <label>備考（この商品）</label>
          <input id="lineNote" placeholder="任意" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>入庫個数</label>
          <input type="number" id="qty" value="1" min="1" />
        </div>
        <div>
          <label>梱包数（商品マスター）</label>
          <input type="number" id="pack" value="1" min="1" readonly style="background:#eef2f5;" title="梱包数は商品詳細マスターで管理します" />
        </div>
        <div>
          <label>現在庫（バラ）</label>
          <input id="curStock" value="0" readonly style="background:#eef2f5;" />
        </div>
        <div style="flex:0;">
          <label>&nbsp;</label>
          <button id="addLineBtn" onclick="addLine()">明細に追加</button>
        </div>
      </div>
      <p class="msg" id="addMsg"></p>

      <table id="lineTable">
        <thead><tr><th>商品</th><th>ロット</th><th>使用期限</th><th>入庫個数</th><th>梱包数</th><th>加算バラ数</th><th>BC</th><th>備考</th><th></th></tr></thead>
        <tbody></tbody>
      </table>

      <div style="margin-top:16px; display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
        <button onclick="submitReceipt()">入庫を保存</button>
        <label style="display:flex; align-items:center; gap:6px; margin:0; font-weight:normal;">
          <input type="checkbox" id="bcPrintChk" style="width:auto;" checked />バーコード印刷
        </label>
        <label style="display:flex; align-items:center; gap:6px; margin:0; font-weight:normal;">
          <input type="checkbox" id="printChk" style="width:auto;" />保存後にリストを印刷
        </label>
      </div>
      <p class="msg" id="resultMsg"></p>
    </div>

    <!-- 未登録商品の新規登録モーダル(スキャンで見つからない場合) -->
    <div id="qpOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; overflow:auto;">
      <div style="max-width:940px; margin:24px auto; background:#fff; border-radius:12px; padding:20px 22px; box-shadow:0 10px 40px rgba(0,0,0,0.3);">
        <h2 style="margin-top:0;">未登録の商品を新規登録</h2>
        <p style="color:#9a3412; background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:8px 12px; font-size:0.86rem; margin-top:0;">
          スキャンしたJANコードに一致する商品がありません。項目を入力して登録すると、そのまま入庫明細に追加されます。<span style="color:#dc2626;">■</span> は必須項目です。
        </p>
        <h3 style="margin-bottom:6px;">必須項目</h3>
        <div id="qpRequired" class="row"></div>
        <div style="margin-top:14px;">
          <button type="button" class="secondary" onclick="toggleQpOptional()"><span id="qpOptToggle">▶</span> 任意項目（後から商品マスターで編集できます）</button>
        </div>
        <div id="qpOptionalWrap" style="display:none; margin-top:10px;">
          <div id="qpOptional" class="row"></div>
        </div>
        <p class="msg" id="qpMsg"></p>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
          <button type="button" onclick="saveQuickAdd()">登録して明細に追加</button>
          <button type="button" class="secondary" onclick="closeQuickAdd()">キャンセル</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script src="/gs1.js"></script>
  <script src="/product-picker.js"></script>
  <script>
    let products = [];
    let lines = [];
    let incomingItems = [];

    // 商品検索モーダル。選択後は商品の問屋に合わせて絞り込み直して選択する。
    function openProductSearch() {
      openProductPicker({ defaultSupplierId: document.getElementById('supplier').value || '', onSelect: selectSearchedProduct });
    }
    function selectSearchedProduct(p) {
      const supEl = document.getElementById('supplier');
      let sid = p.pickedSupplierId;
      const cur = supEl.value;
      if (!sid) sid = (cur && p.supplierIds.includes(String(cur))) ? cur : (p.supplierIds[0] || '');
      if (sid) supEl.value = String(sid);
      rebuildProductOptions();
      loadIncoming();
      const sel = document.getElementById('product');
      sel.value = String(p.productId);
      // 新しい商品なのでロット/期限はクリア(現在庫は商品全体の合計を表示)
      document.getElementById('lot').value = '';
      document.getElementById('expiry').value = '';
      fillDefaults();
    }

    async function boot() {
      const user = await initPage('receipts');
      if (!user) return;
      document.getElementById('receiptDate').value = localDateStr();
      products = await getProducts();
      // 問屋の選択肢
      const supSel = document.getElementById('supplier');
      const sr = await api('/api/lookup/suppliers');
      (sr.data.suppliers || []).forEach((s) => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = s.name; supSel.appendChild(o);
      });
      supSel.addEventListener('change', onSupplierChange);
      const sel = document.getElementById('product');
      sel.addEventListener('change', fillDefaults);
      document.getElementById('lot').addEventListener('input', updateCurrentStock);
      document.getElementById('expiry').addEventListener('change', updateCurrentStock);
      rebuildProductOptions(); // 初期は問屋未選択→商品追加不可

      // 未登録商品の新規登録モーダル用の参照データ・既定値を読み込む
      await loadQuickAddRefs();

      // GS1-128スキャン: Enterで確定
      const scan = document.getElementById('scan');
      scan.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); handleScan(scan.value); } });
    }

    // 選択中の商品＋ロット＋使用期限の現在庫を表示
    // 非同期取得のため、後発の呼び出しだけを反映(古い商品の結果が上書きするのを防ぐ)。
    let stockReq = 0;
    async function updateCurrentStock() {
      const pid = document.getElementById('product').value;
      const lot = document.getElementById('lot').value || '';
      const exp = document.getElementById('expiry').value || null;
      const el = document.getElementById('curStock');
      const my = ++stockReq;
      if (!pid) { el.value = 0; return; }
      const { data } = await api('/api/lookup/stocks?productId=' + pid);
      if (my !== stockReq) return; // 古い結果は破棄(レース対策)
      const stocks = data.stocks || [];
      // ロット/期限が未指定なら商品全体の合計(商品選択画面と一致)。指定時はそのロットの在庫。
      if (lot === '' && exp === null) {
        el.value = stocks.reduce((sum, s) => sum + Number(s.stock_quantity || 0), 0);
      } else {
        const row = stocks.find((s) => (s.lot_number || '') === lot && (s.expiry_date || null) === exp);
        el.value = row ? row.stock_quantity : 0;
      }
    }

    async function handleScan(raw) {
      const msg = document.getElementById('scanMsg');
      const value = (raw || '').trim();
      if (!value) return;
      if (!isGs1(value)) { setMsg(msg, 'GS1-128として認識できません（(01)で始まる必要があります）', 'error'); return; }
      const info = extractGs1(value);
      const { ok, status, data } = await api('/api/lookup/by-jan/' + encodeURIComponent(info.jan));
      if (!ok) {
        // 未登録(404)ならその場で新規登録モーダルを開く。それ以外はエラー表示。
        if (status === 404) { openQuickAdd({ jan: info.jan, lot: info.lot, expiry: info.expiry }); return; }
        setMsg(msg, `${data.error || '照合失敗'}（JAN:${info.jan}）`, 'error'); return;
      }
      const p = data.product;
      const row = finishScanWithProduct(p, info.lot, info.expiry);
      if (!row) { setMsg(msg, `読取: ${p.productName}（この問屋の商品詳細が見つかりません）`, 'error'); return; }
      setMsg(msg, `追加: ${p.productName} / ロット:${info.lot || '-'} / 期限:${info.expiry || '-'} → 箱数:${row.receiptQuantity}`, 'ok');
      // 連続スキャンできるよう読取欄をクリアしてフォーカスを戻す
      document.getElementById('scan').value = '';
      document.getElementById('scan').focus();
    }

    // 照合できた商品(既存/新規作成)をフォームに反映し、スキャンしたロット・期限で明細に追加する。
    // 同一(商品+ロット+期限)は行を増やさず箱数(入庫数)+1。戻り値=集約後の明細行(nullは詳細未紐付け)。
    function finishScanWithProduct(p, lot, expiry) {
      const supEl = document.getElementById('supplier');
      if (p.supplierId) { supEl.value = p.supplierId; rebuildProductOptions(); loadIncoming(); }
      document.getElementById('product').value = p.productId;
      document.getElementById('pack').value = p.packSize;
      document.getElementById('lot').value = lot || '';
      document.getElementById('expiry').value = expiry || '';
      document.getElementById('qty').value = 1;
      updateCurrentStock();
      const cur = currentDetail();
      if (!cur || !cur.detail) return null;
      const line = {
        productId: p.productId,
        productName: p.productName,
        productDetailId: cur.detail.productDetailId,
        lotNumber: lot || '',
        expiryDate: expiry || null,
        receiptQuantity: 1,
        packSize: Number(document.getElementById('pack').value) || Number(cur.detail.packSize) || 1,
        // 単価は画面では扱わず、商品マスターの単価を記録する(支払・返品集計の元)
        unitPrice: cur.detail.unitPrice != null ? Number(cur.detail.unitPrice) : 0,
        barcode: cur.detail.barcodeIssueFlag,
        note: '',
      };
      return addOrAggregate(line);
    }

    function currentDetail() {
      const pid = document.getElementById('product').value;
      const p = products.find((x) => String(x.productId) === String(pid));
      if (!p) return null;
      const sid = document.getElementById('supplier').value;
      const detail = (p.details || []).find((d) => String(d.supplierId) === String(sid)) || p.details[0];
      return { product: p, detail };
    }

    // 問屋変更時: 商品を「その問屋の商品のみ」に絞り、入庫予定も更新
    function onSupplierChange() { rebuildProductOptions(); loadIncoming(); }
    function rebuildProductOptions() {
      const sid = document.getElementById('supplier').value;
      const sel = document.getElementById('product');
      const addBtn = document.getElementById('addLineBtn');
      // 問屋未選択なら商品追加不可
      if (!sid) {
        sel.innerHTML = '<option value="">（先に問屋を選択してください）</option>';
        sel.disabled = true;
        if (addBtn) addBtn.disabled = true;
        return;
      }
      sel.disabled = false;
      if (addBtn) addBtn.disabled = false;
      const list = products.filter((p) => (p.details || []).some((d) => String(d.supplierId) === String(sid)));
      sel.innerHTML = list.map((p) => {
        const d = (p.details || []).find((x) => String(x.supplierId) === String(sid)) || p.details[0];
        return `<option value="${p.productId}">${attr(p.productName)}${d && d.spec ? '（' + attr(d.spec) + '）' : ''}</option>`;
      }).join('') || '<option value="">（この問屋の商品がありません）</option>';
      fillDefaults();
    }
    function fillDefaults() {
      const cur = currentDetail();
      if (!cur || !cur.detail) return;
      document.getElementById('pack').value = cur.detail.packSize;
      updateCurrentStock();
    }

    // 同一行の集約キー: 商品 + ロット + 使用期限
    function lineKey(l) { return [l.productId, l.lotNumber || '', l.expiryDate || ''].join('|'); }
    // 明細に追加。同一キー(商品+ロット+期限)が既にあれば行を増やさず箱数(入庫数)を加算する。
    // 戻り値: 対象の明細行(集約後)
    function addOrAggregate(line) {
      const key = lineKey(line);
      const ex = lines.find((l) => lineKey(l) === key);
      if (ex) { ex.receiptQuantity += line.receiptQuantity; renderLines(); return ex; }
      lines.push(line); renderLines(); return line;
    }

    function addLine() {
      if (!document.getElementById('supplier').value) { setMsg(document.getElementById('addMsg'), '先に問屋を選択してください', 'error'); return; }
      const cur = currentDetail();
      if (!cur || !cur.detail) return;
      const qty = Number(document.getElementById('qty').value);
      const pack = Number(document.getElementById('pack').value);
      if (qty < 1 || pack < 1) { setMsg(document.getElementById('addMsg'), '個数・梱包数は1以上', 'error'); return; }
      const line = {
        productId: cur.product.productId,
        productName: cur.product.productName,
        productDetailId: cur.detail.productDetailId,
        lotNumber: document.getElementById('lot').value,
        expiryDate: document.getElementById('expiry').value || null,
        receiptQuantity: qty,
        packSize: pack,
        // 単価は画面では扱わず、商品マスターの単価を記録する(支払・返品集計の元)
        unitPrice: cur.detail.unitPrice != null ? Number(cur.detail.unitPrice) : 0,
        barcode: cur.detail.barcodeIssueFlag,
        note: document.getElementById('lineNote').value || '',
      };
      addOrAggregate(line);
      document.getElementById('lineNote').value = '';
      setMsg(document.getElementById('addMsg'), '', '');
    }

    function renderLines() {
      const tbody = document.querySelector('#lineTable tbody');
      tbody.innerHTML = '';
      lines.forEach((l, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td>${attr(l.productName)}</td>` +
          `<td><input value="${attr(l.lotNumber)}" oninput="lines[${i}].lotNumber=this.value" placeholder="空欄可" style="width:90px;" /></td>` +
          `<td><input type="date" value="${l.expiryDate || ''}" oninput="lines[${i}].expiryDate=this.value||null" style="width:140px;" /></td>` +
          `<td><input type="number" min="1" step="1" value="${l.receiptQuantity}" oninput="setLineQty(${i}, this.value)" style="width:80px; text-align:right;" /></td>` +
          `<td style="text-align:right;">${l.packSize}</td>` +
          `<td style="text-align:right;" id="baraCell_${i}">${l.receiptQuantity * l.packSize}</td>` +
          `<td>${l.barcode ? '○' : ''}</td>` +
          `<td><input value="${attr(l.note)}" oninput="lines[${i}].note=this.value" placeholder="任意" style="width:130px;" /></td>` +
          `<td><button class="danger" onclick="removeLine(${i})">削除</button></td>`;
        tbody.appendChild(tr);
      });
    }
    // 明細の入庫個数(箱数)を手修正。1以上に丸め、加算バラ数を即時更新する。
    function setLineQty(i, v) {
      let n = Math.floor(Number(v));
      if (!(n >= 1)) n = 1;
      lines[i].receiptQuantity = n;
      const cell = document.getElementById('baraCell_' + i);
      if (cell) cell.textContent = n * lines[i].packSize;
    }
    function removeLine(i) { lines.splice(i, 1); renderLines(); }

    // 入庫予定(この問屋の発注済み・未入庫)を読み込み
    async function loadIncoming() {
      const sid = document.getElementById('supplier').value;
      const area = document.getElementById('incomingArea');
      const tbody = document.querySelector('#incomingTable tbody');
      if (!sid) { area.style.display = 'none'; tbody.innerHTML = ''; incomingItems = []; return; }
      const { data } = await api('/api/orders/incoming?supplierId=' + encodeURIComponent(sid));
      incomingItems = data.items || [];
      if (incomingItems.length === 0) { area.style.display = 'none'; tbody.innerHTML = ''; return; }
      area.style.display = 'block';
      document.getElementById('incAll').checked = false;
      tbody.innerHTML = incomingItems.map((r, i) =>
        `<tr><td style="text-align:center;"><input type="checkbox" class="incpick" data-idx="${i}" style="width:auto;" /></td>` +
        `<td>${r.order_date || '-'}</td><td>${attr(r.product_name)}</td>` +
        `<td style="text-align:right;">${r.order_quantity}</td><td style="text-align:right;">${r.remaining_bara}</td><td style="text-align:right;">${r.remaining_packs}</td></tr>`
      ).join('');
    }
    function toggleIncoming(v) { document.querySelectorAll('.incpick').forEach((c) => { c.checked = v; }); }

    // 選択した入庫予定を明細に追加(発注明細IDを紐付け=部分入庫対応)
    function addSelectedIncoming() {
      const picks = [...document.querySelectorAll('.incpick:checked')];
      if (picks.length === 0) { setMsg(document.getElementById('addMsg'), '入庫予定を選択してください', 'error'); return; }
      picks.forEach((c) => {
        const r = incomingItems[Number(c.dataset.idx)];
        // マスター単価を既定に(明細で修正可)
        const p = products.find((x) => String(x.productId) === String(r.product_id));
        const d = p && (p.details || []).find((x) => String(x.productDetailId) === String(r.product_detail_id));
        lines.push({
          productId: r.product_id, productName: r.product_name, productDetailId: r.product_detail_id,
          lotNumber: '', expiryDate: null,
          receiptQuantity: r.remaining_packs || 1, packSize: r.pack_size,
          unitPrice: d && d.unitPrice != null ? d.unitPrice : 0,
          barcode: r.barcode_issue_flag, note: '', orderDetailId: r.order_detail_id,
        });
        c.checked = false;
      });
      document.getElementById('incAll').checked = false;
      renderLines();
      setMsg(document.getElementById('addMsg'), `${picks.length}件を明細に追加しました。ロット・使用期限を入力してください`, 'ok');
    }

    // input value属性用のエスケープ
    function attr(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function submitReceipt() {
      const msg = document.getElementById('resultMsg');
      if (lines.length === 0) { setMsg(msg, '明細がありません', 'error'); return; }
      const supplierId = document.getElementById('supplier').value;
      if (!supplierId) { setMsg(msg, '問屋を選択してください', 'error'); return; }
      const body = {
        receiptDate: document.getElementById('receiptDate').value,
        supplierId,
        note: document.getElementById('note').value,
        details: lines.map((l) => ({
          productId: l.productId, productDetailId: l.productDetailId,
          lotNumber: l.lotNumber, expiryDate: l.expiryDate,
          receiptQuantity: l.receiptQuantity, packSize: l.packSize,
          unitPrice: l.unitPrice, note: l.note || '', orderDetailId: l.orderDetailId,
        })),
      };
      const { ok, data } = await api('/api/receipts', { method: 'POST', body: JSON.stringify(body) });
      if (!ok) { setMsg(msg, data.error || '保存失敗', 'error'); return; }
      const bc = data.details.reduce((a, d) => a + d.barcodesIssued, 0);
      setMsg(msg, `入庫を保存しました（入庫ID:${data.receiptId}／発行バーコード:${bc}本）`, 'ok');
      // バーコード印刷(チェック時＆発行があった場合のみ)。設定はバーコード印刷画面と共有。
      if (document.getElementById('bcPrintChk').checked && bc > 0) {
        window.open('/barcode-print.html?receiptId=' + data.receiptId, '_blank');
      }
      if (document.getElementById('printChk').checked) {
        window.open('/print.html?type=receipts&id=' + data.receiptId, '_blank');
      }
      lines = []; renderLines(); await updateCurrentStock();
    }

    // ===== 未登録商品の新規登録(クイック追加) =====
    // grp: 'p'=商品(products), 'd'=商品詳細(product_details)。col=実DBカラム名。
    function qf(key, label, type, grp, col, ref, readonly) { return { key, label, type, grp, col, ref: ref || null, readonly: !!readonly }; }
    const QP_REQUIRED = [
      qf('name', '商品名', 'text', 'p', 'name'),
      qf('department_id', '部門', 'ref', 'p', 'department_id', 'departments'),
      qf('category_id', '分類', 'ref', 'p', 'category_id', 'categories'),
      qf('supplier_id', '問屋', 'ref', 'd', 'supplier_id', 'suppliers'),
      qf('shelf_id', '棚', 'ref', 'p', 'shelf_id', 'shelves'),
      qf('maker_id', 'メーカー', 'ref', 'd', 'maker_id', 'makers'),
      qf('pack_size', '梱包数', 'number', 'd', 'pack_size'),
      qf('apply_start_date', '適用開始日', 'date', 'd', 'apply_start_date'),
      qf('apply_end_date', '適用終了日', 'date', 'd', 'apply_end_date'),
      qf('jan_code', 'JANコード', 'text', 'd', 'jan_code', null, true),
    ];
    const QP_OPTIONAL = [
      qf('kana', 'カナ', 'text', 'p', 'kana'),
      qf('management_code', '管理コード', 'text', 'p', 'management_code'),
      qf('qc_target_flag', '試薬管理対象', 'checkbox', 'p', 'qc_target_flag'),
      qf('product_note', '商品備考', 'text', 'p', 'note'),
      qf('quantity_unit', '数量単位', 'text', 'd', 'quantity_unit'),
      qf('pack_unit', '梱包単位', 'text', 'd', 'pack_unit'),
      qf('spec', '規格', 'text', 'd', 'spec'),
      qf('unit_price', '単価', 'number', 'd', 'unit_price'),
      qf('test_count', 'テスト数', 'number', 'd', 'test_count'),
      qf('min_quantity', '最低個数', 'number', 'd', 'min_quantity'),
      qf('order_quantity', '発注個数', 'number', 'd', 'order_quantity'),
      qf('barcode_issue_flag', 'バーコード発行', 'checkbox', 'd', 'barcode_issue_flag'),
      qf('expiry_warn_days', '警告日数(0=未設定)', 'number', 'd', 'expiry_warn_days'),
      qf('open_life_days', '開封後有効日数(0=無効)', 'number', 'd', 'open_life_days'),
      qf('detail_note', '詳細備考', 'text', 'd', 'note'),
    ];

    const QP_REFS = {};                 // departments/categories/suppliers/shelves/makers -> [{id,name}]
    let qpDefaults = { start: '', end: '' };
    let qpPending = null;               // スキャンから引き継ぐ { lot, expiry }

    function qpDateFromOffset(days) { const d = new Date(); d.setDate(d.getDate() + (Number(days) || 0)); return localDateStr(d); }

    // JANメーカーコードの前方一致でメーカーを自動選択する(最長一致を優先)。
    // 該当が無ければ未選択のまま(手動選択)。誤りがあればユーザーが選び直せる。
    function qpAutoSelectMaker(jan) {
      const el = document.getElementById('qp_maker_id');
      if (!el) return;
      const digits = String(jan || '').replace(/\D/g, '');
      if (!digits) return;
      let bestId = '', bestLen = 0;
      (QP_REFS.makers || []).forEach((m) => {
        const code = String(m.jan_maker_code || '').trim();
        if (code && digits.startsWith(code) && code.length > bestLen) { bestId = m.id; bestLen = code.length; }
      });
      if (bestId) el.value = String(bestId);
    }

    async function loadQuickAddRefs() {
      const [dep, cat, mak, shv] = await Promise.all([
        api('/api/lookup/departments'), api('/api/lookup/categories'),
        api('/api/lookup/makers'), api('/api/lookup/shelves'),
      ]);
      QP_REFS.departments = (dep.data && dep.data.departments) || [];
      QP_REFS.categories = (cat.data && cat.data.categories) || [];
      QP_REFS.makers = (mak.data && mak.data.makers) || [];
      QP_REFS.shelves = (shv.data && shv.data.shelves) || [];
      // 問屋は入庫画面で読込済みの選択肢を流用
      QP_REFS.suppliers = [...document.querySelectorAll('#supplier option')].filter((o) => o.value).map((o) => ({ id: o.value, name: o.textContent }));
      // 適用期間の既定(基本設定の「本日＋日数」)
      const s = await api('/api/settings');
      const st = (s.data && s.data.settings) || {};
      const so = (st.pd_apply_start_offset_days !== undefined && st.pd_apply_start_offset_days !== '') ? st.pd_apply_start_offset_days : 0;
      const eo = (st.pd_apply_end_offset_days !== undefined && st.pd_apply_end_offset_days !== '') ? st.pd_apply_end_offset_days : 3650;
      qpDefaults = { start: qpDateFromOffset(so), end: qpDateFromOffset(eo) };
    }

    function qpRenderField(def, required) {
      const div = document.createElement('div');
      const mark = required ? '<span style="color:#dc2626;">■</span> ' : '';
      let inner = `<label>${mark}${def.label}</label>`;
      if (def.type === 'ref') {
        const rows = QP_REFS[def.ref] || [];
        inner += `<select id="qp_${def.key}"><option value="">(未選択)</option>` +
          rows.map((r) => `<option value="${r.id}">${attr(r.name)}</option>`).join('') + `</select>`;
      } else if (def.type === 'checkbox') {
        inner += `<input type="checkbox" id="qp_${def.key}" style="width:auto;" />`;
      } else {
        const ro = def.readonly ? ' readonly style="background:#eef2f5;"' : '';
        inner += `<input type="${def.type}" id="qp_${def.key}"${ro} />`;
      }
      div.innerHTML = inner;
      return div;
    }
    function qpRenderForm() {
      const rq = document.getElementById('qpRequired'); rq.innerHTML = '';
      QP_REQUIRED.forEach((d) => rq.appendChild(qpRenderField(d, true)));
      const op = document.getElementById('qpOptional'); op.innerHTML = '';
      QP_OPTIONAL.forEach((d) => op.appendChild(qpRenderField(d, false)));
    }

    function toggleQpOptional() {
      const w = document.getElementById('qpOptionalWrap');
      const t = document.getElementById('qpOptToggle');
      const show = w.style.display === 'none';
      w.style.display = show ? 'block' : 'none';
      t.textContent = show ? '▼' : '▶';
    }

    // 未登録スキャン時に呼ぶ。info={jan,lot,expiry}
    function openQuickAdd(info) {
      qpPending = { lot: info.lot || '', expiry: info.expiry || null };
      qpRenderForm();
      document.getElementById('qpOptionalWrap').style.display = 'none';
      document.getElementById('qpOptToggle').textContent = '▶';
      // 既定値: JAN=スキャン値、問屋=選択中、棚=先頭、梱包数=1、適用期間=設定既定
      document.getElementById('qp_jan_code').value = info.jan || '';
      const sup = document.getElementById('supplier').value;
      if (sup) document.getElementById('qp_supplier_id').value = sup;
      const shv = QP_REFS.shelves || [];
      if (shv.length) document.getElementById('qp_shelf_id').value = shv[0].id;
      // メーカー自動選択(JANメーカーコードの前方一致・最長一致)。外れていれば手動で選び直せる。
      qpAutoSelectMaker(info.jan || '');
      document.getElementById('qp_pack_size').value = 1;
      document.getElementById('qp_apply_start_date').value = qpDefaults.start;
      document.getElementById('qp_apply_end_date').value = qpDefaults.end;
      setMsg(document.getElementById('qpMsg'), '', '');
      document.getElementById('qpOverlay').style.display = 'block';
      const nm = document.getElementById('qp_name'); if (nm) nm.focus();
    }
    function closeQuickAdd() {
      document.getElementById('qpOverlay').style.display = 'none';
      qpPending = null;
      document.getElementById('scan').focus();
    }

    function qpCollect() {
      const product = {}, detail = {};
      [...QP_REQUIRED, ...QP_OPTIONAL].forEach((def) => {
        const el = document.getElementById('qp_' + def.key);
        if (!el) return;
        const v = (def.type === 'checkbox') ? el.checked : el.value;
        (def.grp === 'p' ? product : detail)[def.col] = v;
      });
      return { product, detail };
    }

    async function saveQuickAdd() {
      const msg = document.getElementById('qpMsg');
      const { product, detail } = qpCollect();
      // クライアント側の必須チェック(分かりやすく)
      const req = [
        [product.name, '商品名'], [product.department_id, '部門'], [product.category_id, '分類'],
        [product.shelf_id, '棚'], [detail.supplier_id, '問屋'], [detail.maker_id, 'メーカー'],
        [detail.jan_code, 'JANコード'], [detail.apply_start_date, '適用開始日'], [detail.apply_end_date, '適用終了日'],
      ];
      const miss = req.filter(([v]) => !String(v == null ? '' : v).trim()).map((x) => x[1]);
      if (!(Number(detail.pack_size) >= 1)) miss.push('梱包数(1以上)');
      if (miss.length) { setMsg(msg, '必須項目が未入力です：' + miss.join('、'), 'error'); return; }
      setMsg(msg, '登録中…', 'ok');
      const { ok, data } = await api('/api/quick-product', { method: 'POST', body: JSON.stringify({ product, detail }) });
      if (!ok) { setMsg(msg, data.error || '登録に失敗しました', 'error'); return; }
      const p = data.product;
      if (!p) { setMsg(msg, '登録しましたが商品情報を取得できませんでした', 'error'); return; }
      upsertProduct(p);
      const lot = qpPending ? qpPending.lot : '';
      const expiry = qpPending ? qpPending.expiry : null;
      closeQuickAdd();
      const row = finishScanWithProduct(p, lot, expiry);
      const scanMsg = document.getElementById('scanMsg');
      if (!row) { setMsg(scanMsg, `登録: ${p.productName}（商品詳細の紐付けに失敗）`, 'error'); return; }
      const label = data.existing ? '既存商品を使用' : '新規登録';
      setMsg(scanMsg, `${label}: ${p.productName} / ロット:${lot || '-'} / 期限:${expiry || '-'} → 箱数:${row.receiptQuantity}`, 'ok');
      document.getElementById('scan').value = '';
      document.getElementById('scan').focus();
    }

    // 作成/照合した商品を、入庫画面の商品配列(lookup形式)に反映する
    function upsertProduct(p) {
      let entry = products.find((x) => String(x.productId) === String(p.productId));
      if (!entry) {
        entry = { productId: p.productId, productName: p.productName, managementCode: p.managementCode, qcTarget: p.qcTarget, details: [] };
        products.push(entry);
      }
      if (!entry.details.some((d) => String(d.productDetailId) === String(p.productDetailId))) {
        entry.details.push({
          productDetailId: p.productDetailId, spec: p.spec, packSize: p.packSize, unitPrice: p.unitPrice,
          supplierId: p.supplierId, supplierName: p.supplierName, barcodeIssueFlag: p.barcodeIssueFlag, janCode: p.janCode,
        });
      }
      return entry;
    }

    boot();
  </script>
</body>
