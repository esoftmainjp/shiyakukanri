<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>発注 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>問屋を選択</h2>
      <p style="font-size:0.85rem; color:#555;">発注は問屋ごとに行います。まず問屋を選択してください。選択した問屋の発注のみ表示・操作できます。発注日・備考は「発注する」際に反映されます。</p>
      <div class="row">
        <div>
          <label>発注日</label>
          <input type="date" id="orderDate" />
        </div>
        <div style="flex:2; min-width:220px;">
          <label>問屋 <span style="color:#c0392b;">*</span></label>
          <select id="supplier" onchange="onSupplierChange()"><option value="">（選択してください）</option></select>
        </div>
        <div style="flex:2;">
          <label>備考（発注全体）</label>
          <input id="note" placeholder="任意" />
        </div>
      </div>
    </div>

    <div class="card" id="addCard" style="display:none;">
      <h2>バーコードで発注予定に追加</h2>
      <p style="font-size:0.85rem; color:#555;">選択中の問屋の商品バーコード（独自 / GS1-128）を読み取り、発注予定（未発注）に追加します。</p>
      <div class="row">
        <div style="flex:2;"><label class="barcode-label">バーコードを読み取り/入力</label><input id="obc" class="barcode-input" placeholder="ここにスキャン（Enterで追加）" /></div>
        <div style="flex:0;"><label>発注数(梱包)</label><input type="number" id="obcQty" value="1" min="1" style="width:100px;" /></div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="addByBarcode()">追加</button></div>
      </div>
      <div class="row" style="align-items:flex-end;">
        <div style="flex:2;"><label>商品を選んで追加</label><select id="addProduct"><option value="">（先に問屋を選択してください）</option></select></div>
        <div style="flex:0;"><label>発注数(梱包)</label><input type="number" id="addProductQty" value="1" min="1" style="width:100px;" /></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="addBySelect()">追加</button></div>
      </div>
      <p class="msg" id="obcMsg"></p>
    </div>

    <div class="card" id="listCard" style="display:none;">
      <h2>発注一覧</h2>
      <div class="row">
        <div style="flex:0; min-width:160px;">
          <label>状態</label>
          <select id="statusFilter" onchange="load()">
            <option value="unordered">未発注</option>
            <option value="ordered">発注済み</option>
            <option value="received">入庫済み</option>
            <option value="canceled">キャンセル</option>
            <option value="">すべて</option>
          </select>
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="load()">再読み込み</button></div>
      </div>
      <p class="msg" id="msg"></p>
      <div id="orderList"></div>
    </div>

    <p class="msg" id="pickMsg" style="padding:0 4px;">問屋を選択すると発注を表示します。</p>
  </main>

  <script src="/common.js"></script>
  <script src="/gs1.js"></script>
  <script>
    let products = [];
    let canEdit = false; // 削除は管理者/一般のみ
    let canceledView = false; // キャンセル絞込表示中か

    async function boot() {
      const user = await initPage('orders');
      if (!user) return;
      canEdit = (user.userType === 'admin' || user.userType === 'general');
      products = await getProducts();
      document.getElementById('orderDate').value = new Date().toISOString().slice(0, 10);
      // 問屋コンボを構築(初期未選択)
      const supSel = document.getElementById('supplier');
      const sr = await api('/api/lookup/suppliers');
      (sr.data.suppliers || []).forEach((s) => {
        const o = document.createElement('option');
        o.value = s.id; o.textContent = s.name; supSel.appendChild(o);
      });
      document.getElementById('obc').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addByBarcode(); }
      });
    }

    // 問屋を選択したら、その問屋の商品リストを構築し発注一覧を表示
    function onSupplierChange() {
      const sid = document.getElementById('supplier').value;
      const addCard = document.getElementById('addCard');
      const listCard = document.getElementById('listCard');
      const pickMsg = document.getElementById('pickMsg');
      if (!sid) {
        addCard.style.display = 'none';
        listCard.style.display = 'none';
        pickMsg.style.display = '';
        document.getElementById('orderList').innerHTML = '';
        return;
      }
      pickMsg.style.display = 'none';
      addCard.style.display = '';
      listCard.style.display = '';
      // 商品選択肢(この問屋のみ)
      const sel = document.getElementById('addProduct');
      const opts = products
        .map((p) => ({ p, d: (p.details || []).find((d) => String(d.supplierId) === String(sid)) }))
        .filter((x) => x.d)
        .map((x) => `<option value='${JSON.stringify({ productId: x.p.productId, productDetailId: x.d.productDetailId })}'>${escHtml(x.p.productName)}</option>`)
        .join('');
      sel.innerHTML = opts || '<option value="">（対象商品なし）</option>';
      load();
    }

    // バーコードから商品を特定し、発注予定(未発注)に追加(選択中の問屋のみ)
    async function addByBarcode() {
      const msg = document.getElementById('obcMsg');
      const sid = document.getElementById('supplier').value;
      if (!sid) { setMsg(msg, '先に問屋を選択してください', 'error'); return; }
      const value = document.getElementById('obc').value.trim();
      if (!value) return;
      let productDetailId = null, label = '';
      if (isGs1(value)) {
        const info = extractGs1(value);
        const r = await api('/api/lookup/by-jan/' + encodeURIComponent(info.jan));
        if (!r.ok) { setMsg(msg, `${r.data.error || '照合失敗'}（JAN:${info.jan}）`, 'error'); return; }
        productDetailId = r.data.product.productDetailId; label = r.data.product.productName;
      } else {
        const r = await api('/api/lookup/barcode/' + encodeURIComponent(value));
        if (!r.ok) { setMsg(msg, r.data.error || '照会失敗', 'error'); return; }
        productDetailId = r.data.barcode.product_detail_id; label = r.data.barcode.product_name;
      }
      if (!productDetailId) { setMsg(msg, '商品詳細を特定できませんでした', 'error'); return; }
      const qty = Number(document.getElementById('obcQty').value) || 1;
      const { ok, data } = await api('/api/orders/add-product', { method: 'POST', body: JSON.stringify({ productDetailId, orderQuantity: qty, supplierId: sid }) });
      if (!ok) { setMsg(msg, data.error || '追加に失敗しました', 'error'); return; }
      setMsg(msg, `${label} を発注予定に追加しました（発注数:${data.orderQuantity}）`, 'ok');
      document.getElementById('obc').value = '';
      document.getElementById('statusFilter').value = 'unordered';
      load();
    }

    // 商品選択(この問屋のみ)から発注予定に追加
    async function addBySelect() {
      const msg = document.getElementById('obcMsg');
      const sid = document.getElementById('supplier').value;
      if (!sid) { setMsg(msg, '先に問屋を選択してください', 'error'); return; }
      const sel = document.getElementById('addProduct');
      if (!sel || !sel.value) { setMsg(msg, '追加する商品を選択してください', 'error'); return; }
      const picked = JSON.parse(sel.value);
      const qty = Number(document.getElementById('addProductQty').value) || 1;
      const { ok, data } = await api('/api/orders/add-product', { method: 'POST', body: JSON.stringify({ productDetailId: picked.productDetailId, orderQuantity: qty, supplierId: sid }) });
      if (!ok) { setMsg(msg, data.error || '追加に失敗しました', 'error'); return; }
      setMsg(msg, '発注予定に追加しました（発注数:' + data.orderQuantity + '）', 'ok');
      document.getElementById('statusFilter').value = 'unordered';
      load();
    }

    async function load() {
      const sid = document.getElementById('supplier').value;
      if (!sid) return;
      const status = document.getElementById('statusFilter').value;
      canceledView = (status === 'canceled');
      const { data } = await api('/api/orders?supplierId=' + encodeURIComponent(sid) + (status ? '&status=' + status : ''));
      const wrap = document.getElementById('orderList');
      let orders = data.orders || [];
      if (canceledView) {
        // 一部キャンセルの発注(状態はcanceledでない)は、キャンセルした商品のみ表示
        orders = orders
          .map((o) => o.order_status === 'canceled'
            ? o
            : Object.assign({}, o, { details: (o.details || []).filter((d) => d.canceled_flag) }))
          .filter((o) => (o.details || []).length > 0);
      }
      if (orders.length === 0) { wrap.innerHTML = '<p>該当する発注はありません。</p>'; return; }
      wrap.innerHTML = orders.map(renderOrder).join('');
    }

    function renderOrder(o) {
      const editable = o.order_status === 'unordered';
      // 明細ごとの操作: 未発注→削除 / 発注済み→キャンセル(商品ごと)。管理者・一般のみ。
      const rows = o.details.map((d) => {
        const isCanceled = d.canceled_flag;
        const qtyCell = editable
          ? `<input type="number" id="oq_${d.id}" value="${d.order_quantity}" min="1" style="width:80px; text-align:right;" onchange="updateQty('${o.id}','${d.id}')" />`
          : d.order_quantity;
        const noteCell = editable
          ? `<input value="${escHtml(d.note)}" placeholder="任意" style="width:130px;" onchange="updateNote('${o.id}','${d.id}', this.value)" />`
          : escHtml(d.note);
        const btnStyle = 'style="padding:4px 10px; font-size:0.82rem;"';
        let actionCell = '<td></td>';
        if (isCanceled) actionCell = '<td style="text-align:center; color:#b23b3b;">キャンセル済</td>';
        else if (canEdit && o.order_status === 'unordered') {
          const holdBtn = d.held_flag
            ? `<button ${btnStyle} onclick="holdDetail('${o.id}','${d.id}',false)">解除</button>`
            : `<button class="secondary" ${btnStyle} onclick="holdDetail('${o.id}','${d.id}',true)">保留</button>`;
          actionCell = `<td style="text-align:center; white-space:nowrap;"><button class="danger" ${btnStyle} onclick="delDetail('${o.id}','${d.id}','削除')">削除</button> ${holdBtn}</td>`;
        } else if (canEdit && o.order_status === 'ordered') actionCell = `<td style="text-align:center;"><button class="danger" ${btnStyle} onclick="cancelDetail('${o.id}','${d.id}')">キャンセル</button></td>`;
        const rowStyle = (isCanceled || d.held_flag) ? ' style="color:#999;"' : '';
        const nameCell = isCanceled
          ? `<span style="text-decoration:line-through;">${escHtml(d.product_name)}</span>`
          : (d.held_flag ? `${escHtml(d.product_name)} <span class="pill canceled">保留中</span>` : escHtml(d.product_name));
        return `<tr${rowStyle}><td>${nameCell}</td>` +
          `<td style="text-align:right;">${d.order_bara}</td>` +
          `<td style="text-align:right;">${d.pack_size}</td>` +
          `<td style="text-align:right;">${d.planned_order_quantity}</td>` +
          `<td style="text-align:right;">${qtyCell}</td>` +
          `<td>${noteCell}</td>${actionCell}</tr>`;
      }).join('');
      const cancelBtn = canEdit ? ` <button class="danger" onclick="cancelOrder('${o.id}')">発注をキャンセル</button>` : '';
      // キャンセル絞込表示中は操作ボタンを出さない(閲覧用)
      const actions = canceledView
        ? ''
        : o.order_status === 'unordered'
          ? `<button onclick="place('${o.id}')">発注する</button>` +
            ` <label style="display:inline-flex; align-items:center; gap:6px; margin-left:10px; font-weight:normal;"><input type="checkbox" id="print_${o.id}" style="width:auto;" />発注後に発注書を印刷</label>`
          : o.order_status === 'ordered'
            ? `<button class="secondary" onclick="printOrder('${o.id}')">発注書を印刷</button>${cancelBtn}`
            : '';
      // キャンセル画面で「一部キャンセル」(発注自体はキャンセルでない)を明示
      const partialTag = (canceledView && o.order_status !== 'canceled')
        ? ` <span class="pill canceled">一部キャンセル</span>`
        : '';
      return `<div class="card" style="background:#fafcfe;">
        <div class="row" style="align-items:center;">
          <div><strong>発注 #${o.id}</strong> <span class="pill ${o.order_status}">${statusLabel(o.order_status)}</span>${partialTag}</div>
          <div>問屋: ${escHtml(o.supplier_name) || '-'}</div>
          <div>発注日: ${o.order_date || '-'}</div>
          <div class="spacer"></div>
        </div>
        <table><thead><tr><th>商品</th><th>発注バラ数</th><th>商品内容数</th><th>発注推奨数(梱包)</th><th>発注数(梱包)</th><th>備考</th><th></th></tr></thead><tbody>${rows}</tbody></table>
        <div style="margin-top:10px;">${actions}</div>
      </div>`;
    }

    function statusLabel(s) {
      return { unordered: '未発注', ordered: '発注済み', received: '入庫済み', canceled: 'キャンセル' }[s] || s;
    }
    function escHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function place(id) {
      const note = document.getElementById('note').value;
      const orderDate = document.getElementById('orderDate').value;
      const wantPrint = (document.getElementById('print_' + id) || {}).checked;
      const { ok, data } = await api(`/api/orders/${id}/place`, { method: 'POST', body: JSON.stringify({ note, orderDate }) });
      setMsg(document.getElementById('msg'), ok ? `発注 #${id} を発注済みにしました` : (data.error || '失敗'), ok ? 'ok' : 'error');
      if (ok && wantPrint) printOrder(id);
      load();
    }
    function printOrder(id) { window.open('/print.html?type=orders&id=' + id, '_blank'); }
    // 発注数の変更(未発注のみ)
    async function updateQty(orderId, detailId) {
      const el = document.getElementById('oq_' + detailId);
      const orderQuantity = Number(el.value) || 1;
      const { ok, data } = await api(`/api/orders/${orderId}/details/${detailId}`, {
        method: 'PATCH', body: JSON.stringify({ orderQuantity }),
      });
      if (!ok) { setMsg(document.getElementById('msg'), data.error || '発注数の変更に失敗', 'error'); return; }
      el.value = data.orderQuantity;
      setMsg(document.getElementById('msg'), '発注数を変更しました', 'ok');
    }
    // 明細の備考(商品ごと)を変更(未発注のみ)
    async function updateNote(orderId, detailId, note) {
      const { ok, data } = await api(`/api/orders/${orderId}/details/${detailId}`, {
        method: 'PATCH', body: JSON.stringify({ note }),
      });
      setMsg(document.getElementById('msg'), ok ? '備考を変更しました' : (data.error || '備考の変更に失敗'), ok ? 'ok' : 'error');
    }
    // 発注済みの発注をキャンセル(発注単位。状態をキャンセルにして一覧に残す)
    async function cancelOrder(id) {
      if (!confirm(`発注 #${id} をキャンセルします。よろしいですか？\n（発注全体をキャンセル状態にします）`)) return;
      const { ok, data } = await api(`/api/orders/${id}/cancel`, { method: 'POST' });
      setMsg(document.getElementById('msg'), ok ? `発注 #${id} をキャンセルしました` : (data.error || '失敗'), ok ? 'ok' : 'error');
      load();
    }
    // 明細(商品)ごとの削除(未発注のみ)
    async function delDetail(orderId, detailId, label) {
      if (!confirm(`この商品を発注から${label}します。よろしいですか？`)) return;
      const { ok, data } = await api(`/api/orders/${orderId}/details/${detailId}`, { method: 'DELETE' });
      setMsg(document.getElementById('msg'), ok ? (data.message || `商品を${label}しました`) : (data.error || `${label}できませんでした`), ok ? 'ok' : 'error');
      load();
    }
    // 明細(商品)の保留/解除(未発注のみ)。保留は発注から外れ、発注時は退避して残る。
    async function holdDetail(orderId, detailId, held) {
      const { ok, data } = await api(`/api/orders/${orderId}/details/${detailId}/hold`, { method: 'POST', body: JSON.stringify({ held }) });
      setMsg(document.getElementById('msg'), ok ? (held ? '保留にしました（発注対象から外れます）' : '保留を解除しました') : (data.error || '失敗'), ok ? 'ok' : 'error');
      load();
    }

    // 明細(商品)ごとのキャンセル(発注済みのみ)
    async function cancelDetail(orderId, detailId) {
      if (!confirm('この商品をキャンセルします。よろしいですか？')) return;
      const { ok, data } = await api(`/api/orders/${orderId}/details/${detailId}/cancel`, { method: 'POST' });
      setMsg(document.getElementById('msg'), ok ? (data.message || '商品をキャンセルしました') : (data.error || 'キャンセルできませんでした'), ok ? 'ok' : 'error');
      load();
    }

    boot();
  </script>
</body>
</html>
