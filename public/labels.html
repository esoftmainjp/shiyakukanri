<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>バーコード印刷 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    /* ラベルプレビュー(画面表示) */
    .labels { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .label {
      box-sizing: border-box; border: 1px dashed #bbb; padding: 2mm;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden; background: #fff;
    }
    .label svg { max-width: 100%; }
    /* バーコードを優先。周辺文字は小さく・1行に収める */
    .label .txt { width: 100%; text-align: center; line-height: 1.05; margin-top: 0.5mm; }
    .label .pname { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .label .sub { color: #333; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .label input.pick { position: absolute; }
    .label-wrap { position: relative; }
    .label-wrap .pick { position: absolute; top: 2px; left: 2px; z-index: 2; }
    .printed-badge { position: absolute; top: 2px; right: 2px; z-index: 2; background: #c0575d; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 8px; }
    @media print { .printed-badge { display: none !important; } }

    /* 印刷時: ラベルのみ・1ラベル=1ページ */
    @media print {
      header, .no-print { display: none !important; }
      body { margin: 0; background: #fff; }
      main { padding: 0; margin: 0; max-width: none; }
      .labels { display: block; margin: 0; gap: 0; }
      .label-wrap .pick { display: none; }
      .label {
        border: none; padding: 0; page-break-after: always; break-after: page;
        display: flex; align-items: center; justify-content: center;
      }
      .label:last-child { page-break-after: auto; break-after: auto; }
    }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card no-print">
      <h2>バーコード印刷</h2>
      <p>発行済みの独自バーコードを検索し、Brother QL 等の感熱ラベルプリンタで印刷します。<br>
        バーコードの種別（1次元 CODE128／2次元 QRコード）は下の「種別」で切り替えられます（既定は「端末設定」に従います）。</p>
      <div class="row">
        <div><label>発行日(自)</label><input type="date" id="from" /></div>
        <div><label>発行日(至)</label><input type="date" id="to" /></div>
        <div style="flex:2;"><label>商品</label><select id="productId"><option value="">(すべて)</option></select></div>
        <div style="flex:1;"><label>検索(値/商品名)</label><input id="query" placeholder="部分一致" /></div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="load()">検索</button></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="setToday()">本日発行分</button></div>
        <div style="flex:0;"><label>&nbsp;</label>
          <label style="display:inline-flex; align-items:center; gap:6px; font-weight:normal; white-space:nowrap;">
            <input type="checkbox" id="includePrinted" style="width:auto;" onchange="load()" />印刷済みも表示
          </label>
        </div>
      </div>
      <p class="msg" id="msg"></p>
      <p style="color:#6b7280; font-size:0.83rem; margin:6px 0 0;">ラベルサイズ・バーコードの大きさ・文字サイズは「端末設定」画面で変更できます（1次元・2次元それぞれ別に設定できます）。</p>
    </div>

    <!-- 操作バー: バーコード一覧のすぐ上に配置 -->
    <div class="no-print" style="display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:8px; padding:8px 12px; background:#fff; border:1px solid var(--line); border-radius:12px;">
      <label style="display:inline-flex; align-items:center; gap:6px; margin:0; font-weight:700;">種別
        <select id="kindSel" onchange="onKindChange()" style="min-width:180px;">
          <option value="device">端末設定に従う</option>
          <option value="1d">1次元（CODE128）</option>
          <option value="2d">2次元（QRコード）</option>
        </select>
      </label>
      <label style="display:inline-flex; align-items:center; gap:6px; margin:0; font-weight:700;">
        <input type="checkbox" id="checkAll" checked style="width:auto;" onchange="toggleAll(this.checked)" />全てチェック
      </label>
      <button onclick="printSelected()">選択分を印刷</button>
      <span id="count" style="color:#555;"></span>
    </div>

    <div class="labels" id="labels"></div>
  </main>

  <script src="/common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="/barcode-render.js"></script>
  <script>
    let items = [];

    // 選択中の種別('device'は端末設定に従う)
    function currentKind() {
      const v = document.getElementById('kindSel').value;
      return v === 'device' ? barcodeKind() : v;
    }
    function currentCfg() { return getBarcodeConfigFor(currentKind()); }

    async function boot() {
      const user = await initPage('labels');
      if (!user) return;
      const sel = document.getElementById('productId');
      const products = await getProducts();
      products.forEach((p) => {
        const o = document.createElement('option');
        o.value = p.productId; o.textContent = p.productName;
        sel.appendChild(o);
      });
      setToday();
      applySize();
    }

    function onKindChange() {
      if (!barcodeLibReady(currentKind())) {
        setMsg(document.getElementById('msg'), 'バーコード描画ライブラリの読込に失敗しました（ネット接続をご確認ください）', 'error');
      } else {
        setMsg(document.getElementById('msg'), '', '');
      }
      applySize();
    }

    function setToday() {
      const t = localDateStr();
      document.getElementById('from').value = t;
      document.getElementById('to').value = t;
      load();
    }

    async function load() {
      const qs = new URLSearchParams();
      const from = document.getElementById('from').value;
      const to = document.getElementById('to').value;
      const productId = document.getElementById('productId').value;
      const query = document.getElementById('query').value.trim();
      if (from) qs.set('from', from);
      if (to) qs.set('to', to);
      if (productId) qs.set('productId', productId);
      if (query) qs.set('query', query);
      if (document.getElementById('includePrinted').checked) qs.set('includePrinted', 'true');
      const { ok, data } = await api('/api/barcodes/list?' + qs.toString());
      if (!ok) { setMsg(document.getElementById('msg'), data.error || '取得失敗', 'error'); return; }
      items = data.items || [];
      render();
    }

    function applySize() {
      const cfg = currentCfg();
      let st = document.getElementById('pageStyle');
      if (!st) { st = document.createElement('style'); st.id = 'pageStyle'; document.head.appendChild(st); }
      st.textContent = labelPageStyleText(cfg);
      render();
    }

    function render() {
      const cfg = currentCfg();
      const box = document.getElementById('labels');
      box.innerHTML = '';
      document.getElementById('count').textContent = `${items.length} 件`;
      if (items.length === 0) { box.innerHTML = '<p style="color:#888;">対象がありません。</p>'; return; }
      items.forEach((b, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'label-wrap';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.className = 'pick'; cb.checked = true; cb.dataset.idx = i;
        cb.addEventListener('change', syncCheckAll);
        if (b.printed_flag) {
          const badge = document.createElement('span');
          badge.className = 'printed-badge';
          badge.textContent = '印刷済';
          wrap.appendChild(badge);
        }
        const label = document.createElement('div');
        label.className = 'label';
        wrap.appendChild(cb);
        wrap.appendChild(label);
        box.appendChild(wrap);
        renderLabelInner(label, b, cfg);
      });
      syncCheckAll();
    }

    function toggleAll(v) {
      document.querySelectorAll('.pick').forEach((cb) => { cb.checked = v; });
    }
    // 個別チェックの状態を「全てチェック」に反映(全部ONならON)
    function syncCheckAll() {
      const picks = [...document.querySelectorAll('.pick')];
      const ca = document.getElementById('checkAll');
      if (ca) ca.checked = picks.length > 0 && picks.every((c) => c.checked);
    }

    async function printSelected() {
      const picks = [...document.querySelectorAll('.pick')];
      const chosenIdx = picks.filter((c) => c.checked).map((c) => Number(c.dataset.idx));
      if (chosenIdx.length === 0) { setMsg(document.getElementById('msg'), '印刷対象を選択してください', 'error'); return; }
      // 選択外のラベルを印刷時のみ非表示にする
      const chosen = new Set(chosenIdx);
      const wraps = document.querySelectorAll('#labels .label-wrap');
      wraps.forEach((w, i) => { w.classList.toggle('skip-print', !chosen.has(i)); });
      window.print();
      // 印刷したバーコードを印刷済みに記録し、一覧を更新(既定では印刷済みが消える)
      const values = chosenIdx.map((i) => items[i] && items[i].barcode_value).filter(Boolean);
      await api('/api/barcodes/mark-printed', { method: 'POST', body: JSON.stringify({ values }) });
      setMsg(document.getElementById('msg'), `${values.length} 件を印刷済みにしました`, 'ok');
      load();
    }

    boot();
  </script>
  <style>
    @media print { .skip-print { display: none !important; } }
  </style>
</body>
</html>
