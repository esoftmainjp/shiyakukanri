<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在庫管理 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .scroll-x { overflow-x: auto; margin-top: 12px; }
    /* 横スクロールしても商品名(左)と操作(右)を固定 */
    #tbl { overflow: visible; min-width: 1100px; margin-top: 0; }
    #tbl th.sticky-l, #tbl td.sticky-l { position: sticky; left: 0; z-index: 1; background: #fff; box-shadow: 2px 0 5px rgba(80,100,140,0.10); }
    #tbl thead th.sticky-l { z-index: 3; background: var(--th-bg); }
    #tbl th.sticky-r, #tbl td.sticky-r { position: sticky; right: 0; z-index: 1; background: #fff; box-shadow: -2px 0 5px rgba(80,100,140,0.10); text-align: center; white-space: nowrap; }
    #tbl thead th.sticky-r { z-index: 3; background: var(--th-bg); }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>在庫管理</h2>
      <div class="row">
        <div><label>商品名</label><input id="fName" placeholder="部分一致" /></div>
        <div><label>ロット</label><input id="fLot" placeholder="部分一致" /></div>
        <div><label>問屋</label><select id="fSupplier"><option value="">すべて</option></select></div>
        <div><label>使用期限(まで)</label><input type="date" id="fExpiryTo" /></div>
      </div>
      <div class="row">
        <div><label>メーカー</label><select id="fMaker"><option value="">すべて</option></select></div>
        <div><label>部門</label><select id="fDepartment"><option value="">すべて</option></select></div>
        <div><label>分類</label><select id="fCategory"><option value="">すべて</option></select></div>
        <div><label>備考</label><input id="fNote" placeholder="部分一致" /></div>
      </div>
      <div class="row">
        <div style="flex:0;"><label>&nbsp;</label>
          <label style="display:inline-flex; align-items:center; gap:6px; margin:0; font-weight:normal; white-space:nowrap; height:37px;">
            <input type="checkbox" id="fZero" style="width:auto;" />在庫0も表示
          </label>
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="load()">検索</button></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="downloadCsv()">CSV出力</button></div>
      </div>
      <p class="msg" id="msg"></p>
      <div class="scroll-x">
        <table id="tbl">
          <thead><tr>
            <th class="sticky-l">商品名</th><th>問屋</th><th>メーカー</th><th>部門</th><th>分類</th>
            <th>ロット</th><th>使用期限</th><th>入庫日</th><th>在庫数</th><th>備考</th><th class="sticky-r">操作</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- 調整ダイアログ代わりのカード -->
    <div class="card" id="editCard" style="display:none; background:#fbfcfd;">
      <h2>在庫の修正・廃棄・返品</h2>
      <p id="editTarget" style="font-weight:600;"></p>
      <div class="row">
        <div>
          <label>区分</label>
          <select id="mType" onchange="onTypeChange()">
            <option value="adjust">在庫修正(絶対値)</option>
            <option value="disposal">廃棄(減少)</option>
            <option value="return">返品(減少)</option>
          </select>
        </div>
        <div><label id="qtyLabel">修正後の在庫数</label><input type="number" id="mQty" min="0" value="0" /></div>
      </div>
      <div class="row" id="returnFields" style="display:none;">
        <div><label>問屋（返品先）</label><select id="mSupplier"><option value="">（未設定）</option></select></div>
        <div><label>単価（税抜）</label><input type="number" id="mUnitPrice" min="0" step="0.01" value="0" /></div>
        <div><label>梱包数</label><input type="number" id="mPack" value="1" readonly style="background:#eef2f5;" title="商品詳細マスターの梱包数" /></div>
      </div>
      <p id="returnHint" style="display:none; font-size:0.82rem; color:#777; margin:0 0 6px;">返品数（入力単位）×梱包数＝減少バラ数。金額（精算）＝返品数×単価。問屋・単価は既定を自動入力（変更可）。</p>
      <div><label>理由(必須)</label><input id="mReason" style="width:100%;" /></div>
      <div style="margin-top:12px;">
        <button onclick="submitMovement()">実行</button>
        <button class="secondary" onclick="closeEdit()">閉じる</button>
      </div>
      <p class="msg" id="editMsg"></p>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let current = null;
    let products = [];   // 返品時の梱包数・既定単価/問屋の参照用

    async function boot() {
      const user = await initPage('inventory');
      if (!user) return;
      const opt = (arr) => '<option value="">すべて</option>' + (arr || []).map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
      const [sup, mk, dep, cat] = await Promise.all([
        api('/api/lookup/suppliers'), api('/api/lookup/makers'),
        api('/api/lookup/departments'), api('/api/lookup/categories'),
      ]);
      document.getElementById('fSupplier').innerHTML = opt(sup.data.suppliers);
      document.getElementById('fMaker').innerHTML = opt(mk.data.makers);
      document.getElementById('fDepartment').innerHTML = opt(dep.data.departments);
      document.getElementById('fCategory').innerHTML = opt(cat.data.categories);
      // 返品先の問屋候補
      document.getElementById('mSupplier').innerHTML = '<option value="">（未設定）</option>' +
        (sup.data.suppliers || []).map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
      products = await getProducts();
      load();
    }

    function queryString() {
      const p = new URLSearchParams();
      const name = document.getElementById('fName').value; if (name) p.set('productName', name);
      const lot = document.getElementById('fLot').value; if (lot) p.set('lotNumber', lot);
      const sup = document.getElementById('fSupplier').value; if (sup) p.set('supplierId', sup);
      const exp = document.getElementById('fExpiryTo').value; if (exp) p.set('expiryTo', exp);
      const mk = document.getElementById('fMaker').value; if (mk) p.set('makerId', mk);
      const dep = document.getElementById('fDepartment').value; if (dep) p.set('departmentId', dep);
      const cat = document.getElementById('fCategory').value; if (cat) p.set('categoryId', cat);
      const note = document.getElementById('fNote').value; if (note) p.set('note', note);
      if (document.getElementById('fZero').checked) p.set('includeZero', 'true');
      return p.toString();
    }

    let stockRows = [];
    async function load() {
      const { data } = await api('/api/inventory?' + queryString());
      stockRows = data.stocks || [];
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = '';
      if (stockRows.length === 0) { tbody.innerHTML = '<tr><td class="sticky-l">該当する在庫がありません</td></tr>'; return; }
      stockRows.forEach((s, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td class="sticky-l">${esc(s.product_name)}</td>` +
          `<td>${esc(s.supplier)}</td><td>${esc(s.maker)}</td><td>${esc(s.department)}</td><td>${esc(s.category)}</td>` +
          `<td>${esc(s.lot_number) || '(なし)'}</td><td>${s.expiry_date || '(なし)'}</td>` +
          `<td>${s.last_receipt_date || '(なし)'}</td>` +
          `<td style="text-align:right;">${s.stock_quantity}</td><td>${esc(s.note)}</td>` +
          `<td class="sticky-r"><button class="secondary" onclick="openEditByIndex(${i})">修正/廃棄/返品</button></td>`;
        tbody.appendChild(tr);
      });
    }
    function openEditByIndex(i) { openEdit(stockRows[i]); }
    function esc(v) {
      return String(v == null ? '' : v).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function downloadCsv() { window.location = '/api/inventory/csv?' + queryString(); }

    function openEdit(s) {
      current = s;
      const card = document.getElementById('editCard');
      card.style.display = 'block';
      document.getElementById('editTarget').textContent =
        `${s.product_name} / ロット:${s.lot_number || '(なし)'} / 期限:${s.expiry_date || '(なし)'} / 現在庫:${s.stock_quantity}`;
      document.getElementById('mType').value = 'adjust';
      document.getElementById('mQty').value = s.stock_quantity;
      document.getElementById('mReason').value = '';
      onTypeChange();
      setMsg(document.getElementById('editMsg'), '', '');
      // 修正入力部分まで自動スクロールして数量欄にフォーカス
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => { const q = document.getElementById('mQty'); q.focus(); q.select(); }, 350);
    }
    function closeEdit() { document.getElementById('editCard').style.display = 'none'; current = null; }

    function onTypeChange() {
      const t = document.getElementById('mType').value;
      const isReturn = t === 'return';
      document.getElementById('returnFields').style.display = isReturn ? 'flex' : 'none';
      document.getElementById('returnHint').style.display = isReturn ? 'block' : 'none';
      document.getElementById('qtyLabel').textContent =
        t === 'adjust' ? '修正後の在庫数' : (isReturn ? '返品数（入力単位）' : '減少するバラ数');
      if (t === 'adjust' && current) document.getElementById('mQty').value = current.stock_quantity;
      else document.getElementById('mQty').value = 1;
      if (isReturn) prefillReturn();
    }
    // 返品の梱包数・既定単価/問屋を商品詳細から補完
    function prefillReturn() {
      const p = (products || []).find((x) => String(x.productId) === String(current && current.product_id));
      const d = p && p.details && p.details[0];
      document.getElementById('mPack').value = d && d.packSize ? d.packSize : 1;
      document.getElementById('mUnitPrice').value = d && d.unitPrice != null ? d.unitPrice : 0;
      const sup = document.getElementById('mSupplier');
      sup.value = (d && d.supplierId) ? String(d.supplierId) : '';
    }

    async function submitMovement() {
      if (!current) return;
      const t = document.getElementById('mType').value;
      const body = {
        productId: current.product_id,
        lotNumber: current.lot_number,
        expiryDate: current.expiry_date,
        movementType: t,
        reason: document.getElementById('mReason').value,
      };
      if (t === 'return') {
        const retQty = Number(document.getElementById('mQty').value);
        const pack = Number(document.getElementById('mPack').value) || 1;
        body.quantity = retQty * pack;                                    // 減少バラ数
        body.quantityInput = retQty;                                      // 精算用 入力単位数量
        body.unitPrice = Number(document.getElementById('mUnitPrice').value) || 0;
        body.supplierId = document.getElementById('mSupplier').value || null;
      } else {
        body.quantity = Number(document.getElementById('mQty').value);
      }
      const { ok, data } = await api('/api/inventory/movement', { method: 'POST', body: JSON.stringify(body) });
      const msg = document.getElementById('editMsg');
      if (!ok) { setMsg(msg, data.error || '失敗', 'error'); return; }
      setMsg(msg, `完了しました（${data.before} → ${data.after}）`, 'ok');
      await load();
      const updated = (await (await fetch('/api/inventory?' + queryString())).json()).stocks
        .find((x) => x.product_id === current.product_id && x.lot_number === current.lot_number && x.expiry_date === current.expiry_date);
      if (updated) openEdit(updated); else closeEdit();
    }

    boot();
  </script>
</body>
</html>
