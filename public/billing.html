<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支払管理 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .sumbox { display: flex; gap: 22px; flex-wrap: wrap; align-items: baseline; margin: 10px 0; }
    .sumbox .big { font-size: 1.6rem; font-weight: 800; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .badge.confirmed { background: #e8f0fe; color: #2456c9; }
    .badge.paid { background: #e2f6e9; color: #1c7a41; }
    .badge.canceled { background: #f0f0f0; color: #888; }
    .neg { color: #c62d42; }
    .scroll-x { overflow-x: auto; margin-top: 10px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 20; }
    .modal-bg.show { display: flex; }
    .modal { background: #fff; border-radius: 10px; padding: 20px; max-width: 94vw; max-height: 90vh; overflow: auto; min-width: min(780px, 94vw); }
    .modal h3 { margin: 0; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>支払管理（問屋への支払）</h2>
      <p style="font-size:0.85rem; color:#555;">入庫実績を問屋×期間で集計し、返品を控除・消費税を加味して<strong>支払額</strong>を締めます。表示は<strong>未精算分のみ</strong>です。問屋からの請求書と金額を照合できます。</p>
      <div class="row">
        <div style="flex:0; min-width:200px;"><label>問屋</label><select id="supplier"></select></div>
        <div style="flex:0;"><label>期間(開始)</label><input type="date" id="from" /></div>
        <div style="flex:0;"><label>期間(終了)</label><input type="date" id="to" /></div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="preview()">プレビュー</button></div>
      </div>
      <p class="msg" id="pmsg"></p>

      <div id="previewArea" style="display:none;">
        <div class="sumbox">
          <div>税抜小計：<span class="num" id="sSub"></span></div>
          <div>消費税（<span id="sRate"></span>%）：<span class="num" id="sTax"></span></div>
          <div>税込合計：<span class="big" id="sTotal"></span></div>
        </div>
        <div class="scroll-x">
          <table id="pvTbl">
            <thead><tr><th>日付</th><th>種別</th><th>商品</th><th class="num">数量</th><th class="num">単価</th><th class="num">金額</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="row" style="margin-top:12px; align-items:flex-end;">
          <div style="flex:0;"><label>締日</label><input type="date" id="closingDate" /></div>
          <div style="flex:2;"><label>備考</label><input id="note" placeholder="任意" /></div>
          <div style="flex:0;"><label>&nbsp;</label><button onclick="confirmBill()">この内容で締め確定</button></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>支払一覧</h2>
      <div class="row">
        <div style="flex:0; min-width:180px;"><label>問屋</label><select id="fSupplier" onchange="loadList()"><option value="">すべて</option></select></div>
        <div style="flex:0; min-width:140px;"><label>状態</label>
          <select id="fStatus" onchange="loadList()">
            <option value="">すべて</option><option value="confirmed">確定</option>
            <option value="paid">支払済</option><option value="canceled">取消</option>
          </select>
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="downloadListCsv()">一覧CSV</button></div>
      </div>
      <p class="msg" id="lmsg"></p>
      <div class="scroll-x">
        <table id="listTbl">
          <thead><tr><th>支払番号</th><th>問屋</th><th>期間</th><th class="num">税抜</th><th class="num">消費税</th><th class="num">税込</th><th>状態</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="modal-bg" id="detailModal">
      <div class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
          <h3 id="dTitle">支払詳細</h3>
          <button class="secondary" onclick="closeDetail()">閉じる</button>
        </div>
        <div id="dBody"></div>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    const SLABEL = { draft: '未確定', confirmed: '確定', paid: '支払済', canceled: '取消' };
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function yen(n) { return '¥' + Number(n || 0).toLocaleString(undefined, { maximumFractionDigits: 0 }); }

    async function boot() {
      const user = await initPage('billing');
      if (!user) return;
      const d = new Date(); const first = new Date(d.getFullYear(), d.getMonth(), 1);
      document.getElementById('from').value = localDateStr(first);
      document.getElementById('to').value = localDateStr();
      document.getElementById('closingDate').value = localDateStr();
      const sr = await api('/api/lookup/suppliers');
      const opts = (sr.data.suppliers || []).map((s) => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
      document.getElementById('supplier').innerHTML = opts || '<option value="">問屋がありません</option>';
      document.getElementById('fSupplier').innerHTML = '<option value="">すべて</option>' + opts;
      loadList();
    }

    function qsPreview() {
      const p = new URLSearchParams();
      p.set('supplierId', document.getElementById('supplier').value);
      p.set('from', document.getElementById('from').value);
      p.set('to', document.getElementById('to').value);
      return p.toString();
    }

    async function preview() {
      const msg = document.getElementById('pmsg');
      if (!document.getElementById('supplier').value) { setMsg(msg, '問屋を選択してください', 'error'); return; }
      const { ok, data } = await api('/api/billing/preview?' + qsPreview());
      if (!ok) { setMsg(msg, data.error || '取得失敗', 'error'); document.getElementById('previewArea').style.display = 'none'; return; }
      setMsg(msg, '', '');
      document.getElementById('sSub').textContent = yen(data.subtotal);
      document.getElementById('sRate').textContent = data.taxRate;
      document.getElementById('sTax').textContent = yen(data.tax);
      document.getElementById('sTotal').textContent = yen(data.total);
      const tb = document.querySelector('#pvTbl tbody');
      if (!data.lines.length) { tb.innerHTML = '<tr><td colspan="6">未精算の取引がありません</td></tr>'; }
      else {
        tb.innerHTML = data.lines.map((l) => {
          const neg = Number(l.amount) < 0;
          return `<tr class="${neg ? 'neg' : ''}"><td>${l.event_date || ''}</td>` +
            `<td>${l.source_type === 'return' ? '返品' : '入庫'}</td>` +
            `<td>${esc(l.product_name)}</td>` +
            `<td class="num">${l.quantity}</td><td class="num">${yen(l.unit_price)}</td>` +
            `<td class="num">${yen(l.amount)}</td></tr>`;
        }).join('');
      }
      document.getElementById('previewArea').style.display = 'block';
    }

    async function confirmBill() {
      if (!confirm('この内容で締め確定します。よろしいですか？（対象取引は他の支払に含められなくなります）')) return;
      const body = {
        supplierId: document.getElementById('supplier').value,
        from: document.getElementById('from').value,
        to: document.getElementById('to').value,
        closingDate: document.getElementById('closingDate').value || null,
        note: document.getElementById('note').value,
      };
      const { ok, data } = await api('/api/billing/confirm', { method: 'POST', body: JSON.stringify(body) });
      const msg = document.getElementById('pmsg');
      if (!ok) { setMsg(msg, data.error || '締めに失敗しました', 'error'); return; }
      setMsg(msg, `締め確定しました（支払番号: ${data.billNumber} / 税込 ${yen(data.total)}）`, 'ok');
      document.getElementById('previewArea').style.display = 'none';
      loadList();
    }

    async function loadList() {
      const p = new URLSearchParams();
      const sup = document.getElementById('fSupplier').value; if (sup) p.set('supplierId', sup);
      const st = document.getElementById('fStatus').value; if (st) p.set('status', st);
      const { ok, data } = await api('/api/billing?' + p.toString());
      const tb = document.querySelector('#listTbl tbody');
      if (!ok) { setMsg(document.getElementById('lmsg'), (data && data.error) || '取得失敗', 'error'); return; }
      const rows = data.bills || [];
      if (!rows.length) { tb.innerHTML = '<tr><td colspan="8">支払はありません</td></tr>'; return; }
      tb.innerHTML = rows.map((b) => {
        const ops = [
          `<a href="#" onclick="openDetail(${b.id});return false;">詳細</a>`,
          `<a href="/print.html?type=billing&id=${b.id}" target="_blank">支払書</a>`,
          `<a href="/print.html?type=billing_detail&id=${b.id}" target="_blank">明細</a>`,
          `<a href="#" onclick="window.location='/api/billing/${b.id}/csv';return false;">CSV</a>`,
        ];
        if (b.status === 'confirmed') ops.unshift(`<a href="#" onclick="markPaid(${b.id});return false;">支払済</a>`);
        if (b.status === 'confirmed' || b.status === 'paid') ops.push(`<a href="#" class="neg" onclick="cancelBill(${b.id});return false;">取消</a>`);
        return `<tr><td>${esc(b.bill_number)}</td><td>${esc(b.supplier_name)}</td>` +
          `<td>${b.period_from}〜${b.period_to}</td>` +
          `<td class="num">${yen(b.subtotal)}</td><td class="num">${yen(b.tax_amount)}</td><td class="num">${yen(b.total_amount)}</td>` +
          `<td><span class="badge ${b.status}">${SLABEL[b.status] || b.status}</span></td>` +
          `<td style="white-space:nowrap;">${ops.join(' / ')}</td></tr>`;
      }).join('');
    }

    // 確定済み請求の内容を画面で確認
    async function openDetail(id) {
      const { ok, data } = await api('/api/billing/' + id);
      if (!ok) { setMsg(document.getElementById('lmsg'), (data && data.error) || '取得に失敗しました', 'error'); return; }
      const b = data.bill;
      document.getElementById('dTitle').textContent = `支払詳細　${b.bill_number}（${b.supplier_name}）`;
      let h = `<p style="color:#555; font-size:0.9rem;">対象期間 ${b.period_from}〜${b.period_to} ／ 締日 ${b.closing_date || '-'} ／ 状態 <span class="badge ${b.status}">${SLABEL[b.status] || b.status}</span></p>`;
      h += '<div class="scroll-x"><table><thead><tr><th>日付</th><th>種別</th><th>商品</th><th class="num">数量</th><th class="num">単価</th><th class="num">金額</th></tr></thead><tbody>';
      (data.lines || []).forEach((l) => {
        const neg = Number(l.amount) < 0;
        h += `<tr class="${neg ? 'neg' : ''}"><td>${l.event_date || ''}</td><td>${l.source_type === 'return' ? '返品' : '入庫'}</td>` +
          `<td>${esc(l.product_name)}</td><td class="num">${l.quantity}</td><td class="num">${yen(l.unit_price)}</td><td class="num">${yen(l.amount)}</td></tr>`;
      });
      h += '</tbody></table></div>';
      h += `<div style="text-align:right; margin-top:10px; line-height:1.8;">` +
        `<div>税抜小計：<strong>${yen(b.subtotal)}</strong></div>` +
        `<div>消費税（${b.tax_rate}%）：<strong>${yen(b.tax_amount)}</strong></div>` +
        `<div style="font-size:1.2rem;">税込合計：<strong>${yen(b.total_amount)}</strong></div></div>`;
      h += `<div style="margin-top:14px;"><a href="/print.html?type=billing&id=${id}" target="_blank">支払書を印刷</a>　｜　<a href="/print.html?type=billing_detail&id=${id}" target="_blank">支払明細書を印刷</a></div>`;
      document.getElementById('dBody').innerHTML = h;
      document.getElementById('detailModal').classList.add('show');
    }
    function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

    async function markPaid(id) {
      const { ok, data } = await api('/api/billing/' + id + '/paid', { method: 'POST' });
      setMsg(document.getElementById('lmsg'), ok ? '支払済にしました' : (data.error || '失敗'), ok ? 'ok' : 'error');
      loadList();
    }
    async function cancelBill(id) {
      if (!confirm('この支払を取消します（対象取引は再度精算できるようになります）。よろしいですか？')) return;
      const { ok, data } = await api('/api/billing/' + id + '/cancel', { method: 'POST' });
      setMsg(document.getElementById('lmsg'), ok ? '取消しました' : (data.error || '失敗'), ok ? 'ok' : 'error');
      loadList();
    }
    function downloadListCsv() {
      const p = new URLSearchParams();
      const sup = document.getElementById('fSupplier').value; if (sup) p.set('supplierId', sup);
      const st = document.getElementById('fStatus').value; if (st) p.set('status', st);
      window.location = '/api/billing/csv?' + p.toString();
    }

    boot();
  </script>
</body>
</html>
