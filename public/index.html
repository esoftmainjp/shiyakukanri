<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    #expiryTable tbody tr.expired, #expiryTable tbody tr.expired:hover { background: #fde8e8; }
    #expiryTable tbody tr.warning, #expiryTable tbody tr.warning:hover { background: #fff5e0; }
    .legend { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 0.82rem; font-weight: 700; margin-right: 8px; }
    .legend.expired { background: #fde8e8; color: #c0575d; border: 1px solid #f3c9c9; }
    .legend.warning { background: #fff5e0; color: #b0842a; border: 1px solid #f0e0b0; }
    /* 一覧が増えても画面からはみ出ないよう、枠内スクロール(見出しは固定) */
    .dash-scroll { max-height: 300px; overflow-y: auto; border: 1px solid var(--line, #e3e8ef); border-radius: 8px; margin-top: 6px; }
    .dash-scroll.tall { max-height: 400px; }
    .dash-scroll table { margin: 0; }
    .dash-scroll thead th { position: sticky; top: 0; z-index: 1; background: var(--th-bg, #eef2f5); }
  </style>
</head>
<body>
  <header><h1>試薬在庫管理システム</h1></header>
  <main>
    <!-- 未ログイン時 -->
    <div class="card" id="loginCard" style="display:none; max-width:360px;">
      <h2>ログイン</h2>
      <label>ログインID</label>
      <input id="loginId" value="admin" style="width:100%;" />
      <label>パスワード</label>
      <input id="password" type="password" value="Admin@12345" style="width:100%;" />
      <div style="margin-top:12px;"><button onclick="login()">ログイン</button></div>
      <p class="msg error" id="loginMsg"></p>
    </div>

    <!-- ログイン後 -->
    <div id="appArea" style="display:none;">
      <div class="row" style="align-items:stretch; gap:16px;">
        <div class="card" style="flex:1; min-width:300px;">
          <h2>発注予定（未発注）</h2>
          <p style="color:#666; font-size:0.85rem; margin:4px 0;">出庫から自動作成された、これから発注する分です。</p>
          <div class="dash-scroll">
            <table id="orderPlanTable">
              <thead><tr><th>問屋</th><th>商品</th><th>発注予定数<br>(梱包)</th><th>発注数<br>(梱包)</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div style="margin-top:8px;"><a href="/orders.html">発注画面へ →</a></div>
        </div>
        <div class="card" style="flex:1; min-width:300px;">
          <h2>入庫予定（発注済み・未入庫）</h2>
          <p style="color:#666; font-size:0.85rem; margin:4px 0;">発注済みで、これから入ってくる予定の分です。</p>
          <div class="dash-scroll">
            <table id="receiptPlanTable">
              <thead><tr><th>発注日</th><th>問屋</th><th>商品</th><th>残バラ数</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
          <div style="margin-top:8px;"><a href="/receipts.html">入庫画面へ →</a></div>
        </div>
      </div>

      <div class="card">
        <h2>使用期限（期限切れ・期限接近）</h2>
        <p style="font-size:0.85rem; margin:4px 0;">
          <span class="legend expired">期限切れ</span>
          <span class="legend warning">期限接近</span>
          <span id="expiryNote" style="color:#666; margin-left:8px;"></span>
          <a href="/expiry.html" style="margin-left:12px;">使用期限管理へ →</a>
        </p>
        <div class="dash-scroll tall">
          <table id="expiryTable">
            <thead><tr><th>状態</th><th>商品名</th><th>ロット</th><th>使用期限</th><th>残日数</th><th>個数</th><th>在庫数</th><th>予定</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    async function boot() {
      const user = await api('/api/me');
      if (user.ok) {
        currentMe = user.data;
        // 全体管理者は、施設未選択のときだけ施設管理へ。施設選択中はその施設の
        // ホーム(ダッシュボード)を表示する。パスワード変更が必要な場合は変更画面へ。
        if (user.data.user.userType === 'superadmin' && !user.data.user.mustChangePassword
            && user.data.activeFacilityId == null) {
          location.href = '/facilities.html';
          return;
        }
        showApp(user.data.user);
        if (user.data.passwordExpired && !user.data.user.mustChangePassword) showPasswordExpiryBanner();
      } else { document.getElementById('loginCard').style.display = 'block'; }
    }
    async function login() {
      const loginId = document.getElementById('loginId').value;
      const password = document.getElementById('password').value;
      const { ok, data } = await api('/api/login', { method: 'POST', body: JSON.stringify({ loginId, password }) });
      if (!ok) { setMsg(document.getElementById('loginMsg'), data.error || 'ログイン失敗', 'error'); return; }
      showApp(data.user);
    }
    let warnDays = 30;
    function showApp(user) {
      // 初回ログイン(パスワード変更要求)時は変更画面へ誘導
      if (user && user.mustChangePassword) { location.href = '/password.html'; return; }
      // 全体管理者は施設未選択のときだけ施設管理へ誘導(施設選択中はダッシュボード)
      if (user && user.userType === 'superadmin' && !(currentMe && currentMe.activeFacilityId != null)) {
        location.href = '/facilities.html'; return;
      }
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('appArea').style.display = 'block';
      renderHeader(user, 'dashboard');
      loadSettingsThenExpiry();
      loadPlans();
    }
    async function loadSettingsThenExpiry() {
      const { ok, data } = await api('/api/settings');
      if (ok && data.settings) {
        warnDays = Number(data.settings.expiry_warn_days) || 30;
      }
      loadExpiry();
    }
    async function loadPlans() {
      const { ok, data } = await api('/api/orders/summary');
      if (!ok) return;
      const opb = document.querySelector('#orderPlanTable tbody');
      opb.innerHTML = '';
      const plans = data.orderPlans || [];
      if (plans.length === 0) opb.innerHTML = '<tr><td colspan="4">発注予定はありません。</td></tr>';
      plans.forEach((r) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${esc(r.supplier_name || '-')}</td><td>${esc(r.product_name)}</td>` +
          `<td style="text-align:right;">${r.planned_order_quantity}</td><td style="text-align:right;">${r.order_quantity}</td>`;
        opb.appendChild(tr);
      });
      const rpb = document.querySelector('#receiptPlanTable tbody');
      rpb.innerHTML = '';
      const rps = data.receiptPlans || [];
      if (rps.length === 0) rpb.innerHTML = '<tr><td colspan="4">入庫予定はありません。</td></tr>';
      rps.forEach((r) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.order_date || '-'}</td><td>${esc(r.supplier_name || '-')}</td>` +
          `<td>${esc(r.product_name)}</td><td style="text-align:right;">${r.remaining_bara}</td>`;
        rpb.appendChild(tr);
      });
    }
    function planBadges(r) {
      let h = '';
      if (r.has_order_plan) h += '<span class="pill unordered">発注予定</span> ';
      if (r.has_incoming) h += '<span class="pill ordered">入庫予定</span>';
      return h;
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    async function loadExpiry() {
      const { data } = await api('/api/inventory/expiry?warnDays=' + encodeURIComponent(warnDays));
      const tbody = document.querySelector('#expiryTable tbody');
      tbody.innerHTML = '';
      const rows = data.rows || [];
      document.getElementById('expiryNote').textContent = `警告日数: ${data.warnDays != null ? data.warnDays : warnDays}日以内 / ${rows.length}件`;
      if (rows.length === 0) { tbody.innerHTML = '<tr><td colspan="8">期限切れ・期限接近の在庫はありません。</td></tr>'; return; }
      rows.forEach((r) => {
        const tr = document.createElement('tr');
        tr.className = r.status;
        const label = r.status === 'expired' ? '期限切れ' : '期限接近';
        const days = r.days_left < 0 ? `${-r.days_left}日超過` : `残${r.days_left}日`;
        tr.innerHTML =
          `<td>${label}</td><td>${esc(r.product_name)}</td><td>${esc(r.lot_number) || '(なし)'}</td>` +
          `<td>${r.expiry_date}</td><td>${days}</td>` +
          `<td style="text-align:right;">${r.stock_quantity}</td><td style="text-align:right;">${r.product_total}</td>` +
          `<td class="nowrap">${planBadges(r)}</td>`;
        tbody.appendChild(tr);
      });
    }
    boot();
  </script>
</body>
</html>
