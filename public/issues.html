<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出庫 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>出庫登録</h2>
      <div class="row">
        <div><label>出庫日</label><input type="date" id="issueDate" /></div>
        <div style="flex:2;"><label>備考（出庫全体）</label><input id="note" placeholder="任意" /></div>
      </div>

      <h3 style="margin-top:20px;">① バーコードで出庫</h3>
      <p style="font-size:0.85rem; color:#555;">読み取ると自動で明細に追加。連続で読み取れます。独自バーコード＝バラ1個（二度読みは無視）。GS1-128＝商品・ロット・期限を特定して1梱包を追加（同じロットは梱包数＋1）。</p>
      <div class="row">
        <div style="flex:2;"><label class="barcode-label">バーコードを読み取り/入力（独自 / GS1-128）／読み取ると自動で明細に追加</label><input id="barcode" class="barcode-input" placeholder="ここにスキャン（Enterで自動追加）" autofocus /></div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="addBarcode()">読取</button></div>
      </div>
      <p class="msg" id="bcMsg"></p>

      <h3 style="margin-top:20px;">② 数量で出庫</h3>
      <p style="font-size:0.85rem; color:#555;">「梱包」＝入力数×梱包数のバラを出庫。「バラ」＝入力した数をそのままバラで出庫（梱包管理していない商品や端数の出庫に）。</p>
      <div class="row">
        <div style="flex:2;"><label>商品</label>
          <div style="display:flex; gap:6px;">
            <select id="product" onchange="onProductChange()" style="flex:1;"></select>
            <button type="button" class="secondary" onclick="openProductSearch()" style="white-space:nowrap;">検索</button>
          </div>
        </div>
        <div style="flex:2;"><label>ロット / 在庫</label><select id="stock"></select></div>
      </div>
      <div class="row">
        <div><label>出庫単位</label>
          <select id="unit" onchange="onUnitChange()">
            <option value="pack">梱包（×梱包数）</option>
            <option value="bara">バラ（個別）</option>
          </select>
        </div>
        <div><label id="qtyLabel">出庫個数（梱包）</label><input type="number" id="qty" value="1" min="1" /></div>
        <div id="packDiv"><label>梱包数（商品マスター）</label><input type="number" id="pack" value="1" min="1" readonly style="background:#eef2f5;" title="梱包数は商品詳細マスターで管理します" /></div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="addQty()">追加</button></div>
      </div>
      <p class="msg" id="qtyMsg"></p>

      <h3 style="margin-top:20px;">出庫明細</h3>
      <table id="lineTable">
        <thead><tr><th>種別</th><th>商品/バーコード</th><th>ロット</th><th>出庫バラ数</th><th>備考</th><th></th></tr></thead>
        <tbody></tbody>
      </table>

      <div style="margin-top:16px; display:flex; align-items:center; gap:14px;">
        <button onclick="submitIssue()">出庫を保存</button>
        <label style="display:flex; align-items:center; gap:6px; margin:0; font-weight:normal;">
          <input type="checkbox" id="printChk" style="width:auto;" />保存後にリストを印刷
        </label>
      </div>
      <p class="msg" id="resultMsg"></p>
    </div>
  </main>

  <script src="/common.js"></script>
  <script src="/gs1.js"></script>
  <script src="/product-picker.js"></script>
  <script>
    let products = [];
    let lines = [];

    // 商品検索モーダル(在庫のある商品のみ)
    function openProductSearch() {
      openProductPicker({ inStockOnly: true, onSelect: selectIssueProduct });
    }
    function selectIssueProduct(p) {
      const sel = document.getElementById('product');
      // 在庫のある商品のみ表示中。選択肢に無ければ暫定追加。
      if (![...sel.options].some((o) => String(o.value) === String(p.productId))) {
        const o = document.createElement('option');
        o.value = p.productId; o.textContent = p.productName; sel.appendChild(o);
      }
      sel.value = String(p.productId);
      onProductChange();
    }

    async function boot() {
      const user = await initPage('issues');
      if (!user) return;
      document.getElementById('issueDate').value = localDateStr();
      products = await getProducts();
      // 在庫のある商品だけを一覧に表示する
      const stk = await api('/api/lookup/stocks');
      const inStock = new Set(((stk.data && stk.data.stocks) || []).map((s) => String(s.product_id)));
      const avail = products.filter((p) => inStock.has(String(p.productId)));
      document.getElementById('product').innerHTML = avail.length
        ? avail.map((p) => `<option value="${p.productId}">${attr(p.productName)}</option>`).join('')
        : '<option value="">在庫のある商品がありません</option>';
      // バーコード欄: Enter(スキャナ送出)で読取実行
      document.getElementById('barcode').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); addBarcode(); }
      });
      onProductChange();
    }

    function currentDetail() {
      const pid = document.getElementById('product').value;
      const p = products.find((x) => String(x.productId) === String(pid));
      return p ? { product: p, detail: p.details[0] } : null;
    }

    async function onProductChange() {
      const pid = document.getElementById('product').value;
      const sel = document.getElementById('stock');
      if (!pid) { sel.innerHTML = '<option value="">在庫なし</option>'; return; }
      const cur = currentDetail();
      if (cur && cur.detail) document.getElementById('pack').value = cur.detail.packSize;
      const { data } = await api('/api/lookup/stocks?productId=' + pid);
      // 在庫は使用期限の昇順(FEFO)で返る。先頭(最短期限)を自動選択する。
      const stocks = data.stocks || [];
      sel.innerHTML = stocks.map((s, i) =>
        `<option value='${JSON.stringify({ lot: s.lot_number, exp: s.expiry_date })}'>` +
        `${i === 0 ? '★最短期限 ' : ''}${attr(s.lot_number || '(ロットなし)')} / 期限:${s.expiry_date || 'なし'} / 在庫:${s.stock_quantity}バラ</option>`
      ).join('') || '<option value="">在庫なし</option>';
      sel.selectedIndex = 0; // FEFO: 最短期限を既定選択
    }

    // 連続読み取りできるよう読取欄をクリアしてフォーカスを戻す
    function refocusBarcode() {
      const el = document.getElementById('barcode');
      el.value = '';
      el.focus();
    }

    // 数量明細の集約キー: 商品 + ロット + 期限 + 梱包数(バラ/梱包の混同を防ぐ)
    function issueQtyKey(l) { return ['qty', l.productId, l.lot || '', l.expiryDate || '', l.packSize].join('|'); }
    // 数量明細に追加。同一キーが既にあれば行を増やさず出庫数(梱包)を加算する。戻り値=集約後の行。
    function addOrAggregateQty(line) {
      line.bara = line.issueQuantity * line.packSize;
      const key = issueQtyKey(line);
      const ex = lines.find((l) => l.kind === 'qty' && issueQtyKey(l) === key);
      if (ex) { ex.issueQuantity += line.issueQuantity; ex.bara = ex.issueQuantity * ex.packSize; renderLines(); return ex; }
      lines.push(line); renderLines(); return line;
    }

    async function addBarcode() {
      const msg = document.getElementById('bcMsg');
      const value = document.getElementById('barcode').value.trim();
      if (!value) return;

      // GS1-128の場合: JAN→商品特定、ロット・期限で在庫を特定し、1梱包を自動追加(同一ロットは梱包数+1)
      if (isGs1(value)) {
        const info = extractGs1(value);
        const r = await api('/api/lookup/by-jan/' + encodeURIComponent(info.jan));
        if (!r.ok) { setMsg(msg, `${r.data.error || '照合失敗'}（JAN:${info.jan}）`, 'error'); refocusBarcode(); return; }
        const p = r.data.product;
        // 商品を選択してロット別在庫を読み込み、該当ロット/期限を特定
        document.getElementById('product').value = p.productId;
        await onProductChange();
        const stockSel = document.getElementById('stock');
        let matchedStock = null;
        for (const opt of stockSel.options) {
          if (!opt.value) continue;
          const st = JSON.parse(opt.value);
          if ((st.lot || '') === (info.lot || '') && (st.exp || null) === (info.expiry || null)) {
            stockSel.value = opt.value; matchedStock = st; break;
          }
        }
        document.getElementById('pack').value = p.packSize;
        if (!matchedStock) {
          setMsg(msg, `読取: ${p.productName}（該当ロット/期限の在庫が見つかりません。ロット:${info.lot || '-'} 期限:${info.expiry || '-'}）`, 'error');
          refocusBarcode(); return;
        }
        const packSize = Number(p.packSize) || 1;
        const row = addOrAggregateQty({
          kind: 'qty', productId: p.productId, productDetailId: p.productDetailId,
          label: p.productName, lot: matchedStock.lot, expiryDate: matchedStock.exp,
          issueQuantity: 1, packSize,
        });
        setMsg(msg, `追加: ${p.productName} / ロット:${info.lot || '-'} / 期限:${info.expiry || '-'} → 梱包数:${row.issueQuantity}（=${row.bara}バラ）`, 'ok');
        refocusBarcode();
        return;
      }

      // 独自バーコードの場合: バラ1個を自動追加。二度読み(同一バーコード)は無視。
      const { ok, data } = await api('/api/lookup/barcode/' + encodeURIComponent(value));
      if (!ok) { setMsg(msg, data.error || '照会失敗', 'error'); refocusBarcode(); return; }
      const b = data.barcode;
      if (b.used_flag) { setMsg(msg, '使用済みのバーコードです', 'error'); refocusBarcode(); return; }
      if (lines.some((l) => l.kind === 'barcode' && l.barcodeValue === b.barcode_value)) {
        setMsg(msg, `既に読取済みのバーコードです（${b.product_name} No.${b.content_code}）`, 'error');
        refocusBarcode(); return;
      }
      lines.push({ kind: 'barcode', barcodeValue: b.barcode_value, label: `${b.product_name}(No.${b.content_code})`, lot: b.lot_number, bara: 1 });
      renderLines();
      setMsg(msg, `追加: ${b.product_name}（No.${b.content_code}） → バラ1`, 'ok');
      refocusBarcode();
    }

    // 出庫単位の切替(梱包/バラ)。バラ時は梱包数を使わずバラ数をそのまま出庫。
    function onUnitChange() {
      const unit = document.getElementById('unit').value;
      document.getElementById('qtyLabel').textContent = unit === 'bara' ? '出庫バラ数' : '出庫個数（梱包）';
      document.getElementById('packDiv').style.display = unit === 'bara' ? 'none' : '';
    }

    function addQty() {
      const msg = document.getElementById('qtyMsg');
      const cur = currentDetail();
      const stockVal = document.getElementById('stock').value;
      if (!cur || !cur.detail || !stockVal) { setMsg(msg, '商品・在庫を選択してください', 'error'); return; }
      const st = JSON.parse(stockVal);
      const unit = document.getElementById('unit').value;
      const qty = Number(document.getElementById('qty').value);
      if (qty < 1) { setMsg(msg, '数量は1以上', 'error'); return; }

      // バラ: 入力数=バラ数(梱包数1で送信)。梱包: 入力数×梱包数=バラ数。
      let issueQuantity, packSize, bara;
      if (unit === 'bara') {
        issueQuantity = qty; packSize = 1; bara = qty;
      } else {
        packSize = Number(document.getElementById('pack').value);
        if (packSize < 1) { setMsg(msg, '梱包数は1以上', 'error'); return; }
        issueQuantity = qty; bara = qty * packSize;
      }
      lines.push({
        kind: 'qty', productId: cur.product.productId, productDetailId: cur.detail.productDetailId,
        label: cur.product.productName, lot: st.lot, expiryDate: st.exp,
        issueQuantity, packSize, bara,
      });
      setMsg(msg, '', '');
      renderLines();
    }

    function renderLines() {
      const tbody = document.querySelector('#lineTable tbody');
      tbody.innerHTML = '';
      lines.forEach((l, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td>${l.kind === 'barcode' ? 'バーコード' : '数量'}</td>` +
          `<td>${l.kind === 'barcode' ? attr(l.barcodeValue) + ' ' + attr(l.label) : attr(l.label)}</td>` +
          `<td>${attr(l.lot || '(なし)')}</td><td style="text-align:right;">${l.bara}</td>` +
          `<td><input value="${attr(l.note)}" oninput="lines[${i}].note=this.value" placeholder="任意" style="width:130px;" /></td>` +
          `<td><button class="danger" onclick="removeLine(${i})">削除</button></td>`;
        tbody.appendChild(tr);
      });
    }
    function removeLine(i) { lines.splice(i, 1); renderLines(); }
    function attr(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    async function submitIssue() {
      const msg = document.getElementById('resultMsg');
      if (lines.length === 0) { setMsg(msg, '明細がありません', 'error'); return; }
      const body = {
        issueDate: document.getElementById('issueDate').value,
        note: document.getElementById('note').value,
        details: lines.map((l) => l.kind === 'barcode'
          ? { barcodeValue: l.barcodeValue, note: l.note || '' }
          : { productId: l.productId, productDetailId: l.productDetailId, lotNumber: l.lot, expiryDate: l.expiryDate, issueQuantity: l.issueQuantity, packSize: l.packSize, note: l.note || '' }),
      };
      const { ok, data } = await api('/api/issues', { method: 'POST', body: JSON.stringify(body) });
      if (!ok) { setMsg(msg, data.error || '保存失敗', 'error'); return; }
      let text = `出庫を保存しました（出庫ID:${data.issueId}）`;
      if (data.message) text += ' / ' + data.message;
      else if (data.orderPlanCreated) text += ' / 発注予定を作成しました';
      setMsg(msg, text, 'ok');
      if (document.getElementById('printChk').checked) {
        window.open('/print.html?type=issues&id=' + data.issueId, '_blank');
      }
      lines = []; renderLines(); onProductChange();
    }

    boot();
  </script>
</body>
</html>
