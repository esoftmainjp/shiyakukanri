<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>使用期限管理 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    tr.expired { background: #fde8e8; }
    tr.warning { background: #fff5e0; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>使用期限管理</h2>
      <div class="row">
        <div style="flex:0; min-width:160px;">
          <label>警告日数(この日数以内)</label>
          <input type="number" id="warnDays" min="0" />
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="load()">表示</button></div>
      </div>
      <p style="font-size:0.85rem;">
        <span class="pill canceled" style="background:#b23b3b;">期限切れ</span>
        <span class="pill canceled" style="background:#d9a300;">期限接近</span>
      </p>
      <p class="msg" id="msg"></p>
      <table id="tbl">
        <thead><tr><th>状態</th><th>商品名</th><th>ロット</th><th>使用期限</th><th>残日数</th><th>在庫数</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 運用設定 (管理者のみ) -->
    <div class="card" id="settingsCard" style="display:none;">
      <h3>運用設定</h3>
      <div class="row">
        <div style="flex:0; min-width:180px;">
          <label>警告日数(既定)</label>
          <input type="number" id="setWarnDays" min="0" />
        </div>
        <div style="flex:0; min-width:220px;">
          <label>期限切れ商品の出庫</label>
          <select id="setAllowExpired">
            <option value="false">許可しない</option>
            <option value="true">許可する</option>
          </select>
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="saveSettings()">設定を保存</button></div>
      </div>
      <p class="msg" id="setMsg"></p>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let settings = {};

    async function boot() {
      const user = await initPage('expiry');
      if (!user) return;
      const s = await api('/api/settings');
      settings = s.data.settings || {};
      document.getElementById('warnDays').value = settings.expiry_warn_days || 30;
      if (user.userType === 'admin') {
        document.getElementById('settingsCard').style.display = 'block';
        document.getElementById('setWarnDays').value = settings.expiry_warn_days || 30;
        document.getElementById('setAllowExpired').value = settings.allow_expired_issue || 'false';
      }
      load();
    }

    async function load() {
      const wd = document.getElementById('warnDays').value;
      const { data } = await api('/api/inventory/expiry?warnDays=' + encodeURIComponent(wd));
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = '';
      const rows = data.rows || [];
      if (rows.length === 0) { tbody.innerHTML = '<tr><td colspan="6">該当する在庫はありません。</td></tr>'; return; }
      rows.forEach((r) => {
        const tr = document.createElement('tr');
        tr.className = r.status;
        const label = r.status === 'expired' ? '期限切れ' : '期限接近';
        const days = r.days_left < 0 ? `${-r.days_left}日超過` : `残${r.days_left}日`;
        tr.innerHTML =
          `<td>${label}</td><td>${r.product_name}</td><td>${r.lot_number || '(なし)'}</td>` +
          `<td>${r.expiry_date}</td><td>${days}</td><td style="text-align:right;">${r.stock_quantity}</td>`;
        tbody.appendChild(tr);
      });
    }

    async function saveSettings() {
      const body = {
        expiry_warn_days: document.getElementById('setWarnDays').value,
        allow_expired_issue: document.getElementById('setAllowExpired').value,
      };
      const { ok, data } = await api('/api/settings', { method: 'PUT', body: JSON.stringify(body) });
      setMsg(document.getElementById('setMsg'), ok ? '設定を保存しました' : (data.error || '失敗'), ok ? 'ok' : 'error');
      if (ok) { settings = Object.assign(settings, body); document.getElementById('warnDays').value = body.expiry_warn_days; load(); }
    }

    boot();
  </script>
</body>
</html>
