<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>使用期限管理 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    /* app.cssのゼブラ縞(偶数行)より優先させるためID付きで指定 */
    #tbl tbody tr.expired, #tbl tbody tr.expired:hover { background: #fde8e8; }
    #tbl tbody tr.warning, #tbl tbody tr.warning:hover { background: #fff5e0; }
    /* 凡例: 実際の行の色と揃える(薄いパステル) */
    .legend { display: inline-block; padding: 2px 12px; border-radius: 12px; font-size: 0.82rem; font-weight: 700; margin-right: 8px; }
    .legend.expired { background: #fde8e8; color: #c0575d; border: 1px solid #f3c9c9; }
    .legend.warning { background: #fff5e0; color: #b0842a; border: 1px solid #f0e0b0; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>使用期限管理</h2>
      <div class="row">
        <div style="flex:0; min-width:160px;">
          <label>警告日数(この日数以内)</label>
          <input type="number" id="warnDays" min="0" />
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="load()">表示</button></div>
      </div>
      <p style="font-size:0.85rem;">
        <span class="legend expired">期限切れ</span>
        <span class="legend warning">期限接近</span>
      </p>
      <div style="margin:8px 0;">
        <button onclick="orderChecked()">チェックした商品を発注予定に追加して発注画面へ →</button>
      </div>
      <div style="margin:8px 0; display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; background:#fbfcfd; border:1px solid #eee; border-radius:8px; padding:8px 10px;">
        <div style="flex:0; min-width:120px;"><label>処理区分</label>
          <select id="dispType">
            <option value="disposal">廃棄</option>
            <option value="return">返品</option>
          </select>
        </div>
        <div style="flex:0; min-width:220px;"><label>理由(必須)</label><input id="dispReason" value="使用期限切れ" /></div>
        <div style="flex:0 0 auto;"><label>&nbsp;</label><button class="danger" onclick="disposeChecked()" style="white-space:nowrap;">チェックした在庫を廃棄/返品</button></div>
      </div>
      <p style="font-size:0.82rem; color:#777; margin:0 0 6px;">※ チェックした各在庫の「在庫数」全量を処理します（期限切れ在庫の一括処理用）。在庫は0になり一覧から消えます。</p>
      <p class="msg" id="msg"></p>
      <table id="tbl">
        <thead><tr>
          <th style="width:36px; text-align:center;"><input type="checkbox" id="checkAll" onchange="toggleAll(this.checked)" style="width:auto;" /></th>
          <th>状態</th><th>商品名</th><th>ロット</th><th>使用期限</th><th>残日数</th><th>警告日数</th><th>個数</th><th>在庫数</th><th>予定</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let settings = {};
    const detailByProduct = {}; // productId -> productDetailId(問屋設定あり)
    const nameByProduct = {};   // productId -> 商品名

    async function boot() {
      const user = await initPage('expiry');
      if (!user) return;
      const s = await api('/api/settings');
      settings = s.data.settings || {};
      document.getElementById('warnDays').value = settings.expiry_warn_days || 30;
      // 商品→商品詳細(問屋あり)の対応表を用意(発注追加用)
      const products = await getProducts();
      products.forEach((p) => {
        nameByProduct[p.productId] = p.productName;
        const d = (p.details || []).find((x) => x.supplierId);
        detailByProduct[p.productId] = d ? d.productDetailId : null;
      });
      load();
    }

    async function load() {
      const wd = document.getElementById('warnDays').value;
      const { data } = await api('/api/inventory/expiry?warnDays=' + encodeURIComponent(wd));
      const tbody = document.querySelector('#tbl tbody');
      tbody.innerHTML = '';
      document.getElementById('checkAll').checked = false;
      const rows = data.rows || [];
      if (rows.length === 0) { tbody.innerHTML = '<tr><td colspan="10">該当する在庫はありません。</td></tr>'; return; }
      rows.forEach((r) => {
        const tr = document.createElement('tr');
        tr.className = r.status;
        const label = r.status === 'expired' ? '期限切れ' : '期限接近';
        const days = r.days_left < 0 ? `${-r.days_left}日超過` : `残${r.days_left}日`;
        tr.innerHTML =
          `<td style="text-align:center;"><input type="checkbox" class="pick" data-pid="${r.product_id}" ` +
          `data-lot="${esc(r.lot_number || '')}" data-exp="${r.expiry_date || ''}" data-qty="${r.stock_quantity}" data-name="${esc(r.product_name)}" style="width:auto;" /></td>` +
          `<td>${label}</td><td>${esc(r.product_name)}</td><td>${esc(r.lot_number) || '(なし)'}</td>` +
          `<td>${r.expiry_date}</td><td>${days}</td>` +
          `<td style="text-align:right;">${r.warn_days != null ? r.warn_days + '日' : ''}</td>` +
          `<td style="text-align:right;">${r.stock_quantity}</td><td style="text-align:right;">${r.product_total}</td>` +
          `<td class="nowrap">${planBadges(r)}</td>`;
        tbody.appendChild(tr);
      });
    }

    function toggleAll(v) { document.querySelectorAll('.pick').forEach((c) => { c.checked = v; }); }

    // 発注予定・入庫予定のバッジ
    function planBadges(r) {
      let h = '';
      if (r.has_order_plan) h += '<span class="pill unordered">発注予定</span> ';
      if (r.has_incoming) h += '<span class="pill ordered">入庫予定</span>';
      return h;
    }

    // チェックした商品を発注予定に追加して発注画面へ
    async function orderChecked() {
      const msg = document.getElementById('msg');
      const pids = [...new Set([...document.querySelectorAll('.pick:checked')].map((c) => c.dataset.pid))];
      if (pids.length === 0) { setMsg(msg, '発注する商品を選択してください', 'error'); return; }
      const failed = [];
      let added = 0;
      for (const pid of pids) {
        const pdId = detailByProduct[pid];
        if (!pdId) { failed.push(nameByProduct[pid] || pid); continue; }
        const { ok } = await api('/api/orders/add-product', { method: 'POST', body: JSON.stringify({ productDetailId: pdId, orderQuantity: 1 }) });
        if (ok) added++; else failed.push(nameByProduct[pid] || pid);
      }
      if (failed.length) {
        alert('次の商品は問屋が未設定などのため追加できませんでした：\n' + failed.join('\n'));
      }
      if (added > 0) {
        window.location = '/orders.html';
      } else {
        setMsg(msg, '発注予定に追加できる商品がありませんでした', 'error');
      }
    }

    // チェックした在庫を廃棄/返品(各在庫の在庫数全量を処理)
    async function disposeChecked() {
      const msg = document.getElementById('msg');
      const picks = [...document.querySelectorAll('.pick:checked')];
      if (picks.length === 0) { setMsg(msg, '処理する在庫を選択してください', 'error'); return; }
      const type = document.getElementById('dispType').value;
      const typeLabel = type === 'disposal' ? '廃棄' : '返品';
      const reason = document.getElementById('dispReason').value.trim();
      if (!reason) { setMsg(msg, '理由を入力してください', 'error'); return; }
      const items = picks.map((c) => ({
        productId: c.dataset.pid, lotNumber: c.dataset.lot || '', expiryDate: c.dataset.exp || null,
        qty: Number(c.dataset.qty), name: c.dataset.name,
      })).filter((x) => x.qty > 0);
      if (items.length === 0) { setMsg(msg, '在庫数のある行を選択してください', 'error'); return; }
      const totalQty = items.reduce((s, x) => s + x.qty, 0);
      if (!confirm(`選択した ${items.length} 件（在庫合計 ${totalQty} バラ）を「${typeLabel}」します。\nよろしいですか？`)) return;
      let done = 0; const failed = [];
      for (const it of items) {
        const { ok, data } = await api('/api/inventory/movement', {
          method: 'POST',
          body: JSON.stringify({
            productId: it.productId, lotNumber: it.lotNumber, expiryDate: it.expiryDate,
            movementType: type, quantity: it.qty, reason,
          }),
        });
        if (ok) done++; else failed.push(`${it.name}（ロット:${it.lotNumber || 'なし'}）: ${(data && data.error) || '失敗'}`);
      }
      if (failed.length) alert('次の在庫は処理できませんでした：\n' + failed.join('\n'));
      setMsg(msg, `${typeLabel}を ${done} 件 実行しました${failed.length ? `（失敗 ${failed.length} 件）` : ''}`, done ? 'ok' : 'error');
      load();
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    boot();
  </script>
</body>
</html>
