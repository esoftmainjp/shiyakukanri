<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード設定 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>main { max-width: 480px; margin: 0 auto; }</style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>パスワード設定</h2>
      <div id="loading">確認中...</div>
      <div id="formArea" style="display:none;">
        <p>ログインID: <strong id="loginId"></strong></p>
        <div><label>新しいパスワード（8文字以上）</label><input type="password" id="pw" /></div>
        <div style="margin-top:8px;"><label>確認のためもう一度</label><input type="password" id="pw2" /></div>
        <p class="msg" id="msg"></p>
        <div style="margin-top:12px;"><button id="btn" onclick="submitPw()">設定してログインへ</button></div>
      </div>
      <div id="invalid" style="display:none;">
        <p class="msg error">リンクが無効か、有効期限が切れています。</p>
        <p>下にご登録のメールアドレスを入力すると、設定リンクを再送できます（何度でも可能）。</p>
        <div><label>メールアドレス（ログインID）</label><input type="email" id="rEmail" /></div>
        <div style="margin-top:8px;"><button id="rBtn" onclick="resend()">設定メールを再送する</button></div>
        <p class="msg" id="rMsg"></p>
        <p style="margin-top:10px;">または、もう一度 <a href="/signup.html">利用登録</a> からお試しください。</p>
      </div>
      <div id="doneArea" style="display:none;">
        <p class="msg ok">パスワードを設定しました。</p>
        <p><a href="/">ログイン画面へ進む</a></p>
      </div>
    </div>
  </main>
  <script>
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);});}
    function setMsg(el,t,cls){el.textContent=t||'';el.className='msg'+(cls?(' '+cls):'');}
    var token = new URLSearchParams(location.search).get('token') || '';
    async function boot(){
      if(!token){ show('invalid'); return; }
      var r = await fetch('/api/signup/verify-token?token='+encodeURIComponent(token));
      var d = await r.json();
      if(!r.ok || !d.ok){ show('invalid'); return; }
      document.getElementById('loginId').textContent = d.loginId;
      show('formArea');
    }
    function show(id){ ['loading','formArea','invalid','doneArea'].forEach(function(x){ document.getElementById(x).style.display = (x===id)?'block':'none'; }); }
    async function resend(){
      var msg=document.getElementById('rMsg');
      var email=document.getElementById('rEmail').value.trim();
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ setMsg(msg,'メールアドレスの形式が正しくありません','error'); return; }
      document.getElementById('rBtn').disabled=true;
      var r=await fetch('/api/signup/resend',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})});
      var d=await r.json();
      setMsg(msg, d.message || d.error || (r.ok?'再送しました':'再送に失敗しました'), r.ok?'ok':'error');
      document.getElementById('rBtn').disabled=false;
      if(r.ok && d.setPasswordUrl){ msg.innerHTML += ' <a href="'+d.setPasswordUrl+'">パスワードを設定する</a>'; }
    }
    async function submitPw(){
      var msg=document.getElementById('msg');
      var pw=document.getElementById('pw').value, pw2=document.getElementById('pw2').value;
      if(pw.length<8){ setMsg(msg,'パスワードは8文字以上にしてください','error'); return; }
      if(pw!==pw2){ setMsg(msg,'確認用パスワードが一致しません','error'); return; }
      document.getElementById('btn').disabled=true;
      var r=await fetch('/api/signup/set-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw})});
      var d=await r.json();
      if(!r.ok){ setMsg(msg,d.error||'設定に失敗しました','error'); document.getElementById('btn').disabled=false; return; }
      show('doneArea');
    }
    boot();
  </script>
</body>
</html>
