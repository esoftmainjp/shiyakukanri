<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>操作ログ | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    #logTbl td, #logTbl th { font-size: 0.86rem; }
    .logdetail pre {
      margin: 4px 0 0; padding: 8px 10px; background: #f6f8fa; border: 1px solid var(--line);
      border-radius: 8px; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all;
    }
    .difftbl { margin: 6px 0 2px; border-collapse: collapse; font-size: 0.8rem; }
    .difftbl th, .difftbl td { border: 1px solid var(--line); padding: 3px 8px; text-align: left; }
    .difftbl th { background: #eef2f5; font-weight: 700; }
    .difftbl tr.chg td { background: #fff7e6; }
    .difftbl tr.chg td:nth-child(3) { color: #b26a00; font-weight: 700; }
    .oppill {
      display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.78rem; white-space: nowrap;
      background: #eef2f5; color: #333;
    }
    .op-削除 { background: #fdecea; color: #b23b3b; }
    .op-登録 { background: #e9f6ec; color: #2b7a3b; }
    .op-更新 { background: #eaf2fd; color: #2b5f9e; }
    .op-ログイン { background: #f3ecfa; color: #6a3ba0; }
    .op-印刷, .op-バーコード印刷 { background: #fff4e0; color: #9a6416; }
    .op-CSV出力 { background: #e6f6f6; color: #1f7d7d; }
    .op-プラン変更 { background: #fde9f1; color: #9c3060; }
    .pager { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>操作ログ <span id="storageInfo" style="font-size:0.8rem; font-weight:normal; color:#666;"></span></h2>
      <p style="font-size:0.85rem; color:#555;">登録・更新・削除・ログインなどの操作履歴を確認できます（管理者専用）。</p>
      <div class="row" style="align-items:flex-end;">
        <div><label>期間(開始)</label><input type="date" id="from" /></div>
        <div><label>期間(終了)</label><input type="date" id="to" /></div>
        <div style="flex:0; min-width:150px;"><label>ユーザー</label><select id="fUser"><option value="">すべて</option></select></div>
        <div style="flex:0; min-width:130px;"><label>操作区分</label><select id="fOp"><option value="">すべて</option></select></div>
        <div style="flex:0; min-width:150px;"><label>対象</label><select id="fTable"><option value="">すべて</option></select></div>
      </div>
      <div class="row" style="align-items:flex-end;">
        <div style="flex:2;"><label>キーワード</label><input id="fKeyword" placeholder="ユーザー名・対象・変更内容などで検索" /></div>
        <div style="flex:0; min-width:120px;"><label>表示件数</label>
          <select id="fLimit"><option>50</option><option>100</option><option>200</option></select>
        </div>
        <div style="flex:0;"><label>&nbsp;</label><button onclick="search()">検索</button></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="resetFilter()">クリア</button></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="downloadCsv()">CSV出力</button></div>
        <div style="flex:0;"><label>&nbsp;</label><button class="secondary" onclick="printLogs()">印刷</button></div>
      </div>
      <p class="msg" id="msg"></p>

      <table id="logTbl">
        <thead><tr>
          <th style="width:150px;">日時</th><th style="width:130px;">ユーザー</th>
          <th style="width:90px;">操作</th><th style="width:110px;">対象</th>
          <th>内容</th>
        </tr></thead>
        <tbody></tbody>
      </table>

      <div class="pager">
        <button class="secondary" id="prevBtn" onclick="pageMove(-1)">前へ</button>
        <span id="pageInfo"></span>
        <button class="secondary" id="nextBtn" onclick="pageMove(1)">次へ</button>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let rows = [];
    let total = 0, offset = 0, limit = 50;

    async function boot() {
      const user = await initPage('logs');
      if (!user) return;
      if (user.userType !== 'admin' && user.userType !== 'superadmin') { location.href = '/'; return; }
      // 既定期間: 直近1ヶ月
      const today = new Date();
      const from = new Date(); from.setMonth(from.getMonth() - 1);
      document.getElementById('to').value = localDateStr(today);
      document.getElementById('from').value = localDateStr(from);
      await loadMeta();
      loadStorage();
      search();
    }

    async function loadStorage() {
      const el = document.getElementById('storageInfo');
      const { ok, data } = await api('/api/logs/storage');
      if (!ok) { el.textContent = ''; return; }
      el.textContent = `（${Number(data.count).toLocaleString()} 件）`;
    }

    async function loadMeta() {
      const { ok, data } = await api('/api/logs/meta');
      if (!ok) return;
      const uSel = document.getElementById('fUser');
      (data.users || []).forEach((u) => {
        const o = document.createElement('option'); o.value = u.id; o.textContent = u.name; uSel.appendChild(o);
      });
      const opSel = document.getElementById('fOp');
      (data.operationTypes || []).forEach((t) => {
        const o = document.createElement('option'); o.value = t; o.textContent = t; opSel.appendChild(o);
      });
      const tSel = document.getElementById('fTable');
      (data.targetTables || []).forEach((t) => {
        const o = document.createElement('option'); o.value = t.value; o.textContent = t.label; tSel.appendChild(o);
      });
    }

    function queryString() {
      const p = new URLSearchParams();
      const set = (k, id) => { const v = document.getElementById(id).value; if (v) p.set(k, v); };
      set('from', 'from'); set('to', 'to'); set('userId', 'fUser');
      set('operationType', 'fOp'); set('targetTable', 'fTable'); set('keyword', 'fKeyword');
      p.set('limit', limit);
      p.set('offset', offset);
      return p.toString();
    }

    // 絞り込み条件のみ(件数・ページングを含めない)。CSV/印刷の出力用。
    function filterQueryString() {
      const p = new URLSearchParams();
      const set = (k, id) => { const v = document.getElementById(id).value; if (v) p.set(k, v); };
      set('from', 'from'); set('to', 'to'); set('userId', 'fUser');
      set('operationType', 'fOp'); set('targetTable', 'fTable'); set('keyword', 'fKeyword');
      return p.toString();
    }
    function downloadCsv() { window.location = '/api/logs/csv?' + filterQueryString(); }
    function printLogs() {
      const qs = filterQueryString();
      window.open('/print.html?type=logs&limit=5000&' + qs, '_blank');
    }

    function search() { offset = 0; limit = Number(document.getElementById('fLimit').value) || 50; load(); }

    async function load() {
      const { ok, data } = await api('/api/logs?' + queryString());
      if (!ok) { setMsg(document.getElementById('msg'), data.error || '取得に失敗しました', 'error'); return; }
      rows = data.items || [];
      total = data.total || 0;
      offset = data.offset || 0;
      limit = data.limit || limit;
      render();
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return esc(s);
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
    }

    // ===== 変更前/変更後の表示(詳細) =====
    const KEY_LABELS = {
      name: '名称', kana: 'カナ', note: '備考', is_active: '有効', login_id: 'ログインID', user_type: 'タイプ',
      password: 'パスワード', department_id: '部門', category_id: '分類', management_code: '管理コード', qc_target_flag: '試薬管理対象',
      product_id: '商品', supplier_id: '問屋', maker_id: 'メーカー', product_detail_id: '商品詳細',
      lot_number: 'ロット', expiry_date: '使用期限', unit_price: '単価', pack_size: '梱包数',
      quantity_unit: '数量単位', pack_unit: '梱包単位', spec: '規格', jan_code: 'JANコード',
      test_count: 'テスト数', min_quantity: '最低個数', order_quantity: '発注数', jan_maker_code: 'JANメーカーコード',
      stock_quantity: '在庫数', movementType: '区分', reason: '理由', receipt_date: '入庫日', issue_date: '出庫日',
      order_date: '発注日', order_status: '状態', apply_start_date: '適用開始日', apply_end_date: '適用終了日',
      barcode_issue_flag: 'バーコード発行', canceled_flag: 'キャンセル', held_flag: '保留',
      password_changed: 'パスワード変更', file: 'ファイル', count: '件数',
      // camelCase(API内部キー)や集計系の項目名も日本語化
      productId: '商品', lotNumber: 'ロット', expiryDate: '使用期限',
      issueDate: '出庫日', receiptDate: '入庫日', orderDate: '発注日',
      detailCount: '明細件数', orderPlanCreated: '発注予定作成', receivedOrders: '入庫済み発注数',
      values: 'バーコード値', from: '開始日', to: '終了日', groupBy: '集計単位', via: '経由',
      admin_login_id: '管理者ログインID', order_id: '発注ID', planned_order_quantity: '予定数',
      title: 'タイトル', lineCount: '明細件数', scope: '絞り込み条件', status: '状態',
      confirmedLines: '反映件数', totalDiff: '差異合計', voidedBarcodes: '紛失無効化(本)',
      driftLines: '在庫変動件数', uncounted: '未カウント件数',
      inserted: '取込件数', skipped: 'スキップ件数',
      departmentsCreated: '部門作成数', categoriesCreated: '分類作成数',
      makersCreated: 'メーカー作成数', suppliersCreated: '問屋作成数',
      productsCreated: '商品作成数', detailsCreated: '商品詳細作成数',
      user_id: 'ユーザー', id: 'ID', created_at: '作成日時', updated_at: '更新日時',
    };
    const MOVE_LABEL = { adjust: '在庫調整', disposal: '廃棄', return: '返品', receipt: '入庫', issue: '出庫' };
    const OSTATUS_LABEL = { unordered: '未発注', ordered: '発注済み', received: '入庫済み', canceled: 'キャンセル' };
    const STATUS_LABEL = { open: '作成', counting: 'カウント中', confirmed: '確定', canceled: 'キャンセル', unordered: '未発注', ordered: '発注済み', received: '入庫済み' };
    const UTYPE_LABEL = { superadmin: '全体管理者', admin: '管理者', general: '一般', supplier: '問屋' };
    function fmtLogVal(k, v) {
      if (v === undefined) return '';           // その項目が存在しない側
      if (v === null || v === '') return '(空)';
      if (typeof v === 'boolean') {
        if (k === 'is_active') return v ? '有効' : '無効';
        return v ? 'はい' : 'いいえ';
      }
      if (k === 'movementType') return MOVE_LABEL[v] || v;
      if (k === 'order_status') return OSTATUS_LABEL[v] || v;
      if (k === 'status') return STATUS_LABEL[v] || v;
      if (k === 'user_type') return UTYPE_LABEL[v] || v;
      if (typeof v === 'object') { try { return JSON.stringify(v); } catch (e) { return String(v); } }
      return String(v);
    }
    // 変更前/変更後の比較テーブル
    function diffTable(r) {
      const b = r.before_data, a = r.after_data;
      if (b == null && a == null) return '';
      const keys = [...new Set([...(b ? Object.keys(b) : []), ...(a ? Object.keys(a) : [])])];
      if (!keys.length) return '';
      const body = keys.map((k) => {
        const bv = b ? b[k] : undefined, av = a ? a[k] : undefined;
        const changed = fmtLogVal(k, bv) !== fmtLogVal(k, av);
        return `<tr class="${changed ? 'chg' : ''}"><td>${esc(KEY_LABELS[k] || k)}</td>` +
          `<td>${esc(fmtLogVal(k, bv))}</td><td>${esc(fmtLogVal(k, av))}</td></tr>`;
      }).join('');
      return `<table class="difftbl"><thead><tr><th>項目</th><th>変更前</th><th>変更後</th></tr></thead><tbody>${body}</tbody></table>`;
    }
    function toggleDetail(i) {
      const el = document.getElementById('detail_' + i);
      if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    function render() {
      const tbody = document.querySelector('#logTbl tbody');
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">該当するログがありません。</td></tr>';
      } else {
        tbody.innerHTML = rows.map((r, i) => {
          const hasDetail = r.before_data != null || r.after_data != null;
          const name = (r.target_name && r.target_name !== r.user_name) ? esc(r.target_name) : '';
          const detailBtn = hasDetail
            ? ` <button class="secondary" style="padding:1px 7px; font-size:0.75rem;" onclick="toggleDetail(${i})">詳細</button>`
            : '';
          const detail = hasDetail
            ? `<div class="logdetail" id="detail_${i}" style="display:none;">${diffTable(r)}</div>`
            : '';
          return `<tr>
            <td>${fmtDate(r.created_at)}</td>
            <td>${esc(r.user_name || '(不明)')}</td>
            <td><span class="oppill op-${esc(r.operation_type)}">${esc(r.operation_type) || '-'}</span></td>
            <td>${esc(r.target_table_label || '')}</td>
            <td>${name}${detailBtn}${detail}</td>
          </tr>`;
        }).join('');
      }
      // ページャ
      const start = total === 0 ? 0 : offset + 1;
      const end = Math.min(offset + rows.length, total);
      document.getElementById('pageInfo').textContent = `${start}〜${end} / 全${total}件`;
      document.getElementById('prevBtn').disabled = offset <= 0;
      document.getElementById('nextBtn').disabled = end >= total;
    }

    function pageMove(dir) {
      const next = offset + dir * limit;
      if (next < 0 || next >= total) return;
      offset = next;
      load();
    }

    function resetFilter() {
      ['fUser', 'fOp', 'fTable', 'fKeyword'].forEach((id) => { document.getElementById(id).value = ''; });
      search();
    }

    boot();
  </script>
</body>
</html>
