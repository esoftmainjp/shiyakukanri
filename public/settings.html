<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>設定 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div id="denied" class="card" style="display:none;"><p>この画面は管理者のみ利用できます。</p></div>

    <div id="area" style="display:none;">
      <div class="card">
        <h2>画面デザイン（カラー）</h2>
        <div>
          <label>テーマ</label>
          <select id="theme" onchange="applyTheme(this.value)" style="min-width:220px; display:block;">
            <option value="blue">パステルブルー（標準）</option>
            <option value="green">パステルグリーン</option>
            <option value="pink">パステルピンク</option>
            <option value="purple">パステルパープル</option>
            <option value="warm">パステルオレンジ</option>
            <option value="gray">パステルグレー</option>
          </select>
        </div>
        <p style="color:#6b7280; font-size:0.83rem; margin-top:10px;">選ぶと即プレビューされます。「保存」で全端末に反映されます。</p>
      </div>

      <div class="card">
        <h2>使用期限・在庫</h2>
        <div class="row">
          <div style="flex:0;"><label>使用期限の警告日数（日）</label><input type="number" id="expiry_warn_days" min="0" style="width:120px;" /></div>
          <div style="flex:0;"><label>在庫僅少アラートのしきい値（バラ数）</label><input type="number" id="low_stock_threshold" min="0" style="width:160px;" /></div>
        </div>
        <div style="margin-top:12px;">
          <label style="display:inline-flex; align-items:center; gap:8px; margin:0; font-weight:700; color:var(--ink);">
            <input type="checkbox" id="allow_expired_issue" style="width:auto;" />期限切れ商品の出庫を許可する
          </label>
        </div>
        <p style="color:#6b7280; font-size:0.83rem;">警告日数：この日数以内に期限が来る在庫を「使用期限」画面・ホームで警告します。<br>
          在庫僅少しきい値：ホームの在庫一覧で、在庫がこの数以下の行を赤く表示します（0で無効）。</p>
      </div>

      <div class="card">
        <h2>自社情報（伝票・発注書に印字）</h2>
        <div class="row">
          <div style="flex:2;"><label>会社名</label><input id="company_name" placeholder="例：〇〇臨床検査センター" /></div>
          <div style="flex:0;"><label>電話</label><input id="company_tel" placeholder="例：03-0000-0000" /></div>
        </div>
        <div class="row">
          <div style="flex:3;"><label>住所</label><input id="company_address" placeholder="例：東京都〇〇区…" /></div>
          <div style="flex:1;"><label>担当者</label><input id="company_person" placeholder="例：山田" /></div>
        </div>
        <p style="color:#6b7280; font-size:0.83rem;">入庫伝票・出庫伝票・発注書の上部に印字されます（空欄の項目は印字されません）。</p>
      </div>

      <div class="card">
        <h2>バーコードラベル（全端末共通の既定）</h2>
        <div class="row">
          <div style="flex:0;"><label>ラベル幅(mm)</label><input type="number" id="label_width_mm" min="10" max="200" style="width:110px;" /></div>
          <div style="flex:0;"><label>ラベル高(mm)</label><input type="number" id="label_height_mm" min="10" max="200" style="width:110px;" /></div>
          <div style="flex:0;"><label>バーコード高(px)</label><input type="number" id="barcode_height_px" min="20" max="140" style="width:120px;" /></div>
          <div style="flex:0;"><label>バーコード幅(mm)</label><input type="number" id="barcode_width_mm" min="10" max="200" style="width:120px;" /></div>
        </div>
        <p style="color:#6b7280; font-size:0.83rem;">入庫時の印刷・バーコード印刷画面の既定サイズとして全端末で共有されます。</p>
      </div>

      <div class="card">
        <button onclick="save()">保存</button>
        <p class="msg" id="msg"></p>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    // key -> {type, default}
    const FIELDS = {
      theme:              { type: 'text', def: 'blue' },
      expiry_warn_days:   { type: 'num',  def: 30 },
      low_stock_threshold:{ type: 'num',  def: 0 },
      allow_expired_issue:{ type: 'bool', def: false },
      company_name:       { type: 'text', def: '' },
      company_tel:        { type: 'text', def: '' },
      company_address:    { type: 'text', def: '' },
      company_person:     { type: 'text', def: '' },
      label_width_mm:     { type: 'num',  def: 52 },
      label_height_mm:    { type: 'num',  def: 29 },
      barcode_height_px:  { type: 'num',  def: 60 },
      barcode_width_mm:   { type: 'num',  def: 45 },
    };

    async function boot() {
      const user = await initPage('settings');
      if (!user) return;
      if (user.userType !== 'admin') { document.getElementById('denied').style.display = 'block'; return; }
      document.getElementById('area').style.display = 'block';
      const { data } = await api('/api/settings');
      const s = data.settings || {};
      for (const [key, meta] of Object.entries(FIELDS)) {
        const el = document.getElementById(key);
        const v = (s[key] !== undefined && s[key] !== null && s[key] !== '') ? s[key] : meta.def;
        if (meta.type === 'bool') el.checked = String(v) === 'true';
        else el.value = v;
      }
    }

    async function save() {
      const body = {};
      for (const [key, meta] of Object.entries(FIELDS)) {
        const el = document.getElementById(key);
        body[key] = (meta.type === 'bool') ? String(el.checked) : String(el.value);
      }
      const { ok, data } = await api('/api/settings', { method: 'PUT', body: JSON.stringify(body) });
      if (ok) applyTheme(body.theme); // 端末キャッシュも更新
      setMsg(document.getElementById('msg'), ok ? '保存しました' : (data.error || '保存に失敗しました'), ok ? 'ok' : 'error');
    }

    boot();
  </script>
</body>
</html>
