<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>伝票印刷 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .sheet { max-width: 760px; margin: 16px auto; background: #fff; padding: 24px 28px; border: 1px solid #dde3e8; }
    .sheet h1 { font-size: 1.4rem; margin: 0 0 6px; text-align: center; letter-spacing: 0.3em; }
    .meta { display: flex; flex-wrap: wrap; gap: 4px 24px; margin: 12px 0; font-size: 0.92rem; }
    .meta div { min-width: 180px; }
    .sheet table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .sheet th, .sheet td { border: 1px solid #333; padding: 5px 8px; font-size: 0.88rem; }
    .sheet th { background: #eef2f5; }
    .num { text-align: right; }
    .toolbar { max-width: 760px; margin: 12px auto; text-align: right; }
    .note-line { margin-top: 12px; font-size: 0.9rem; }
    @media print {
      .toolbar, header { display: none !important; }
      body { background: #fff; }
      .sheet { border: none; margin: 0; max-width: none; padding: 0; }
      @page { size: A4 portrait; margin: 14mm; }
    }
  </style>
</head>
<body>
  <header></header>
  <div class="toolbar no-print">
    <button onclick="window.print()">印刷</button>
    <button class="secondary" onclick="window.close()">閉じる</button>
  </div>
  <div class="sheet" id="sheet"><p style="text-align:center;">読み込み中…</p></div>

  <script src="/common.js"></script>
  <script>
    const TITLES = {
      receipts: '入 庫 伝 票', issues: '出 庫 伝 票', orders: '発 注 書',
      ledger: '試 薬 管 理 台 帳', logs: '操 作 ロ グ',
      receipts_list: '入 庫 履 歴', issues_list: '出 庫 履 歴',
      orders_list: '発 注 履 歴', movements_list: '在 庫 調 整 履 歴',
    };
    // id を使わず期間/絞り込みで出力する一覧系
    const LIST_TYPES = ['ledger', 'logs', 'receipts_list', 'issues_list', 'orders_list', 'movements_list'];
    // 一覧系の取得先(type名とAPIパスが異なるものをマッピング)
    const LIST_ENDPOINT = {
      ledger: '/api/ledger', logs: '/api/logs',
      receipts_list: '/api/receipts', issues_list: '/api/issues',
      orders_list: '/api/orders', movements_list: '/api/inventory/movements',
    };
    const q = new URLSearchParams(location.search);
    const type = q.get('type');
    const id = q.get('id');

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    let company = {};

    async function boot() {
      // ログインヘッダは描画するが、未ログインでも印刷内容は表示を試みる
      await initPage('');
      // ledger/logs は id ではなく期間・絞り込みで出力
      if (!type || !TITLES[type] || (!LIST_TYPES.includes(type) && !id)) {
        document.getElementById('sheet').innerHTML = '<p>印刷対象が不正です。</p>';
        return;
      }
      // 自社情報(伝票ヘッダー用)を取得
      const cs = await api('/api/settings');
      if (cs.ok) company = cs.data.settings || {};
      const url = LIST_TYPES.includes(type)
        ? (LIST_ENDPOINT[type] || '/api/' + type) + '?' + q.toString()
        : '/api/' + type + '/' + id;
      const { ok, data } = await api(url);
      if (!ok) {
        document.getElementById('sheet').innerHTML = '<p>' + esc(data.error || '取得に失敗しました') + '</p>';
        return;
      }
      render(data);
      // 印刷操作をログに記録
      const isList = LIST_TYPES.includes(type);
      const detail = isList
        ? { title: TITLES[type], from: q.get('from') || null, to: q.get('to') || null }
        : { title: TITLES[type] };
      api('/api/activity', { method: 'POST', body: JSON.stringify({ action: 'print', targetTable: type, targetId: isList ? null : id, detail }) });
      // 描画後に自動で印刷ダイアログ
      setTimeout(() => { window.print(); }, 300);
    }

    function companyHeader(nameOnly) {
      const lines = [];
      if (company.company_name) lines.push(`<div style="font-weight:700; font-size:1.05rem;">${esc(company.company_name)}</div>`);
      if (!nameOnly) {
        if (company.company_address) lines.push(`<div>${esc(company.company_address)}</div>`);
        const tel = company.company_tel ? 'TEL: ' + esc(company.company_tel) : '';
        const person = company.company_person ? '担当: ' + esc(company.company_person) : '';
        if (tel || person) lines.push(`<div>${[tel, person].filter(Boolean).join('　')}</div>`);
      }
      if (lines.length === 0) return '';
      return `<div style="text-align:right; font-size:0.85rem; margin-bottom:6px; color:#333;">${lines.join('')}</div>`;
    }

    function printStamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      const s = `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
      return `<div style="text-align:right; font-size:0.8rem; color:#555; margin-bottom:2px;">印刷日時: ${s}</div>`;
    }

    function render(data) {
      // 台帳・操作ログは会社名のみ(電話番号・住所・担当者は印字しない)
      let html = printStamp() + companyHeader(LIST_TYPES.includes(type)) + `<h1>${TITLES[type]}</h1>`;
      if (type === 'receipts') html += receiptBody(data);
      else if (type === 'issues') html += issueBody(data);
      else if (type === 'ledger') html += ledgerBody(data);
      else if (type === 'logs') html += logsBody(data);
      else if (type === 'receipts_list') html += receiptsListBody(data);
      else if (type === 'issues_list') html += issuesListBody(data);
      else if (type === 'orders_list') html += ordersListBody(data);
      else if (type === 'movements_list') html += movementsListBody(data);
      else html += orderBody(data);
      document.getElementById('sheet').innerHTML = html;
    }

    function metaRow(pairs) {
      return `<div class="meta">${pairs.filter(Boolean).map(([k, v]) => `<div><strong>${k}：</strong>${esc(v)}</div>`).join('')}</div>`;
    }
    function noteLine(note) {
      return `<div class="note-line"><strong>備考：</strong>${esc(note || '')}</div>`;
    }

    function receiptBody(data) {
      const r = data.receipt;
      let h = metaRow([['伝票番号', r.id], ['入庫日', r.receipt_date], ['問屋', r.supplier_name || '-'], ['担当', r.user_name || '-']]);
      h += `<table><thead><tr><th>商品</th><th>ロット</th><th>使用期限</th><th class="num">入庫数</th><th class="num">梱包</th><th class="num">バラ数</th><th class="num">BC</th><th>備考</th></tr></thead><tbody>`;
      (data.details || []).forEach((d) => {
        h += `<tr><td>${esc(d.product_name)}</td><td>${esc(d.lot_number) || '-'}</td><td>${d.expiry_date || '-'}</td>` +
          `<td class="num">${d.receipt_quantity}</td><td class="num">${d.pack_size}</td><td class="num">${d.stock_added_quantity}</td>` +
          `<td class="num">${d.barcode_count}</td><td>${esc(d.note)}</td></tr>`;
      });
      const totBara = (data.details || []).reduce((a, d) => a + Number(d.stock_added_quantity), 0);
      h += `<tr><th colspan="5" class="num">合計(バラ)</th><th class="num">${totBara}</th><th colspan="2"></th></tr>`;
      h += `</tbody></table>` + noteLine(r.note);
      return h;
    }

    function issueBody(data) {
      const r = data.issue;
      let h = metaRow([['伝票番号', r.id], ['出庫日', r.issue_date], ['担当', r.user_name || '-']]);
      h += `<table><thead><tr><th>商品</th><th>ロット</th><th>使用期限</th><th class="num">出庫数</th><th class="num">梱包</th><th class="num">バラ数</th><th>バーコード</th><th>備考</th></tr></thead><tbody>`;
      (data.details || []).forEach((d) => {
        h += `<tr><td>${esc(d.product_name)}</td><td>${esc(d.lot_number) || '-'}</td><td>${d.expiry_date || '-'}</td>` +
          `<td class="num">${d.issue_quantity}</td><td class="num">${d.pack_size}</td><td class="num">${d.issue_total_quantity}</td>` +
          `<td>${esc(d.barcode_value) || '-'}</td><td>${esc(d.note)}</td></tr>`;
      });
      const totBara = (data.details || []).reduce((a, d) => a + Number(d.issue_total_quantity), 0);
      h += `<tr><th colspan="5" class="num">合計(バラ)</th><th class="num">${totBara}</th><th colspan="2"></th></tr>`;
      h += `</tbody></table>` + noteLine(r.note);
      return h;
    }

    const STATUS = { unordered: '未発注', ordered: '発注済み', received: '入庫済み', canceled: 'キャンセル' };
    function orderBody(data) {
      const o = data.order;
      let h = metaRow([['発注番号', o.id], ['発注日', o.order_date || '-'], ['問屋', o.supplier_name || '-'], ['状態', STATUS[o.order_status] || o.order_status], ['担当', o.user_name || '-']]);
      h += `<table><thead><tr><th>商品</th><th class="num">発注予定数(梱包)</th><th class="num">発注数(梱包)</th><th class="num">梱包</th><th>備考</th></tr></thead><tbody>`;
      (data.details || []).forEach((d) => {
        h += `<tr><td>${esc(d.product_name)}</td><td class="num">${d.planned_order_quantity}</td>` +
          `<td class="num">${d.order_quantity}</td><td class="num">${d.pack_size}</td><td>${esc(d.note)}</td></tr>`;
      });
      h += `</tbody></table>` + noteLine(o.note);
      return h;
    }

    function ledgerBody(data) {
      const from = q.get('from') || '';
      const to = q.get('to') || '';
      let h = metaRow([['期間', `${from || '—'} ～ ${to || '—'}`]]);
      h += `<table><thead><tr><th>入庫日</th><th>商品名</th><th>ロット</th><th>内容物コード</th>` +
        `<th>有効期限</th><th>使用開始日</th><th>使用終了日</th></tr></thead><tbody>`;
      const rows = data.rows || [];
      if (rows.length === 0) {
        h += `<tr><td colspan="7" style="text-align:center;">該当データがありません。</td></tr>`;
      } else {
        rows.forEach((r) => {
          h += `<tr><td>${r.receipt_date || ''}</td><td>${esc(r.product_name)}</td><td>${esc(r.lot_number) || '(なし)'}</td>` +
            `<td>${esc(r.content_code)}</td><td>${r.expiry_date || ''}</td><td>${r.use_start_date || ''}</td>` +
            `<td>${r.use_end_date || ''}</td></tr>`;
        });
      }
      h += `</tbody></table>`;
      return h;
    }

    function jsonInline(obj) {
      if (obj == null) return '';
      try { return esc(JSON.stringify(obj)); } catch (e) { return esc(String(obj)); }
    }
    function fmtTs(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return esc(s);
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}/${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    const LOG_TABLE_JP = {
      users: 'ユーザー', products: '商品', product_details: '商品詳細', suppliers: '問屋',
      receipts: '入庫', receipt_details: '入庫明細', issues: '出庫', issue_details: '出庫明細',
      orders: '発注', order_details: '発注明細', barcodes: 'バーコード', usage_records: '使用記録',
      stock_movements: '在庫変動', product_stocks: '在庫', app_settings: '設定',
      ledger: '試薬管理台帳', inventory: '在庫一覧', logs: '操作ログ',
    };
    function logsBody(data) {
      const from = q.get('from') || '';
      const to = q.get('to') || '';
      const rows = data.items || [];
      let h = metaRow([['期間', `${from || '—'} ～ ${to || '—'}`], ['件数', rows.length]]);
      h += `<table><thead><tr><th>日時</th><th>ユーザー</th><th>操作</th><th>対象</th>` +
        `<th class="num">対象ID</th><th>変更前</th><th>変更後</th></tr></thead><tbody>`;
      if (rows.length === 0) {
        h += `<tr><td colspan="7" style="text-align:center;">該当するログがありません。</td></tr>`;
      } else {
        rows.forEach((r) => {
          h += `<tr><td>${fmtTs(r.created_at)}</td><td>${esc(r.user_name || '(不明)')}</td>` +
            `<td>${esc(r.operation_type) || '-'}</td>` +
            `<td>${esc(r.target_table_label || LOG_TABLE_JP[r.target_table] || r.target_table || '')}</td>` +
            `<td class="num">${r.target_id == null ? '' : esc(r.target_id)}</td>` +
            `<td style="font-size:0.78rem; word-break:break-all;">${jsonInline(r.before_data)}</td>` +
            `<td style="font-size:0.78rem; word-break:break-all;">${jsonInline(r.after_data)}</td></tr>`;
        });
      }
      h += `</tbody></table>`;
      return h;
    }

    // ===== 履歴の一覧印刷 =====
    function listMeta(count) {
      const from = q.get('from') || '';
      const to = q.get('to') || '';
      const pairs = [];
      if (from || to) pairs.push(['期間', `${from || '—'} ～ ${to || '—'}`]);
      pairs.push(['件数', count]);
      return metaRow(pairs);
    }
    function emptyRow(cols) { return `<tr><td colspan="${cols}" style="text-align:center;">該当がありません。</td></tr>`; }

    function receiptsListBody(data) {
      const rows = data.receipts || [];
      let h = listMeta(rows.length);
      h += `<table><thead><tr><th>ID</th><th>入庫日</th><th>問屋</th><th class="num">明細</th>` +
        `<th class="num">バラ計</th><th class="num">BC(使用)</th><th>備考</th><th>担当</th></tr></thead><tbody>`;
      if (rows.length === 0) h += emptyRow(8);
      rows.forEach((r) => {
        h += `<tr><td>${r.id}</td><td>${r.receipt_date || ''}</td><td>${esc(r.supplier_name)}</td>` +
          `<td class="num">${r.detail_count}</td><td class="num">${r.total_bara}</td>` +
          `<td class="num">${r.barcode_count}(${r.barcode_used_count})</td><td>${esc(r.note)}</td><td>${esc(r.user_name)}</td></tr>`;
      });
      return h + `</tbody></table>`;
    }

    function issuesListBody(data) {
      const rows = data.issues || [];
      let h = listMeta(rows.length);
      h += `<table><thead><tr><th>ID</th><th>出庫日</th><th class="num">明細</th>` +
        `<th class="num">バラ計</th><th>備考</th><th>担当</th></tr></thead><tbody>`;
      if (rows.length === 0) h += emptyRow(6);
      rows.forEach((r) => {
        h += `<tr><td>${r.id}</td><td>${r.issue_date || ''}</td><td class="num">${r.detail_count}</td>` +
          `<td class="num">${r.total_bara}</td><td>${esc(r.note)}</td><td>${esc(r.user_name)}</td></tr>`;
      });
      return h + `</tbody></table>`;
    }

    function ordersListBody(data) {
      const rows = data.orders || [];
      let h = listMeta(rows.length);
      h += `<table><thead><tr><th>ID</th><th>状態</th><th>発注日</th><th>問屋</th>` +
        `<th class="num">明細</th><th>備考</th></tr></thead><tbody>`;
      if (rows.length === 0) h += emptyRow(6);
      rows.forEach((o) => {
        const dc = (o.details || []).length;
        h += `<tr><td>${o.id}</td><td>${STATUS[o.order_status] || o.order_status}</td>` +
          `<td>${o.order_date || '-'}</td><td>${esc(o.supplier_name)}</td>` +
          `<td class="num">${dc}</td><td>${esc(o.note)}</td></tr>`;
      });
      return h + `</tbody></table>`;
    }

    const MOVE_JP = { receipt: '入庫', issue: '出庫', adjust: '在庫調整', disposal: '廃棄', return: '返品' };
    function movementsListBody(data) {
      const rows = data.movements || [];
      let h = listMeta(rows.length);
      h += `<table><thead><tr><th>日時</th><th>区分</th><th>商品</th><th>ロット</th><th>使用期限</th>` +
        `<th class="num">増減</th><th class="num">調整前</th><th class="num">調整後</th><th>理由</th><th>担当</th></tr></thead><tbody>`;
      if (rows.length === 0) h += emptyRow(10);
      rows.forEach((m) => {
        const dt = m.created_at ? String(m.created_at).replace('T', ' ').slice(0, 16) : '';
        const chg = Number(m.quantity_change);
        h += `<tr><td>${esc(dt)}</td><td>${MOVE_JP[m.movement_type] || m.movement_type}</td>` +
          `<td>${esc(m.product_name)}</td><td>${esc(m.lot_number) || '(なし)'}</td><td>${m.expiry_date || '(なし)'}</td>` +
          `<td class="num">${(chg > 0 ? '+' : '') + chg}</td><td class="num">${m.quantity_before}</td>` +
          `<td class="num">${m.quantity_after}</td><td>${esc(m.reason)}</td><td>${esc(m.user_name)}</td></tr>`;
      });
      return h + `</tbody></table>`;
    }

    boot();
  </script>
</body>
</html>
