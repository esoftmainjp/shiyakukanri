<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>施設管理 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .statusbadge {
      display: inline-block; padding: 2px 14px; border-radius: 12px;
      font-size: 0.85rem; font-weight: 700;
    }
    .statusbadge.on  { background: #e9f6ec; color: #2b7a3b; border: 1px solid #b9e2c4; }
    .statusbadge.off { background: #fdecea; color: #b23b3b; border: 1px solid #f2c2bd; }
    /* 無効施設の行は薄く表示 */
    #tbl tr.facinactive td { background: #f7f7f8; color: #98a0aa; }
    #tbl tr.facinactive input { color: #98a0aa; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div id="denied" class="card" style="display:none;"><p>この画面は全体管理者のみ利用できます。</p></div>

    <div id="area" style="display:none;">
      <div class="card">
        <h2>施設を新規作成</h2>
        <p style="font-size:0.85rem; color:#555;">施設名と、その施設の初期管理者（ログインID＝メールアドレス）・パスワードを登録します。ログインIDは全施設で重複しないメールアドレスにしてください。作成した管理者は初回ログイン時にパスワード変更が必要です。</p>
        <div class="row">
          <div style="flex:2;"><label>施設名 <span style="color:#c0392b;">*</span></label><input id="name" placeholder="例：〇〇病院 中央検査室" /></div>
          <div style="flex:1;"><label>カナ</label><input id="kana" placeholder="任意" /></div>
          <div style="flex:0; min-width:140px;"><label>プラン</label><select id="planCode"></select></div>
        </div>
        <div class="row">
          <div style="flex:2;"><label>初期管理者ログインID（メール） <span style="color:#c0392b;">*</span></label><input id="adminLoginId" placeholder="例：admin@example.com" /></div>
          <div style="flex:1;"><label>初期パスワード（8文字以上） <span style="color:#c0392b;">*</span></label><input id="adminPassword" type="text" placeholder="8文字以上" /></div>
        </div>
        <p class="msg" id="createMsg"></p>
        <div style="margin-top:6px;"><button onclick="createFacility()">施設を作成</button></div>
      </div>

      <div class="card">
        <h2>施設一覧</h2>
        <p class="msg" id="msg"></p>
        <div class="scroll-x">
          <table id="tbl">
            <thead><tr><th>ID</th><th>施設名</th><th>カナ</th><th>プラン</th><th>ユーザー</th><th>商品</th><th>状態</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>プラン設定</h2>
        <p style="font-size:0.85rem; color:#555;">上限は空欄で「無制限」。チェックでプランごとの機能利用可否を切り替えます。変更は各行の「保存」で反映されます。</p>
        <div class="scroll-x">
          <table id="planTbl">
            <thead><tr><th>プラン</th><th>ユーザー上限</th><th>商品上限</th><th>ログ保持(日)</th><th>棚卸し</th><th>バーコード</th><th>集計</th><th>台帳</th><th>CSV取込</th><th>操作</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="msg" id="planMsg"></p>
      </div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let PLANS = [];
    async function boot() {
      const user = await initPage('facilities');
      if (!user) return;
      if (user.userType !== 'superadmin') { document.getElementById('denied').style.display = 'block'; return; }
      document.getElementById('area').style.display = 'block';
      const pr = await api('/api/facilities/plans');
      PLANS = (pr.data && pr.data.plans) || [];
      document.getElementById('planCode').innerHTML = planOptions('free');
      renderPlans();
      load();
    }

    // プラン設定の編集テーブル
    function renderPlans() {
      const num = (id, v) => `<input type="number" min="0" id="${id}" value="${v == null ? '' : v}" placeholder="無制限" style="width:90px;" />`;
      const chk = (id, v) => `<input type="checkbox" id="${id}" ${v ? 'checked' : ''} style="width:auto;" />`;
      const tb = document.querySelector('#planTbl tbody');
      tb.innerHTML = PLANS.map((p) => `<tr>
        <td><strong>${esc(p.name)}</strong><br><span style="color:#888; font-size:0.78rem;">${esc(p.code)}</span></td>
        <td style="text-align:center;">${num('pu_' + p.code, p.max_users)}</td>
        <td style="text-align:center;">${num('pp_' + p.code, p.max_products)}</td>
        <td style="text-align:center;">${num('pr_' + p.code, p.log_retention_days)}</td>
        <td style="text-align:center;">${chk('fs_' + p.code, p.feat_stocktake)}</td>
        <td style="text-align:center;">${chk('fb_' + p.code, p.feat_barcode)}</td>
        <td style="text-align:center;">${chk('fr_' + p.code, p.feat_reports)}</td>
        <td style="text-align:center;">${chk('fl_' + p.code, p.feat_ledger)}</td>
        <td style="text-align:center;">${chk('fi_' + p.code, p.feat_import)}</td>
        <td><button class="secondary" style="padding:4px 10px; font-size:0.82rem;" onclick="savePlan('${p.code}')">保存</button></td>
      </tr>`).join('');
    }

    async function savePlan(code) {
      const val = (id) => document.getElementById(id).value;
      const chk = (id) => document.getElementById(id).checked;
      const body = {
        max_users: val('pu_' + code), max_products: val('pp_' + code), log_retention_days: val('pr_' + code),
        feat_stocktake: chk('fs_' + code), feat_barcode: chk('fb_' + code), feat_reports: chk('fr_' + code),
        feat_ledger: chk('fl_' + code), feat_import: chk('fi_' + code),
      };
      const { ok, data } = await api('/api/facilities/plans/' + code, { method: 'PUT', body: JSON.stringify(body) });
      setMsg(document.getElementById('planMsg'), ok ? `プラン「${code}」を保存しました` : (data.error || '保存失敗'), ok ? 'ok' : 'error');
      if (ok) {
        const pr = await api('/api/facilities/plans');
        PLANS = (pr.data && pr.data.plans) || [];
        load(); // 施設一覧の上限表示も更新
      }
    }

    function planOptions(sel) {
      return PLANS.map((p) => `<option value="${p.code}"${String(p.code) === String(sel) ? ' selected' : ''}>${esc(p.name)}</option>`).join('');
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function lim(v) { return v == null ? '∞' : v; }

    async function load() {
      const { ok, data } = await api('/api/facilities');
      const tbody = document.querySelector('#tbl tbody');
      if (!ok) { setMsg(document.getElementById('msg'), data.error || '取得失敗', 'error'); return; }
      const rows = data.facilities || [];
      tbody.innerHTML = rows.map((f) => `<tr class="${f.is_active ? '' : 'facinactive'}">
        <td>${f.id}</td>
        <td><input value="${esc(f.name)}" id="nm_${f.id}" style="width:200px;" /></td>
        <td><input value="${esc(f.kana)}" id="kn_${f.id}" style="width:120px;" /></td>
        <td><select id="pl_${f.id}" style="width:auto;">${planOptions(f.plan_code)}</select></td>
        <td style="text-align:right; white-space:nowrap;">${f.user_count} / ${lim(f.max_users)}</td>
        <td style="text-align:right; white-space:nowrap;">${f.product_count} / ${lim(f.max_products)}</td>
        <td>${f.is_active
          ? '<span class="statusbadge on">有効</span>'
          : '<span class="statusbadge off">無効</span>'}</td>
        <td style="white-space:nowrap;">
          <button class="secondary" style="padding:4px 10px; font-size:0.82rem;" onclick="saveFacility(${f.id})">保存</button>
          <button class="secondary" style="padding:4px 10px; font-size:0.82rem;" onclick="toggleFacility(${f.id}, ${f.is_active ? 'false' : 'true'})">${f.is_active ? '無効化' : '有効化'}</button>
        </td></tr>`).join('') || '<tr><td colspan="8">施設がありません。</td></tr>';
    }

    async function createFacility() {
      const msg = document.getElementById('createMsg');
      const body = {
        name: document.getElementById('name').value.trim(),
        kana: document.getElementById('kana').value.trim(),
        planCode: document.getElementById('planCode').value,
        adminLoginId: document.getElementById('adminLoginId').value.trim(),
        adminPassword: document.getElementById('adminPassword').value,
      };
      if (!body.name || !body.adminLoginId || !body.adminPassword) { setMsg(msg, '施設名・管理者ログインID・パスワードは必須です', 'error'); return; }
      const { ok, data } = await api('/api/facilities', { method: 'POST', body: JSON.stringify(body) });
      if (!ok) { setMsg(msg, data.error || '作成に失敗しました', 'error'); return; }
      setMsg(msg, `施設を作成しました。初期管理者：${esc(body.adminLoginId)}（初回ログイン時にパスワード変更が必要です）`, 'ok');
      ['name', 'kana', 'adminLoginId', 'adminPassword'].forEach((id) => { document.getElementById(id).value = ''; });
      load();
    }

    async function saveFacility(id) {
      const name = document.getElementById('nm_' + id).value.trim();
      const kana = document.getElementById('kn_' + id).value.trim();
      const planCode = document.getElementById('pl_' + id).value;
      const { ok, data } = await api('/api/facilities/' + id, { method: 'PUT', body: JSON.stringify({ name, kana, planCode }) });
      setMsg(document.getElementById('msg'), ok ? '保存しました' : (data.error || '保存失敗'), ok ? 'ok' : 'error');
      load();
    }

    async function toggleFacility(id, active) {
      const { ok, data } = await api('/api/facilities/' + id, { method: 'PUT', body: JSON.stringify({ isActive: active }) });
      setMsg(document.getElementById('msg'), ok ? '更新しました' : (data.error || '更新失敗'), ok ? 'ok' : 'error');
      load();
    }

    boot();
  </script>
</body>
</html>
