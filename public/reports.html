<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>集計 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .tabs button { background: #e3eaf3; color: #46586f; border-radius: 10px 10px 0 0; box-shadow: none; font-weight: 700; }
    .tabs button:hover { background: #d5e0ee; }
    .tabs button.active { background: #5e97c1; color: #fff; box-shadow: 0 2px 7px rgba(94,151,193,0.4); }
    #rtable td.num, #rtable th.num { text-align: right; }
    #rtable tfoot td { font-weight: 700; background: #eef4fa; }
    .bar { height: 12px; border-radius: 6px; display: inline-block; vertical-align: middle; }
    .bar.in { background: #7fb0e0; }
    .bar.out { background: #e6a86a; }
  </style>
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>集計</h2>
      <div class="tabs">
        <button id="tab-usage" class="active" onclick="switchTab('usage')">使用量集計</button>
        <button id="tab-monthly" onclick="switchTab('monthly')">月次推移</button>
      </div>

      <div class="row" style="align-items:flex-end;">
        <div><label>期間(自)</label><input type="date" id="from" /></div>
        <div><label>期間(至)</label><input type="date" id="to" /></div>
        <div id="grpBox" style="flex:0; min-width:150px;"><label>グループ化</label>
          <select id="groupBy" onchange="load()">
            <option value="product">商品別</option>
            <option value="department">部門別</option>
            <option value="category">分類別</option>
          </select>
        </div>
        <div id="supBox" style="flex:0; min-width:150px;"><label>問屋</label>
          <select id="supplierId" onchange="load()"><option value="">(すべて)</option></select>
        </div>
        <div id="mkBox" style="flex:0; min-width:150px;"><label>メーカー</label>
          <select id="makerId" onchange="load()"><option value="">(すべて)</option></select>
        </div>
        <div style="flex:0 0 auto;"><label>&nbsp;</label><button onclick="load()">表示</button></div>
      </div>
      <div class="row">
        <div style="flex:0 0 auto;"><button class="secondary" onclick="csvOut()">CSV出力</button></div>
        <div style="flex:0 0 auto;"><button class="secondary" onclick="printOut()">印刷</button></div>
      </div>
      <p style="font-size:0.82rem; color:#777; margin:6px 0;">金額は「入力単位(取引単位)の個数 × 単価」で算出しています。数量はバラ(最小単位)です。</p>
      <p class="msg" id="msg"></p>
      <div id="area"></div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    let tab = 'usage';

    async function boot() {
      const user = await initPage('reports');
      if (!user) return;
      // 問屋・メーカーの選択肢を構築
      const sr = await api('/api/lookup/suppliers');
      const supSel = document.getElementById('supplierId');
      (sr.data.suppliers || []).forEach((s) => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; supSel.appendChild(o); });
      const mr = await api('/api/lookup/makers');
      const mkSel = document.getElementById('makerId');
      (mr.data.makers || []).forEach((m) => { const o = document.createElement('option'); o.value = m.id; o.textContent = m.name; mkSel.appendChild(o); });
      // 既定期間: 使用量=今年初〜今日 / 月次=直近12ヶ月
      setDefaultRange();
      load();
    }

    function setDefaultRange() {
      const today = localDateStr();
      const d = new Date();
      if (tab === 'monthly') d.setMonth(d.getMonth() - 11);
      else d.setMonth(0), d.setDate(1); // 今年1月1日
      document.getElementById('from').value = localDateStr(d);
      document.getElementById('to').value = today;
    }

    function switchTab(t) {
      tab = t;
      document.getElementById('tab-usage').classList.toggle('active', t === 'usage');
      document.getElementById('tab-monthly').classList.toggle('active', t === 'monthly');
      const isUsage = (t === 'usage');
      document.getElementById('grpBox').style.display = isUsage ? '' : 'none';
      // 問屋・メーカーの絞り込みは両タブで使用可能
      document.getElementById('supBox').style.display = '';
      document.getElementById('mkBox').style.display = '';
      setDefaultRange();
      load();
    }

    function qs() {
      const p = new URLSearchParams();
      const f = document.getElementById('from').value; if (f) p.set('from', f);
      const t = document.getElementById('to').value; if (t) p.set('to', t);
      if (tab === 'usage') p.set('groupBy', document.getElementById('groupBy').value);
      const sid = document.getElementById('supplierId').value; if (sid) p.set('supplierId', sid);
      const mid = document.getElementById('makerId').value; if (mid) p.set('makerId', mid);
      return p.toString();
    }

    async function load() {
      setMsg(document.getElementById('msg'), '', '');
      const path = (tab === 'usage') ? '/api/reports/usage' : '/api/reports/monthly';
      const { ok, data } = await api(path + '?' + qs());
      if (!ok) { setMsg(document.getElementById('msg'), data.error || '取得失敗', 'error'); document.getElementById('area').innerHTML = ''; return; }
      if (tab === 'usage') renderUsage(data); else renderMonthly(data);
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function yen(n) { return '¥' + Number(n || 0).toLocaleString(); }
    function num(n) { return Number(n || 0).toLocaleString(); }

    const GLABEL = { product: '商品', department: '部門', category: '分類' };
    function renderUsage(data) {
      const rows = data.rows || [];
      const label = GLABEL[data.groupBy] || '商品';
      let h = `<table id="rtable"><thead><tr><th>${label}</th><th class="num">使用量(バラ)</th><th class="num">金額</th><th class="num">明細件数</th></tr></thead><tbody>`;
      if (rows.length === 0) h += `<tr><td colspan="4">該当がありません。</td></tr>`;
      rows.forEach((r) => {
        h += `<tr><td>${esc(r.group_name)}</td><td class="num">${num(r.quantity)}</td>` +
          `<td class="num">${yen(r.amount)}</td><td class="num">${num(r.line_count)}</td></tr>`;
      });
      h += `</tbody><tfoot><tr><td>合計</td><td class="num">${num(data.total.quantity)}</td>` +
        `<td class="num">${yen(data.total.amount)}</td><td class="num">${num(data.total.line_count)}</td></tr></tfoot></table>`;
      document.getElementById('area').innerHTML = h;
    }

    // 月次金額の折れ線グラフ(SVG。ライブラリ非依存)
    function niceMax(v) {
      if (v <= 0) return 1;
      const p = Math.pow(10, Math.floor(Math.log10(v)));
      const n = v / p;
      const m = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
      return m * p;
    }
    function yenShort(v) {
      if (v >= 100000000) return '¥' + (Math.round(v / 10000000) / 10) + '億';
      if (v >= 10000) return '¥' + (Math.round(v / 1000) / 10) + '万';
      return '¥' + Math.round(v);
    }
    function buildMonthlyChart(rows) {
      if (!rows.length) return '';
      const W = 760, H = 300, ml = 66, mr = 18, mt = 22, mb = 40;
      const pw = W - ml - mr, ph = H - mt - mb;
      const maxY = niceMax(Math.max(1, ...rows.flatMap((r) => [r.receipt_amount, r.issue_amount])));
      const n = rows.length;
      const xAt = (i) => (n === 1 ? ml + pw / 2 : ml + (i / (n - 1)) * pw);
      const yAt = (v) => mt + ph - (v / maxY) * ph;
      let g = '';
      const ticks = 4;
      for (let t = 0; t <= ticks; t++) {
        const val = maxY * t / ticks, y = yAt(val);
        g += `<line x1="${ml}" y1="${y}" x2="${ml + pw}" y2="${y}" stroke="#e3e9ef" stroke-width="1"/>`;
        g += `<text x="${ml - 6}" y="${y + 3}" text-anchor="end" font-size="9" fill="#667">${yenShort(val)}</text>`;
      }
      let xl = '';
      const step = Math.ceil(n / 12);
      rows.forEach((r, i) => { if (i % step === 0 || i === n - 1) xl += `<text x="${xAt(i)}" y="${mt + ph + 15}" text-anchor="middle" font-size="8" fill="#667">${esc(r.ym)}</text>`; });
      const line = (key, color) => {
        const pts = rows.map((r, i) => `${xAt(i).toFixed(1)},${yAt(r[key]).toFixed(1)}`).join(' ');
        const dots = rows.map((r, i) => `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(r[key]).toFixed(1)}" r="2.6" fill="${color}"/>`).join('');
        return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>${dots}`;
      };
      const legend = `<g font-size="10"><rect x="${ml}" y="4" width="14" height="4" fill="#5e97c1"/><text x="${ml + 18}" y="9" fill="#444">入庫金額</text>` +
        `<rect x="${ml + 92}" y="4" width="14" height="4" fill="#e0955a"/><text x="${ml + 110}" y="9" fill="#444">出庫金額</text></g>`;
      return `<div style="overflow-x:auto; margin:6px 0 14px;"><svg viewBox="0 0 ${W} ${H}" style="width:100%; max-width:780px; height:auto;">` +
        `${g}<line x1="${ml}" y1="${mt + ph}" x2="${ml + pw}" y2="${mt + ph}" stroke="#b9c6d3"/><line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt + ph}" stroke="#b9c6d3"/>` +
        `${line('receipt_amount', '#5e97c1')}${line('issue_amount', '#e0955a')}${xl}${legend}</svg></div>`;
    }

    function renderMonthly(data) {
      const rows = data.rows || [];
      // グラフ用の最大値(入庫/出庫金額)
      const maxAmt = Math.max(1, ...rows.map((r) => Math.max(r.receipt_amount, r.issue_amount)));
      let h = buildMonthlyChart(rows);
      h += `<table id="rtable"><thead><tr><th>年月</th><th class="num">入庫量(バラ)</th><th class="num">入庫金額</th>` +
        `<th class="num">出庫量(バラ)</th><th class="num">出庫金額</th><th style="width:230px;">金額(入庫/出庫)</th></tr></thead><tbody>`;
      if (rows.length === 0) h += `<tr><td colspan="6">該当がありません。</td></tr>`;
      const tot = { rq: 0, ra: 0, iq: 0, ia: 0 };
      rows.forEach((r) => {
        tot.rq += r.receipt_qty; tot.ra += r.receipt_amount; tot.iq += r.issue_qty; tot.ia += r.issue_amount;
        const wIn = Math.round((r.receipt_amount / maxAmt) * 100);
        const wOut = Math.round((r.issue_amount / maxAmt) * 100);
        h += `<tr><td>${esc(r.ym)}</td><td class="num">${num(r.receipt_qty)}</td><td class="num">${yen(r.receipt_amount)}</td>` +
          `<td class="num">${num(r.issue_qty)}</td><td class="num">${yen(r.issue_amount)}</td>` +
          `<td><div class="bar in" style="width:${wIn}%" title="入庫 ${yen(r.receipt_amount)}"></div><br>` +
          `<div class="bar out" style="width:${wOut}%" title="出庫 ${yen(r.issue_amount)}"></div></td></tr>`;
      });
      h += `</tbody><tfoot><tr><td>合計</td><td class="num">${num(tot.rq)}</td><td class="num">${yen(tot.ra)}</td>` +
        `<td class="num">${num(tot.iq)}</td><td class="num">${yen(tot.ia)}</td><td></td></tr></tfoot></table>` +
        `<p style="font-size:0.82rem; color:#777;"><span class="bar in" style="width:20px;"></span> 入庫金額　<span class="bar out" style="width:20px;"></span> 出庫金額</p>`;
      document.getElementById('area').innerHTML = h;
    }

    function csvOut() {
      const path = (tab === 'usage') ? '/api/reports/usage/csv' : '/api/reports/monthly/csv';
      window.location = path + '?' + qs();
    }
    function selText(id) { const s = document.getElementById(id); return s.value ? s.options[s.selectedIndex].text : ''; }
    function printOut() {
      // 絞り込み条件を可読名で渡す(印刷に表示するため)
      const p = new URLSearchParams(qs());
      const sn = selText('supplierId'); if (sn) p.set('supplierName', sn);
      const mn = selText('makerId'); if (mn) p.set('makerName', mn);
      if (tab === 'monthly') { window.open('/print.html?type=monthly_report&' + p.toString(), '_blank'); return; }
      p.set('groupLabel', selText('groupBy'));
      window.open('/print.html?type=usage_report&' + p.toString(), '_blank');
    }

    boot();
  </script>
</body>
</html>
