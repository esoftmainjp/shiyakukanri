<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マスター編集 | 試薬在庫管理システム</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header></header>
  <main>
    <div class="card">
      <h2>マスター編集</h2>
      <div class="row">
        <div style="flex:0; min-width:220px;">
          <label>マスター種別</label>
          <select id="type" onchange="switchType()">
            <option value="suppliers">問屋</option>
            <option value="makers">メーカー</option>
            <option value="departments">部門</option>
            <option value="categories">分類</option>
            <option value="shelves">棚</option>
            <option value="users">ユーザー</option>
            <option value="products">商品</option>
            <option value="product-details">商品詳細</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 id="formTitle">新規登録</h3>
      <div id="formArea" class="row"></div>
      <div style="margin-top:12px;">
        <button onclick="save()">保存</button>
        <button class="secondary" onclick="resetForm()">クリア</button>
      </div>
      <p class="msg" id="formMsg"></p>
    </div>

    <div class="card" id="importCard" style="display:none;">
      <h3>CSV インポート／エクスポート</h3>
      <div id="combinedRow" style="display:none; margin-bottom:8px;">
        <label><input type="checkbox" id="combined" onchange="updateImportHint()" /> 商品＋商品詳細をまとめて扱う（1行で商品と詳細。取込・出力の両方に適用）</label>
      </div>
      <p id="importHint" style="font-size:0.85rem; color:#555;"></p>
      <input type="file" id="csvFile" accept=".csv" />
      <div style="margin-top:10px;">
        <button class="secondary" onclick="importCsv()">取込実行</button>
        <button class="secondary" onclick="exportCsv()">CSVエクスポート</button>
      </div>
      <p style="font-size:0.8rem; color:#777; margin-top:6px;">エクスポートは上のヘッダー形式で、この施設の全商品を出力します（そのまま取込に再利用できます）。</p>
      <p class="msg" id="importMsg"></p>
    </div>

    <div class="card">
      <h3>一覧</h3>
      <div class="row" id="filterArea" style="margin-bottom:8px;"></div>
      <div style="overflow-x:auto;"><table id="tbl"><thead></thead><tbody></tbody></table></div>
    </div>
  </main>

  <script src="/common.js"></script>
  <script>
    // フィールド定義
    const DEFS = {
      suppliers:   [f('name','名称'), f('kana','カナ'), f('note','備考')],
      makers:      [f('name','名称'), f('kana','カナ'), f('jan_maker_code','JANメーカーコード'), f('note','備考')],
      departments: [f('name','名称'), f('kana','カナ'), f('note','備考')],
      categories:  [f('name','名称'), f('kana','カナ'), f('note','備考')],
      shelves:     [f('name','名称'), f('kana','カナ'), f('note','備考')],
      users: [
        sel('user_type','タイプ',[['admin','管理者'],['general','一般'],['supplier','問屋']]),
        f('name','氏名'), f('kana','カナ'), f('login_id','ログインID'),
        f('password','パスワード', 'password'), f('note','備考'),
      ],
      products: [
        f('name','名称'), f('kana','カナ'),
        ref('department_id','部門','departments'),
        ref('category_id','分類','categories'),
        f('management_code','管理コード'),
        chk('qc_target_flag','試薬管理対象'), ref('shelf_id','棚（必須）','shelves'), f('note','備考'),
      ],
      'product-details': [
        ref('product_id','商品','products'),
        f('apply_start_date','適用開始日','date'), f('apply_end_date','適用終了日','date'),
        f('quantity_unit','数量単位'), f('pack_size','梱包数','number'), f('pack_unit','梱包単位'),
        f('spec','規格'), f('unit_price','単価','number'), f('test_count','テスト数','number'),
        f('min_quantity','最低個数','number'), f('order_quantity','発注個数','number'),
        f('jan_code','JANコード'),
        ref('maker_id','メーカー','makers'), ref('supplier_id','問屋','suppliers'),
        chk('barcode_issue_flag','バーコード発行'),
        f('expiry_warn_days','警告日数(0=未設定)','number'),
        f('open_life_days','開封後有効日数(0=無効)','number'), f('note','備考'),
      ],
    };
    function f(key, label, type='text') { return { key, label, type }; }
    function sel(key, label, options) { return { key, label, type: 'select', options }; }
    function ref(key, label, refType) { return { key, label, type: 'ref', refType }; }
    function chk(key, label) { return { key, label, type: 'checkbox' }; }

    const IMPORT_HINTS = {
      products: 'ヘッダー: 名称,カナ,部門,分類,管理コード,試薬管理対象,棚',
    };
    const COMBINED_HINT = 'ヘッダー: 名称,カナ,部門,分類,管理コード,試薬管理対象,棚,適用開始日,適用終了日,数量単位,梱包数,梱包単位,規格,単価,テスト数,最低個数,発注個数,JANコード,メーカー,問屋,バーコード発行,開封後有効日数';

    // 一覧ヘッダーの日本語ラベル(全マスター共通)
    const COL_LABELS = {
      id: 'ID', name: '名称', kana: 'カナ', note: '備考', is_active: '有効',
      jan_maker_code: 'JANメーカーコード',
      department_id: '部門', category_id: '分類', management_code: '管理コード', qc_target_flag: '試薬管理対象', shelf_id: '棚',
      product_id: '商品', apply_start_date: '適用開始日', apply_end_date: '適用終了日',
      quantity_unit: '数量単位', pack_size: '梱包数', pack_unit: '梱包単位', spec: '規格',
      unit_price: '単価', test_count: 'テスト数', min_quantity: '最低個数', order_quantity: '発注個数',
      jan_code: 'JANコード', maker_id: 'メーカー', supplier_id: '問屋', barcode_issue_flag: 'バーコード発行',
      expiry_warn_days: '警告日数', open_life_days: '開封後有効日数',
      user_type: 'タイプ', login_id: 'ログインID', password_updated_at: 'パスワード更新日時',
    };
    // ID列 → 参照マスター種別(名称表示に使う)
    const REF_COLS = { department_id: 'departments', category_id: 'categories', shelf_id: 'shelves', maker_id: 'makers', supplier_id: 'suppliers', product_id: 'products' };
    const USER_TYPE_LABEL = { admin: '管理者', general: '一般', supplier: '問屋' };

    let editId = null;
    let refCache = {};
    // 商品詳細の適用開始日・終了日の既定(基本設定の「本日＋日数」から算出)
    let applyDefaults = { start: '', end: '' };

    async function loadApplyDefaults() {
      const { data } = await api('/api/settings');
      const s = (data && data.settings) || {};
      const today = localDateStr();
      // 固定の日付指定。空欄なら本日を既定にする。
      applyDefaults = { start: s.pd_apply_start_default || today, end: s.pd_apply_end_default || today };
    }

    async function boot() {
      const user = await initPage('masters');
      if (!user) return;
      const allowed = user.userType === 'admin' || user.userType === 'superadmin';
      if (!allowed) { document.querySelector('main').innerHTML = '<div class="card">この画面は管理者のみ利用できます。</div>'; return; }
      // 全体管理者は対象施設を選択していないとマスターを編集できない
      if (user.userType === 'superadmin' && !(currentMe && currentMe.activeFacilityId != null)) {
        document.querySelector('main').innerHTML = '<div class="card">全体管理者は、画面上部の施設セレクタで対象施設を選択してからマスターを編集してください。</div>';
        return;
      }
      await loadApplyDefaults();
      switchType();
    }

    function curType() { return document.getElementById('type').value; }

    async function loadRef(refType) {
      if (refCache[refType]) return refCache[refType];
      const { data } = await api('/api/masters/' + refType);
      refCache[refType] = data.rows || [];
      return refCache[refType];
    }

    async function switchType() {
      editId = null;
      const t = curType();
      document.getElementById('importCard').style.display = (IMPORT_HINTS[t] && (typeof planAllows !== 'function' || planAllows('feat_import'))) ? 'block' : 'none';
      // 「商品＋詳細同時」チェックは商品種別のときだけ表示
      document.getElementById('combinedRow').style.display = (t === 'products') ? 'block' : 'none';
      if (t !== 'products') document.getElementById('combined').checked = false;
      updateImportHint();
      await renderForm();
      await loadList();
    }

    function updateImportHint() {
      const t = curType();
      const combined = document.getElementById('combined').checked;
      const hint = (t === 'products' && combined) ? COMBINED_HINT : IMPORT_HINTS[t];
      if (hint) document.getElementById('importHint').textContent = hint;
    }

    async function renderForm() {
      const t = curType();
      const area = document.getElementById('formArea');
      area.innerHTML = '';
      for (const def of DEFS[t]) {
        const div = document.createElement('div');
        let inner = `<label>${def.label}</label>`;
        if (def.type === 'select') {
          inner += `<select id="fld_${def.key}">` + def.options.map(([v, l]) => `<option value="${v}">${l}</option>`).join('') + `</select>`;
        } else if (def.type === 'ref') {
          const rows = await loadRef(def.refType);
          inner += `<select id="fld_${def.key}"><option value="">(未選択)</option>` +
            rows.map((r) => `<option value="${r.id}">${esc(r.name)}</option>`).join('') + `</select>`;
        } else if (def.type === 'checkbox') {
          inner += `<input type="checkbox" id="fld_${def.key}" />`;
        } else {
          // ブラウザの自動入力(オートフィル)抑止。特にログインID・パスワードは
          // フォーカスするまで readonly にして自動入力されないようにする。
          let attrs = ' autocomplete="off"';
          if (def.key === 'password' || def.key === 'login_id') {
            const ac = def.key === 'password' ? 'new-password' : 'off';
            attrs = ` autocomplete="${ac}" readonly onfocus="this.removeAttribute('readonly')"`;
          }
          inner += `<input type="${def.type}" id="fld_${def.key}"${attrs} />`;
        }
        div.innerHTML = inner;
        area.appendChild(div);
      }
      // 商品詳細は適用開始日・終了日を既定表示(必須のため。未入力時の登録エラー防止)
      if (t === 'product-details') {
        const s = document.getElementById('fld_apply_start_date');
        if (s && !s.value) s.value = applyDefaults.start || localDateStr();
        const e = document.getElementById('fld_apply_end_date');
        if (e && !e.value) e.value = applyDefaults.end || '';
      }
    }

    function resetForm() {
      editId = null;
      document.getElementById('formTitle').textContent = '新規登録';
      DEFS[curType()].forEach((def) => {
        const el = document.getElementById('fld_' + def.key);
        if (!el) return;
        if (def.type === 'checkbox') el.checked = false; else el.value = '';
      });
      // 商品詳細の適用開始日・終了日は既定を表示(必須)
      if (curType() === 'product-details') {
        const s = document.getElementById('fld_apply_start_date');
        if (s) s.value = applyDefaults.start || localDateStr();
        const e = document.getElementById('fld_apply_end_date');
        if (e) e.value = applyDefaults.end || '';
      }
      setMsg(document.getElementById('formMsg'), '', '');
    }

    function collect() {
      const body = {};
      DEFS[curType()].forEach((def) => {
        const el = document.getElementById('fld_' + def.key);
        if (!el) return;
        if (def.type === 'checkbox') body[def.key] = el.checked;
        else if (def.key === 'password') { if (el.value) body[def.key] = el.value; }
        else if (def.type === 'ref') body[def.key] = el.value || null;
        else body[def.key] = el.value;
      });
      return body;
    }

    async function save() {
      const t = curType();
      const body = collect();
      const msg = document.getElementById('formMsg');
      const path = '/api/masters/' + t + (editId ? '/' + editId : '');
      const method = editId ? 'PUT' : 'POST';
      const { ok, data } = await api(path, { method, body: JSON.stringify(body) });
      if (!ok) { setMsg(msg, data.error || '保存失敗', 'error'); return; }
      setMsg(msg, editId ? '更新しました' : '登録しました', 'ok');
      refCache = {};
      resetForm();
      await renderForm();
      loadList();
    }

    async function edit(row) {
      editId = row.id;
      document.getElementById('formTitle').textContent = '編集 (ID:' + row.id + ')';
      DEFS[curType()].forEach((def) => {
        const el = document.getElementById('fld_' + def.key);
        if (!el) return;
        if (def.key === 'password') { el.value = ''; return; }
        if (def.type === 'checkbox') el.checked = !!row[def.key];
        else el.value = row[def.key] == null ? '' : row[def.key];
      });
      window.scrollTo(0, 0);
    }

    async function toggle(id) {
      const { ok, data } = await api(`/api/masters/${curType()}/${id}/toggle`, { method: 'POST' });
      if (!ok) { alert(data.error || '失敗'); return; }
      refCache = {};
      loadList();
    }

    // 物理削除。既存データで使用中の場合はサーバーが理由を返しブロックする。
    async function del(id) {
      if (!confirm('この行を削除します。よろしいですか？\n（既存データで使用中の場合は削除できません）')) return;
      const { ok, data } = await api(`/api/masters/${curType()}/${id}`, { method: 'DELETE' });
      if (!ok) { alert(data.error || '削除できませんでした'); return; }
      refCache = {};
      resetForm();
      loadList();
    }

    let listRows = [];
    let listKeys = [];
    let listRefMaps = {};

    async function loadList() {
      const t = curType();
      const { data } = await api('/api/masters/' + t);
      listRows = data.rows || [];
      const thead = document.querySelector('#tbl thead');
      const tbody = document.querySelector('#tbl tbody');
      await buildFilter();
      if (listRows.length === 0) { thead.innerHTML = ''; tbody.innerHTML = '<tr><td>データがありません</td></tr>'; return; }
      // id と日時列・施設列は非表示。参照ID列は名称表示にする。
      listKeys = Object.keys(listRows[0]).filter((k) => !['id', 'created_at', 'updated_at', 'facility_id'].includes(k));
      // 参照マスターの id→名称 マップを準備
      listRefMaps = {};
      for (const k of listKeys) {
        if (REF_COLS[k]) {
          const list = await loadRef(REF_COLS[k]);
          listRefMaps[k] = Object.fromEntries(list.map((x) => [String(x.id), x.name]));
        }
      }
      thead.innerHTML = '<tr>' + listKeys.map((k) => `<th>${COL_LABELS[k] || k}</th>`).join('') + '<th>操作</th></tr>';
      applyListFilter();
    }

    // 種別に応じた絞り込みUIを構築 (商品詳細=商品コンボ、その他=名称テキスト)
    async function buildFilter() {
      const t = curType();
      const area = document.getElementById('filterArea');
      if (t === 'product-details') {
        // 一覧の再描画(保存・追加など)後も「商品で絞り込み」の選択を保持する
        const prevProduct = (document.getElementById('listFilterProduct') || {}).value || '';
        const prods = await loadRef('products');
        area.innerHTML = `<div style="flex:0; min-width:280px;"><label>商品で絞り込み</label>
          <select id="listFilterProduct" onchange="applyListFilter()">
            <option value="">すべて</option>
            ${prods.map((p) => `<option value="${p.id}">${esc(p.name)}</option>`).join('')}
          </select></div>`;
        const fsel = document.getElementById('listFilterProduct');
        if (fsel && prevProduct) fsel.value = prevProduct;
      } else {
        area.innerHTML = `<div style="flex:0; min-width:280px;"><label>名称で絞り込み</label>
          <input id="listFilterName" placeholder="部分一致" oninput="applyListFilter()" /></div>`;
      }
    }

    function applyListFilter() {
      const t = curType();
      let rows = listRows;
      if (t === 'product-details') {
        const pid = (document.getElementById('listFilterProduct') || {}).value || '';
        if (pid) rows = rows.filter((r) => String(r.product_id) === String(pid));
      } else {
        const kw = ((document.getElementById('listFilterName') || {}).value || '').trim();
        if (kw) rows = rows.filter((r) => String(r.name || '').includes(kw));
      }
      const tbody = document.querySelector('#tbl tbody');
      if (rows.length === 0) { tbody.innerHTML = '<tr><td>該当データがありません</td></tr>'; return; }
      tbody.innerHTML = rows.map((r) => {
        const tds = listKeys.map((k) => `<td>${esc(cellValue(k, r[k], listRefMaps))}</td>`).join('');
        const hasActive = 'is_active' in r;
        const toggleBtn = hasActive ? `<button class="${r.is_active ? 'danger' : ''}" onclick="toggle('${r.id}')">${r.is_active ? '無効化' : '有効化'}</button>` : '';
        const editData = JSON.stringify(r).replace(/'/g, '&#39;');
        // 商品一覧には「詳細」ボタン(その商品の商品詳細へ)
        const detailBtn = (t === 'products') ? `<button onclick="showDetails('${r.id}')">詳細</button> ` : '';
        const delBtn = `<button class="danger" onclick="del('${r.id}')">削除</button>`;
        return `<tr>${tds}<td style="white-space:nowrap;">${detailBtn}<button class="secondary" onclick='edit(${editData})'>編集</button> ${toggleBtn} ${delBtn}</td></tr>`;
      }).join('');
    }
    // 商品一覧の「詳細」: 商品詳細に切り替えてその商品で絞り込み、入力フォームの商品も選択済みにする
    async function showDetails(productId) {
      document.getElementById('type').value = 'product-details';
      await switchType();
      // 一覧をその商品で絞り込み
      const sel = document.getElementById('listFilterProduct');
      if (sel) { sel.value = String(productId); applyListFilter(); }
      // 入力フォームの「商品」も選択済みにする(そのまま新規詳細を追加できる)
      const fld = document.getElementById('fld_product_id');
      if (fld) fld.value = String(productId);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // HTMLエスケープ(XSS対策)。innerHTMLへ埋める文字列は必ずこれを通す。
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function cellValue(key, v, refMaps) {
      if (REF_COLS[key]) return v == null ? '' : (refMaps[key][String(v)] || v);
      if (key === 'user_type') return USER_TYPE_LABEL[v] || v;
      return fmt(v);
    }
    function fmt(v) {
      if (v === true) return '○'; if (v === false) return '';
      return v == null ? '' : String(v);
    }

    // CSVエクスポート(商品マスタ)。商品＋詳細チェックに応じて形式を切り替え、
    // インポートと同じヘッダーで出力する。
    function exportCsv() {
      const combined = curType() === 'products' && document.getElementById('combined').checked;
      const endpoint = combined ? 'products-combined/export' : 'products/export';
      window.location = '/api/import/' + endpoint;
    }

    async function importCsv() {
      const file = document.getElementById('csvFile').files[0];
      const msg = document.getElementById('importMsg');
      if (!file) { setMsg(msg, 'ファイルを選択してください', 'error'); return; }
      const csv = await file.text();
      const combined = curType() === 'products' && document.getElementById('combined').checked;
      const endpoint = combined ? 'products-combined' : curType();
      const { ok, data } = await api('/api/import/' + endpoint, { method: 'POST', body: JSON.stringify({ csv }) });
      if (!ok) {
        let t = data.error || '取込失敗';
        if (data.errors) t += ' / ' + data.errors.slice(0, 5).map((e) => `${e.line}行:${e.error}`).join(' , ');
        setMsg(msg, t, 'error'); return;
      }
      let summary = combined
        ? `商品${data.productsCreated}件・詳細${data.detailsCreated}件を取り込みました`
        : `${data.inserted}件取り込みました`;
      const added = [];
      if (data.departmentsCreated) added.push(`部門${data.departmentsCreated}件`);
      if (data.categoriesCreated) added.push(`分類${data.categoriesCreated}件`);
      if (data.suppliersCreated) added.push(`問屋${data.suppliersCreated}件`);
      if (data.makersCreated) added.push(`メーカー${data.makersCreated}件`);
      if (added.length) summary += `（${added.join('・')}を自動追加）`;
      setMsg(msg, summary, 'ok');
      refCache = {};
      loadList();
    }

    boot();
  </script>
</body>
</html>
